<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Scripts prepare, LLM decides</title>
  <desc id="desc">展示脚本负责确定性事实，LLM 负责语义判断，中间通过证据包连接。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <text x="600" y="66" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Scripts prepare, LLM decides</text>
  <text x="600" y="104" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">Harness 的关键不是替模型做决定，而是把决定所需事实准备好</text>

  <g filter="url(#shadow)">
    <rect x="90" y="170" width="340" height="315" rx="24" fill="#0f172a" stroke="#38bdf8" stroke-width="2"/>
    <text x="260" y="220" text-anchor="middle" fill="#f8fafc" font-size="29" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Scripts / Tools</text>
    <text x="260" y="258" text-anchor="middle" fill="#bae6fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">确定性事实</text>
    <text x="260" y="310" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">路径 / hash / schema</text>
    <text x="260" y="345" text-anchor="middle" fill="#cbd5e1" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">readiness / exit code</text>
    <text x="260" y="380" text-anchor="middle" fill="#cbd5e1" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">artifact_path · reason_code</text>
    <text x="260" y="430" text-anchor="middle" fill="#fef3c7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">不假装做架构判断</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="455" y="222" width="290" height="216" rx="24" fill="#082f49" stroke="#7dd3fc" stroke-width="2"/>
    <text x="600" y="266" text-anchor="middle" fill="#f8fafc" font-size="24" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Evidence Envelope</text>
    <text x="600" y="296" text-anchor="middle" fill="#bae6fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">四轴标注每条证据</text>
    <text x="600" y="332" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">capability_status</text>
    <text x="600" y="360" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">evidence_grade</text>
    <text x="600" y="388" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">evidence_posture</text>
    <text x="600" y="416" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">freshness_state</text>
  </g>

  <path d="M432 330 H450" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M747 330 H765" stroke="#93c5fd" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="770" y="170" width="340" height="315" rx="24" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
    <text x="940" y="220" text-anchor="middle" fill="#f8fafc" font-size="29" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">LLM / Agents</text>
    <text x="940" y="258" text-anchor="middle" fill="#ddd6fe" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">语义判断</text>
    <text x="940" y="310" text-anchor="middle" fill="#cbd5e1" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">scope / tradeoff</text>
    <text x="940" y="345" text-anchor="middle" fill="#cbd5e1" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">architecture / review</text>
    <text x="940" y="380" text-anchor="middle" fill="#cbd5e1" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">risk / next action</text>
    <text x="940" y="430" text-anchor="middle" fill="#fef3c7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">不假装跑过校验</text>
  </g>

  <text x="600" y="555" text-anchor="middle" fill="#e0f2fe" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Light contract + Explicit boundaries + Let the LLM decide</text>
  <text x="600" y="588" text-anchor="middle" fill="#93c5fd" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">可信事实优先于自动化便利，清晰边界优先于功能完整</text>
</svg>
