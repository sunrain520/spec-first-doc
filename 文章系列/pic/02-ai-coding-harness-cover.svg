<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">什么是 AI Coding Harness：spec-first 的定位升级</title>
  <desc id="desc">微信公众号 2.35:1 封面图：AI Coding Harness 定义与 spec-first 定位升级。</desc>
  <defs>
