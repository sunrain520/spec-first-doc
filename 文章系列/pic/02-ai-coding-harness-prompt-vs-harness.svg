<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">从瞬时 Prompt 约束到持久工程产物</title>
  <desc id="desc">展示聊天窗口里的临时约束如何在 spec-first 中沉淀为 requirements brief、plan、task pack、findings、hypothesis ledger、docs/solutions 等可复用工程产物。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="30" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">不是 prompt collection，是工程承载层</text>
  <text x="600" y="98" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">同一段约束，留在聊天里会蒸发，进入产物就能复用</text>

  <!-- 左：瞬时聊天约束 -->
  <g filter="url(#shadow)">
    <rect x="80" y="150" width="420" height="468" rx="22" fill="#0f172a" stroke="#64748b" stroke-width="2" stroke-dasharray="7 6"/>
    <text x="290" y="196" text-anchor="middle" fill="#e2e8f0" font-size="24" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">瞬时：聊天窗口里的约束</text>
    <text x="290" y="228" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">只在这次会话成立</text>

    <g>
      <rect x="116" y="262" width="348" height="62" rx="12" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
      <text x="140" y="299" fill="#cbd5e1" font-size="16" font-family="'SF Mono', Menlo, Consolas, monospace">“先看代码结构，再给计划…”</text>
    </g>
    <g>
      <rect x="116" y="338" width="348" height="62" rx="12" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
      <text x="140" y="375" fill="#cbd5e1" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">“改完记得跑测试”</text>
    </g>
    <g>
      <rect x="116" y="414" width="348" height="62" rx="12" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
      <text x="140" y="451" fill="#cbd5e1" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">“这个坑上次踩过”</text>
    </g>

    <text x="290" y="528" text-anchor="middle" fill="#f87171" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">下一个会话 / 另一台机器 / 另一个 host</text>
    <text x="290" y="560" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">约束蒸发，意图要靠模型重新猜</text>
    <text x="290" y="592" text-anchor="middle" fill="#64748b" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">prompt 天然是瞬时输入</text>
  </g>

  <!-- 中间箭头 -->
  <path d="M512 384 H560" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="540" y="362" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">沉淀</text>

  <!-- 右：持久工程产物 -->
  <g filter="url(#shadow)">
    <rect x="592" y="150" width="528" height="468" rx="22" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="856" y="196" text-anchor="middle" fill="#f8fafc" font-size="24" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">持久：项目内可复用的结构</text>
    <text x="856" y="228" text-anchor="middle" fill="#bae6fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">离开聊天仍然存在、可被下游消费</text>

    <g>
      <rect x="628" y="256" width="456" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="650" y="287" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">需求</text>
      <text x="1064" y="287" text-anchor="end" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">requirements brief</text>
    </g>
    <g>
      <rect x="628" y="314" width="456" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="650" y="345" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">计划</text>
      <text x="1064" y="345" text-anchor="end" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">plan</text>
    </g>
    <g>
      <rect x="628" y="372" width="456" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="650" y="403" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">任务</text>
      <text x="1064" y="403" text-anchor="end" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">task pack</text>
    </g>
    <g>
      <rect x="628" y="430" width="456" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="650" y="461" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">评审</text>
      <text x="1064" y="461" text-anchor="end" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">结构化 findings</text>
    </g>
    <g>
      <rect x="628" y="488" width="456" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="650" y="519" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">调试</text>
      <text x="1064" y="519" text-anchor="end" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">hypothesis ledger</text>
    </g>
    <g>
      <rect x="628" y="546" width="456" height="50" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
      <text x="650" y="577" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">经验</text>
      <text x="1064" y="577" text-anchor="end" fill="#6ee7b7" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">docs/solutions</text>
    </g>
  </g>

  <text x="600" y="660" text-anchor="middle" fill="#93c5fd" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">host runtime 从 source 生成，而不是手工维护副本</text>
</svg>
