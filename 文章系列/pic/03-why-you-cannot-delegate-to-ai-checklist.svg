<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">AI Coding 可委派性自测清单</title>
  <desc id="desc">六个维度自测：任务意图、上下文、计划、证据、Review、Knowledge，判断 AI coding 流程是否已进入可委派阶段。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="760" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">AI Coding 可委派性自测</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">六个维度，判断你的 AI coding 流程是否已进入可委派阶段</text>

  <!-- 01 任务意图 -->
  <g filter="url(#shadow)">
    <rect x="80" y="130" width="510" height="110" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <rect x="80" y="130" width="6" height="110" rx="3" fill="#38bdf8"/>
    <text x="110" y="168" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">01 · 任务意图</text>
    <text x="110" y="196" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">任务目标离开聊天窗口后还可读吗？</text>
    <text x="110" y="222" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">spec · requirements brief · non-goals</text>
  </g>

  <!-- 02 上下文 -->
  <g filter="url(#shadow)">
    <rect x="610" y="130" width="510" height="110" rx="16" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <rect x="610" y="130" width="6" height="110" rx="3" fill="#22d3ee"/>
    <text x="640" y="168" fill="#67e8f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">02 · 上下文</text>
    <text x="640" y="196" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">AI 读的是 source，还是 generated mirror？</text>
    <text x="640" y="222" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">context-governance · advisory boundary</text>
  </g>

  <!-- 03 计划 -->
  <g filter="url(#shadow)">
    <rect x="80" y="262" width="510" height="110" rx="16" fill="url(#card)" stroke="#67e8f9" stroke-width="2"/>
    <rect x="80" y="262" width="6" height="110" rx="3" fill="#67e8f9"/>
    <text x="110" y="300" fill="#a5f3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">03 · 计划</text>
    <text x="110" y="328" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">AI 的执行路径能被别人审查吗？</text>
    <text x="110" y="354" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">plan · scope · verification · handoff</text>
  </g>

  <!-- 04 证据 -->
  <g filter="url(#shadow)">
    <rect x="610" y="262" width="510" height="110" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="610" y="262" width="6" height="110" rx="3" fill="#a78bfa"/>
    <text x="640" y="300" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">04 · 证据</text>
    <text x="640" y="328" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">关键结论有 source / test / log 支撑吗？</text>
    <text x="640" y="354" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">evidence_grade · freshness · limitations</text>
  </g>

  <!-- 05 Review -->
  <g filter="url(#shadow)">
    <rect x="80" y="394" width="510" height="110" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <rect x="80" y="394" width="6" height="110" rx="3" fill="#fbbf24"/>
    <text x="110" y="432" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">05 · Review</text>
    <text x="110" y="460" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Review finding 有证据锚点和 residual risk 吗？</text>
    <text x="110" y="486" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">review-finding.v1 · severity · owner</text>
  </g>

  <!-- 06 Knowledge -->
  <g filter="url(#shadow)">
    <rect x="610" y="394" width="510" height="110" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="610" y="394" width="6" height="110" rx="3" fill="#34d399"/>
    <text x="640" y="432" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">06 · Knowledge</text>
    <text x="640" y="460" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">这次踩的坑，下次 agent 能更早看到吗？</text>
    <text x="640" y="486" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">docs/solutions · spec-compound</text>
  </g>

  <!-- 结论 banner -->
  <g filter="url(#shadow)">
    <rect x="80" y="536" width="1040" height="120" rx="20" fill="#082f49" stroke="#7dd3fc" stroke-width="2"/>
    <text x="600" y="584" text-anchor="middle" fill="#e0f2fe" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">一半以上不确定？问题大概率不是 prompt 不够好</text>
    <text x="600" y="626" text-anchor="middle" fill="#7dd3fc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">你的 AI coding 还没有形成可委派的工程闭环</text>
  </g>
</svg>
