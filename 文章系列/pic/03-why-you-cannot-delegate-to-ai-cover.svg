<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">为什么你不敢把任务真正交给 AI</title>
  <desc id="desc">spec-first 系列第 3 篇封面：AI 委派的信任缺口与可治理工程闭环</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <!-- 网格 -->
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <!-- 左侧装饰竖线 -->
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- 系列标签 -->
  <rect x="100" y="120" width="180" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 系列 · 第 3 篇</text>
  <!-- 主标题 -->
  <text x="100" y="218" fill="#f8fafc" font-size="52" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">为什么你不敢把任务</text>
  <text x="100" y="284" fill="#f8fafc" font-size="52" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">真正交给 AI</text>
  <!-- 副标题 -->
  <text x="100" y="336" fill="#93c5fd" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">信任缺口 · 可委派性 · 可治理工程闭环</text>
  <!-- 底部标语 -->
  <rect x="100" y="368" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="400" fill="#64748b" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">你不是不敢让 AI 写代码。你是不敢让 AI 承担任务。</text>
  <!-- 右侧装饰 -->
  <g filter="url(#glow)" opacity="0.35">
    <circle cx="980" cy="255" r="160" fill="none" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="980" cy="255" r="110" fill="none" stroke="#06b6d4" stroke-width="1"/>
    <circle cx="980" cy="255" r="60" fill="none" stroke="#38bdf8" stroke-width="1"/>
    <circle cx="980" cy="255" r="18" fill="#0b2138" stroke="#7dd3fc" stroke-width="2"/>
    <text x="980" y="261" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, sans-serif" font-weight="700">AI</text>
  </g>
  <!-- spec-first 品牌 -->
  <text x="100" y="470" fill="#475569" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
