<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">AI 委派的五个信任缺口</title>
  <desc id="desc">意图缺口、上下文缺口、计划缺口、证据缺口、复用缺口——五个阻止开发者真正委派 AI 的工程问题。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">AI 委派的五个信任缺口</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">不是模型不够强，而是任务缺少可交付的工程边界</text>

  <!-- 缺口 1：意图 -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="440" height="130" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="120" cy="178" r="18" fill="#0b2138" stroke="#38bdf8" stroke-width="2"/>
    <text x="120" y="184" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, sans-serif" font-weight="700">01</text>
    <text x="152" y="178" fill="#f8fafc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">意图缺口</text>
    <text x="152" y="210" fill="#bae6fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">任务目标只停留在对话里</text>
    <text x="152" y="248" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">→ spec / requirements brief</text>
  </g>

  <!-- 缺口 2：上下文 -->
  <g filter="url(#shadow)">
    <rect x="680" y="140" width="440" height="130" rx="16" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <circle cx="720" cy="178" r="18" fill="#0b2138" stroke="#22d3ee" stroke-width="2"/>
    <text x="720" y="184" text-anchor="middle" fill="#67e8f9" font-size="16" font-family="Arial, sans-serif" font-weight="700">02</text>
    <text x="752" y="178" fill="#f8fafc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">上下文缺口</text>
    <text x="752" y="210" fill="#bae6fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">模型不知道哪些事实可信</text>
    <text x="752" y="248" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">→ context-governance · advisory</text>
  </g>

  <!-- 缺口 3：计划 -->
  <g filter="url(#shadow)">
    <rect x="80" y="300" width="440" height="130" rx="16" fill="url(#card)" stroke="#67e8f9" stroke-width="2"/>
    <circle cx="120" cy="338" r="18" fill="#0b2138" stroke="#67e8f9" stroke-width="2"/>
    <text x="120" y="344" text-anchor="middle" fill="#a5f3fc" font-size="16" font-family="Arial, sans-serif" font-weight="700">03</text>
    <text x="152" y="338" fill="#f8fafc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">计划缺口</text>
    <text x="152" y="370" fill="#bae6fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">执行路径没有被审查</text>
    <text x="152" y="408" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">→ plan · scope · non-goals</text>
  </g>

  <!-- 缺口 4：证据 -->
  <g filter="url(#shadow)">
    <rect x="680" y="300" width="440" height="130" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="720" cy="338" r="18" fill="#0b2138" stroke="#a78bfa" stroke-width="2"/>
    <text x="720" y="344" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial, sans-serif" font-weight="700">04</text>
    <text x="752" y="338" fill="#f8fafc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">证据缺口</text>
    <text x="752" y="370" fill="#ddd6fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">结论没有来源</text>
    <text x="752" y="408" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">→ provenance · freshness · limits</text>
  </g>

  <!-- 缺口 5：复用（居中） -->
  <g filter="url(#shadow)">
    <rect x="380" y="460" width="440" height="130" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <circle cx="420" cy="498" r="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="420" y="504" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, sans-serif" font-weight="700">05</text>
    <text x="452" y="498" fill="#f8fafc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">复用缺口</text>
    <text x="452" y="530" fill="#bbf7d0" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">这次踩过的坑，下次还会再踩</text>
    <text x="452" y="568" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">→ docs/solutions · spec-compound</text>
  </g>
</svg>
