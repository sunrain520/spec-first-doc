<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">Context Harness：正确上下文不是无限上下文</title>
  <desc id="desc">spec-first 系列第 4 篇封面：Context Harness，给模型更好的决策输入而不是更多上下文</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="180" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 系列 · 第 4 篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="52" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Context Harness</text>
  <text x="100" y="284" fill="#f8fafc" font-size="42" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">正确上下文不是无限上下文</text>
  <text x="100" y="336" fill="#93c5fd" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">决策输入质量 · Reuse-First · 边界可追溯</text>
  <rect x="100" y="368" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="400" fill="#64748b" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">不是给模型更多，而是给模型更好的决策输入。</text>
  <!-- 右侧装饰：漏斗形状暗示过滤 -->
  <g filter="url(#glow)" opacity="0.3">
    <path d="M880 140 L1100 140 L1020 260 L1020 380 L960 380 L960 260 Z" fill="none" stroke="#2563eb" stroke-width="2"/>
    <path d="M900 160 L1080 160 L1010 260 L1010 360 L970 360 L970 260 Z" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="990" y="200" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">无限上下文</text>
    <text x="990" y="330" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">正确输入</text>
  </g>
  <text x="100" y="470" fill="#475569" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
