<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">两种上下文不要混在一起</title>
  <desc id="desc">Host/Project Instruction Layer（稳定约束层，已加载）与 Task Context Bundle（动态精确收集）的对比与正确使用方式。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">两种上下文，不要混在一起</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">混淆后果：稳定指令被反复重读，当前任务证据被挤出去</text>

  <!-- 左：Host Instruction Layer -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="480" height="380" rx="22" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="320" y="186" text-anchor="middle" fill="#f8fafc" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Host / Project Instruction Layer</text>
    <text x="320" y="216" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">会话启动时已加载 · 稳定约束 agent 行为</text>
    <rect x="116" y="244" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="320" y="273" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">AGENTS.md / CLAUDE.md</text>
    <rect x="116" y="300" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="320" y="329" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">项目角色文档 / 行为约束</text>
    <rect x="116" y="356" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="320" y="385" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">workflow 边界 / 治理规则</text>
    <rect x="116" y="430" width="408" height="56" rx="10" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="320" y="458" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">✓ 默认复用已加载，不重复读取</text>
    <text x="320" y="478" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">reuse-first policy</text>
  </g>

  <!-- 中间 + 号 -->
  <text x="600" y="345" text-anchor="middle" fill="#475569" font-size="40" font-family="Arial, sans-serif">+</text>

  <!-- 右：Task Context Bundle -->
  <g filter="url(#shadow)">
    <rect x="640" y="140" width="480" height="380" rx="22" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
    <text x="880" y="186" text-anchor="middle" fill="#f8fafc" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Task Context Bundle</text>
    <text x="880" y="216" text-anchor="middle" fill="#67e8f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每次按当前任务精确收集 · 动态</text>
    <rect x="676" y="244" width="408" height="46" rx="10" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="880" y="273" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">当前请求 + plan / task pack</text>
    <rect x="676" y="300" width="408" height="46" rx="10" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="880" y="329" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">diff + changed files + nearby source</text>
    <rect x="676" y="356" width="408" height="46" rx="10" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="880" y="385" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">artifact summary + provider facts</text>
    <rect x="676" y="430" width="408" height="56" rx="10" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="880" y="458" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">✓ 按任务精确收集，不广播全量</text>
    <text x="880" y="478" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">summary-first · path-backed</text>
  </g>

  <text x="600" y="600" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">稳定指令前置，动态请求和证据后置——cache-friendly prompt layout</text>
</svg>
