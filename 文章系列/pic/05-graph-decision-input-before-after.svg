<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">有无 Graph 的决策输入对比</title>
  <desc id="desc">没有 Graph 时靠关键词和直觉猜，有 Graph 时按 symbol/调用方/文件关系定位后再读源码确认。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">图谱指路，源码定案</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">Graph 改变的不是模型智能，而是第一轮决策输入的质量</text>

  <!-- 左：没有 Graph -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="480" height="400" rx="22" fill="#0f172a" stroke="#64748b" stroke-width="2" stroke-dasharray="8 5"/>
    <text x="320" y="186" text-anchor="middle" fill="#94a3b8" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">没有 Graph</text>
    <text x="320" y="216" text-anchor="middle" fill="#64748b" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">靠关键词和直觉推断</text>
    <rect x="116" y="244" width="408" height="46" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="273" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">读当前文件</text>
    <rect x="116" y="300" width="408" height="46" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="329" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">靠文件名猜相关文件</text>
    <rect x="116" y="356" width="408" height="46" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="385" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">grep 关键词（结果太多）</text>
    <rect x="116" y="412" width="408" height="46" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="320" y="441" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">靠直觉判断影响面</text>
    <text x="320" y="510" text-anchor="middle" fill="#f87171" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">漏调用方 · 错估影响面 · 改错位置</text>
  </g>

  <!-- 箭头 -->
  <path d="M572 340 H616" stroke="#7dd3fc" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="594" y="320" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">加 Graph</text>

  <!-- 右：有 Graph -->
  <g filter="url(#shadow)">
    <rect x="640" y="140" width="480" height="400" rx="22" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="880" y="186" text-anchor="middle" fill="#f8fafc" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">有 Graph</text>
    <text x="880" y="216" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">带证据地定位，再读源码确认</text>
    <rect x="676" y="244" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="880" y="273" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">query: symbol 定义 + 调用方</text>
    <rect x="676" y="300" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="880" y="329" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">context: 文件关系 + 消费方式</text>
    <rect x="676" y="356" width="408" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="880" y="385" text-anchor="middle" fill="#e0f2fe" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">按图谱指向读源码确认</text>
    <rect x="676" y="412" width="408" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="880" y="441" text-anchor="middle" fill="#bbf7d0" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">primary evidence → 判断</text>
    <text x="880" y="510" text-anchor="middle" fill="#34d399" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">知道去哪里看 · 少漏调用方 · 影响面可追踪</text>
  </g>

  <text x="600" y="610" text-anchor="middle" fill="#475569" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">图谱是 Context/Evidence 层，不是 scope authority——它告诉你去哪里看，不替你做判断</text>
</svg>
