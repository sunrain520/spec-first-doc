<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">别再让 AI 猜你的代码：Graph 如何改变决策输入</title>
  <desc id="desc">spec-first 系列第 5 篇封面：代码图谱把"猜代码"变成"带证据地定位代码"</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="180" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 系列 · 第 5 篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="46" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">别再让 AI 猜你的代码</text>
  <text x="100" y="278" fill="#f8fafc" font-size="38" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Graph 如何改变决策输入</text>
  <text x="100" y="330" fill="#93c5fd" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">代码图谱 · Evidence 分级 · 图谱指路源码定案</text>
  <rect x="100" y="362" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="394" fill="#64748b" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">图谱解决的不是智能，而是决策输入质量。</text>
  <!-- 右侧：节点图装饰 -->
  <g filter="url(#glow)" opacity="0.3">
    <circle cx="960" cy="200" r="18" fill="#0b2138" stroke="#38bdf8" stroke-width="2"/>
    <circle cx="1040" cy="160" r="14" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="1080" cy="260" r="14" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="920" cy="310" r="14" fill="#0b2138" stroke="#22d3ee" stroke-width="1.5"/>
    <circle cx="1000" cy="340" r="12" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <line x1="960" y1="200" x2="1040" y2="160" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="960" y1="200" x2="1080" y2="260" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="960" y1="200" x2="920" y2="310" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="1080" y1="260" x2="1000" y2="340" stroke="#22d3ee" stroke-width="1"/>
    <line x1="920" y1="310" x2="1000" y2="340" stroke="#22d3ee" stroke-width="1"/>
    <text x="960" y="205" text-anchor="middle" fill="#7dd3fc" font-size="10" font-family="Arial, sans-serif">symbol</text>
  </g>
  <text x="100" y="470" fill="#475569" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
