<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">经验如何被下一次任务发现：按需引用流程</title>
  <desc id="desc">spec-plan 按 component/tags 检索 docs/solutions/，spec-work 按 context_refs 精确引用，不全量读取</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">经验如何被下一次任务发现</text>
  <text x="600" y="90" text-anchor="middle" fill="#93c5fd" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">按需引用，不全量读取——知识要可发现，但不能变成新的上下文负担</text>

  <!-- docs/solutions/ -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="280" height="340" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="220" y="178" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">docs/solutions/</text>
    <rect x="110" y="200" width="220" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="226" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">workflow-issues/</text>
    <rect x="110" y="252" width="220" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="278" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">architecture-patterns/</text>
    <rect x="110" y="304" width="220" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="330" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">tooling-decisions/</text>
    <rect x="110" y="356" width="220" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="382" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">developer-experience/</text>
    <rect x="110" y="408" width="220" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="434" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">documentation-gaps/</text>
  </g>

  <!-- spec-plan 检索 -->
  <path d="M362 260 H460" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="411" y="248" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">按 component</text>
  <text x="411" y="266" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">+ tags 检索</text>

  <g filter="url(#shadow)">
    <rect x="460" y="200" width="280" height="120" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="238" text-anchor="middle" fill="#7dd3fc" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-plan</text>
    <text x="600" y="268" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">找到相关 learning</text>
    <text x="600" y="294" text-anchor="middle" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">advisory context</text>
  </g>

  <!-- spec-work 引用 -->
  <path d="M362 380 H460" stroke="#34d399" stroke-width="3" marker-end="url(#arrow-green)"/>
  <text x="411" y="368" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">按 context_refs</text>
  <text x="411" y="386" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">精确引用</text>

  <g filter="url(#shadow)">
    <rect x="460" y="340" width="280" height="120" rx="16" fill="#082f49" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="378" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-work</text>
    <text x="600" y="408" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">精确引用相关 learning</text>
    <text x="600" y="434" text-anchor="middle" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">不全量读取</text>
  </g>

  <!-- applies_when 说明 -->
  <g filter="url(#shadow)">
    <rect x="800" y="200" width="320" height="260" rx="16" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="960" y="238" text-anchor="middle" fill="#c4b5fd" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">applies_when 的作用</text>
    <text x="820" y="272" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">不是"这个文档是关于什么"</text>
    <text x="820" y="298" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">而是"什么情况下有用"</text>
    <rect x="820" y="318" width="280" height="60" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="960" y="342" text-anchor="middle" fill="#ddd6fe" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">applies_when:</text>
    <text x="960" y="362" text-anchor="middle" fill="#ddd6fe" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">- "dispatch fails on large context"</text>
    <text x="820" y="408" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">遇到类似场景时自动发现</text>
    <text x="820" y="432" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">不需要人工记忆去找</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">知识要可发现，但不能变成新的上下文负担——按需精确，不广播全量</text>
</svg>
