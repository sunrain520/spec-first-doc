<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Source/Runtime 边界卡：五个判断问题</title>
  <desc id="desc">在让 AI 修改一个文件之前，用五个问题快速判断它是 source-of-truth 还是 generated runtime mirror。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">修改前先问五个问题</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">让 source-of-truth 在执行前就清晰可见</text>

  <!-- Q1 -->
  <g filter="url(#shadow)">
    <rect x="80" y="130" width="510" height="110" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <rect x="80" y="130" width="6" height="110" rx="3" fill="#38bdf8"/>
    <text x="110" y="166" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">01 · 人维护还是生成的？</text>
    <text x="110" y="194" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">skills/ src/cli/ docs/ → 人维护</text>
    <text x="110" y="222" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.claude/ .codex/ .agents/skills/ → 生成的</text>
  </g>

  <!-- Q2 -->
  <g filter="url(#shadow)">
    <rect x="610" y="130" width="510" height="110" rx="16" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <rect x="610" y="130" width="6" height="110" rx="3" fill="#22d3ee"/>
    <text x="640" y="166" fill="#67e8f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">02 · 上游模板或 generator 在哪里？</text>
    <text x="640" y="194" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">找到生成它的 source 文件</text>
    <text x="640" y="222" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">grep syncBundledAssets src/cli/plugin.js</text>
  </g>

  <!-- Q3 -->
  <g filter="url(#shadow)">
    <rect x="80" y="262" width="510" height="110" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="80" y="262" width="6" height="110" rx="3" fill="#34d399"/>
    <text x="110" y="298" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">03 · 修改后如何重新生成？</text>
    <text x="110" y="326" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">修 source 后运行同步命令</text>
    <text x="110" y="354" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first init</text>
  </g>

  <!-- Q4 -->
  <g filter="url(#shadow)">
    <rect x="610" y="262" width="510" height="110" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="610" y="262" width="6" height="110" rx="3" fill="#a78bfa"/>
    <text x="640" y="298" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">04 · 消费者读的是 source 还是 mirror？</text>
    <text x="640" y="326" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Claude 读 .claude/，Codex 读 .agents/</text>
    <text x="640" y="354" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">source 在 skills/ agents/ templates/</text>
  </g>

  <!-- Q5 -->
  <g filter="url(#shadow)">
    <rect x="80" y="394" width="510" height="110" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <rect x="80" y="394" width="6" height="110" rx="3" fill="#fbbf24"/>
    <text x="110" y="430" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">05 · 需要记录 drift 为 learning 吗？</text>
    <text x="110" y="458" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">source/runtime 已漂移 → 记录 workflow issue</text>
    <text x="110" y="486" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">docs/solutions/workflow-issues/</text>
  </g>

  <!-- 结论 banner -->
  <g filter="url(#shadow)">
    <rect x="80" y="536" width="1040" height="80" rx="18" fill="#082f49" stroke="#7dd3fc" stroke-width="2"/>
    <text x="600" y="572" text-anchor="middle" fill="#e0f2fe" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">这是真源头，还是只是当前被消费的副本？</text>
    <text x="600" y="602" text-anchor="middle" fill="#7dd3fc" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">如果是副本 → 找上游 → 修 source → 刷新 runtime</text>
  </g>
</svg>
