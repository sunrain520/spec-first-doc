<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">不要修生成物，要修 Source-of-Truth</title>
  <desc id="desc">spec-first 系列第 6 篇封面：AI coding 中最隐蔽的系统漂移来自修了生成物而不是真正的 source-of-truth</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="180" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 系列 · 第 6 篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="46" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">不要修生成物</text>
  <text x="100" y="278" fill="#f8fafc" font-size="38" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">要修 Source-of-Truth</text>
  <text x="100" y="330" fill="#93c5fd" font-size="22" font-family="Arial, 'PingFang SC', sans-serif">Governance Harness · 单向生成链 · 防止系统漂移</text>
  <rect x="100" y="362" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="394" fill="#64748b" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">能被 AI 读到的文件，不一定就是应该被你修改的文件。</text>
  <!-- 右侧：单向箭头装饰 -->
  <g filter="url(#glow)" opacity="0.3">
    <rect x="880" y="160" width="200" height="50" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="2"/>
    <text x="980" y="191" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">skills/ (source)</text>
    <path d="M980 210 L980 250" stroke="#38bdf8" stroke-width="3" marker-end="url(#arr)"/>
    <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto"><path d="M1,1 L5,9 L9,1 Z" fill="#38bdf8"/></marker></defs>
    <rect x="880" y="260" width="200" height="50" rx="10" fill="#0b2138" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="980" y="291" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">.agents/ (runtime)</text>
    <text x="980" y="340" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">← 不要直接修这里</text>
  </g>
  <text x="100" y="470" fill="#475569" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
