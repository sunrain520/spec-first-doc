<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">单向生成链：source → runtime</title>
  <desc id="desc">spec-first 的单向生成链：skills/agents/templates 是 source-of-truth，通过 spec-first init 生成 .claude/.codex/.agents/skills 等 runtime mirror，修改必须从 source 开始。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="source-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082f49"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#f87171"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="30" fill="url(#bg)"/>
  <text x="600" y="60" text-anchor="middle" fill="#e0f2fe" font-size="34" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">单向生成链：修 source，不修 runtime</text>
  <text x="600" y="96" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif">runtime 副本是可重新生成的缓存，不是可手工维护的配置文件</text>

  <!-- Source 层 -->
  <g filter="url(#shadow)">
    <rect x="80" y="140" width="1040" height="140" rx="18" fill="url(#source-grad)" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="178" text-anchor="middle" fill="#6ee7b7" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Source-of-Truth（人维护，checked-in，可 review）</text>
    <rect x="116" y="198" width="220" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="226" y="229" text-anchor="middle" fill="#bbf7d0" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">skills/</text>
    <rect x="356" y="198" width="220" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="466" y="229" text-anchor="middle" fill="#bbf7d0" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">agents/</text>
    <rect x="596" y="198" width="220" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="706" y="229" text-anchor="middle" fill="#bbf7d0" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">templates/</text>
    <rect x="836" y="198" width="248" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="960" y="229" text-anchor="middle" fill="#bbf7d0" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">src/cli/ · docs/</text>
  </g>

  <!-- 生成链箭头 -->
  <path d="M600 282 L600 340" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <rect x="460" y="296" width="280" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="600" y="320" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first init / syncBundledAssets()</text>

  <!-- Runtime 层 -->
  <g filter="url(#shadow)">
    <rect x="80" y="348" width="1040" height="140" rx="18" fill="#0f172a" stroke="#64748b" stroke-width="2" stroke-dasharray="8 5"/>
    <text x="600" y="386" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Generated Runtime Mirror（生成的，不直接修改）</text>
    <rect x="116" y="406" width="220" height="50" rx="10" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
    <text x="226" y="437" text-anchor="middle" fill="#64748b" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">.claude/</text>
    <rect x="356" y="406" width="220" height="50" rx="10" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
    <text x="466" y="437" text-anchor="middle" fill="#64748b" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">.codex/</text>
    <rect x="596" y="406" width="220" height="50" rx="10" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
    <text x="706" y="437" text-anchor="middle" fill="#64748b" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">.agents/skills/</text>
    <rect x="836" y="406" width="248" height="50" rx="10" fill="#111c2e" stroke="#475569" stroke-width="1.5"/>
    <text x="960" y="437" text-anchor="middle" fill="#64748b" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace">docs/contexts/</text>
  </g>

  <!-- 错误箭头（禁止直接修改 runtime） -->
  <path d="M600 490 L600 548" stroke="#f87171" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow-red)"/>

  <!-- 结论 -->
  <g filter="url(#shadow)">
    <rect x="80" y="556" width="1040" height="80" rx="18" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="600" y="592" text-anchor="middle" fill="#fca5a5" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 直接修改 runtime → 短期有效，下次 init 被覆盖，source/runtime 漂移</text>
    <text x="600" y="622" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✓ 修改 source → 运行 spec-first init → runtime 刷新，持久有效</text>
  </g>
</svg>
