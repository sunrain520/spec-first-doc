<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">从一句话到上线：spec-first 完整流程总览</title>
  <desc id="desc">微信公众号 2.35:1 封面图：op-00 第二季总览，两张地图 + 完整链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.55" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="0.52" stop-color="#22d3ee"/><stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.10" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="73" x2="1200" y2="73"/><line x1="0" y1="146" x2="1200" y2="146"/>
    <line x1="0" y1="219" x2="1200" y2="219"/><line x1="0" y1="292" x2="1200" y2="292"/>
    <line x1="0" y1="365" x2="1200" y2="365"/><line x1="0" y1="438" x2="1200" y2="438"/>
    <line x1="200" y1="0" x2="200" y2="511"/><line x1="400" y1="0" x2="400" y2="511"/>
    <line x1="600" y1="0" x2="600" y2="511"/><line x1="800" y1="0" x2="800" y2="511"/><line x1="1000" y1="0" x2="1000" y2="511"/>
  </g>

  <text x="90" y="92" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#38bdf8" letter-spacing="2">Spec-First · 第二季 · 项目实操 · 总览</text>

  <text x="90" y="182" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="60" font-weight="700" fill="#f8fafc">从一句话到上线</text>
  <text x="90" y="262" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="60" font-weight="700" fill="#f8fafc">我跑完了整个流程</text>

  <text x="92" y="330" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="29" fill="#cbd5e1">先选地图，再走链路——不是所有人都走同一条路</text>
  <rect x="92" y="360" width="64" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- 右下:两张地图示意 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" font-weight="600">
    <g transform="translate(640,400)">
      <rect width="240" height="78" rx="10" fill="#0b3a52" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="120" y="32" text-anchor="middle" fill="#5eead4" font-size="18">地图一 · 需求模式</text>
      <text x="120" y="58" text-anchor="middle" fill="#cbd5e1" font-size="15">0-1 / 1-10 / 10-100</text>
    </g>
    <g transform="translate(900,400)">
      <rect width="240" height="78" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.8"/>
      <text x="120" y="32" text-anchor="middle" fill="#a5b4fc" font-size="18">地图二 · 仓库拓扑</text>
      <text x="120" y="58" text-anchor="middle" fill="#cbd5e1" font-size="15">单仓 / 多模块 / 多仓</text>
    </g>
  </g>

  <text x="1110" y="92" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#64748b">op-00 · 两张地图 + 完整链路</text>
</svg>
