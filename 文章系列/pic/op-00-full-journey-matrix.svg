<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">两张地图的组合：需求模式 × 仓库拓扑</title>
  <desc id="d">需求模式与仓库拓扑组合成矩阵，对应第二季四篇骨架案例的坐标。</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/></linearGradient></defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
  </g>
  <text x="60" y="76" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">两张地图组合 → 链路的形状</text>
  <text x="60" y="114" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">同一需求模式落在不同拓扑上，链路重点完全不同——这就是后面几篇的坐标</text>

  <!-- 矩阵表头 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="180" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#64748b">模式＼拓扑</text>
    <rect x="310" y="158" width="270" height="44" rx="6" fill="#0c1a2e" stroke="#1e3a5f"/>
    <text x="445" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#5eead4">单仓单项目</text>
    <rect x="590" y="158" width="270" height="44" rx="6" fill="#0c1a2e" stroke="#1e3a5f"/>
    <text x="725" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#7dd3fc">单仓多模块</text>
    <rect x="870" y="158" width="270" height="44" rx="6" fill="#0c1a2e" stroke="#1e3a5f"/>
    <text x="1005" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#a5b4fc">多仓工作区</text>

    <!-- 行标签 -->
    <text x="180" y="262" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">0-1</text>
    <text x="180" y="372" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">1-10</text>
    <text x="180" y="482" text-anchor="middle" font-size="20" font-weight="700" fill="#cbd5e1">10-100</text>

    <!-- 单元格:有代表性的4个 -->
    <!-- 0-1 × 单仓 = op-02 -->
    <rect x="310" y="218" width="270" height="84" rx="8" fill="#102a44" stroke="#38bdf8" stroke-width="2"/>
    <text x="330" y="252" font-size="19" font-weight="700" fill="#5eead4">op-02</text>
    <text x="330" y="280" font-size="15" fill="#cbd5e1">最简链路，重头在探索方向</text>
    <!-- 1-10 × 单仓 = op-01 高亮 -->
    <rect x="310" y="328" width="270" height="84" rx="8" fill="#0b3a52" stroke="#5eead4" stroke-width="2.5"/>
    <text x="330" y="362" font-size="19" font-weight="700" fill="#5eead4">op-01 ←本季首跑</text>
    <text x="330" y="390" font-size="15" fill="#a5f3e8">最常见，练"刚刚好"的手感</text>
    <!-- 10-100 × 多模块 = op-03 -->
    <rect x="590" y="438" width="270" height="84" rx="8" fill="#102a44" stroke="#38bdf8" stroke-width="2"/>
    <text x="610" y="472" font-size="19" font-weight="700" fill="#7dd3fc">op-03</text>
    <text x="610" y="500" font-size="15" fill="#cbd5e1">链路变长，每道关都不能省</text>
    <!-- 多仓列整列 = op-04 -->
    <rect x="870" y="218" width="270" height="304" rx="8" fill="#1a2a4a" stroke="#818cf8" stroke-width="2"/>
    <text x="1005" y="356" text-anchor="middle" font-size="19" font-weight="700" fill="#a5b4fc">op-04</text>
    <text x="1005" y="386" text-anchor="middle" font-size="15" fill="#cbd5e1">横切所有模式</text>
    <text x="1005" y="410" text-anchor="middle" font-size="15" fill="#cbd5e1">每步先钉 target_repo</text>

    <!-- 灰格(非重点组合) -->
    <g fill="#0a1626" stroke="#162033">
      <rect x="590" y="218" width="270" height="84" rx="8"/>
      <rect x="310" y="438" width="270" height="84" rx="8"/>
      <rect x="590" y="328" width="270" height="84" rx="8"/>
    </g>
    <text x="725" y="266" text-anchor="middle" font-size="14" fill="#475569">·</text>
    <text x="445" y="486" text-anchor="middle" font-size="14" fill="#475569">·</text>
    <text x="725" y="376" text-anchor="middle" font-size="14" fill="#475569">·</text>
  </g>

  <rect x="60" y="556" width="1080" height="68" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
  <text x="600" y="588" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" fill="#e2e8f0">越往右下，链路越长、边界越吃紧——但中间的 plan→work→review→compound 主干不变</text>
  <text x="600" y="614" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#94a3b8">先把 op-01 的主干吃透，换坐标时只需关注变化的部分</text>
</svg>
