<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">spec-first 完整工作流链路：七个节点的形状</title>
  <desc id="d">环境就绪 → 需求收敛 → 计划 → 计划review → 任务切片(可选) → 执行 → 代码review → 经验沉淀。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/></linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M0,0 L11,6 L0,12 Z" fill="#38bdf8"/></marker>
    <marker id="arrL" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M0,0 L11,6 L0,12 Z" fill="#818cf8"/></marker>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.06" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="400" y1="0" x2="400" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
  </g>
  <text x="60" y="72" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">完整链路的形状：七个节点</text>
  <text x="60" y="110" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">前松后紧地接力，每个节点的输出都是下一个的输入</text>

  <!-- 第零步 横跨 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="140" width="1080" height="64" rx="10" fill="#0c1a2e" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="84" y="180" font-size="20" font-weight="700" fill="#94a3b8">第零步 · 环境就绪</text>
    <text x="320" y="180" font-size="17" fill="#cbd5e1">init → mcp-setup → graph-bootstrap（一次性地基，顺序依赖，沉淀"环境事实"）</text>
  </g>

  <!-- 七节点 2列布局 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- 1 需求收敛 -->
    <g transform="translate(60,240)">
      <rect width="500" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="2"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#7dd3fc">① 需求收敛</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">吃：一句话需求 + 你的回答　吐：requirements（WHAT）</text>
    </g>
    <!-- 2 计划 -->
    <g transform="translate(640,240)">
      <rect width="500" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="2"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#7dd3fc">② 计划形成</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">吃：requirements　吐：plan（地图和护栏，非轨道）</text>
    </g>
    <!-- 3 计划review -->
    <g transform="translate(640,356)">
      <rect width="500" height="92" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="2"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#a5b4fc">③ 计划 review</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">零代码成本纠错——性价比最高、最常被省</text>
    </g>
    <!-- 4 任务切片 -->
    <g transform="translate(60,356)">
      <rect width="500" height="92" rx="12" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.8" stroke-dasharray="5 3"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#64748b">④ 任务切片（可选）</text>
      <text x="24" y="72" font-size="17" fill="#94a3b8">只重排顺序，不改范围；小需求直接跳过</text>
    </g>
    <!-- 5 执行 -->
    <g transform="translate(60,472)">
      <rect width="500" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="2"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#7dd3fc">⑤ 执行</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">五个控制点：边界受控执行（Execution Harness）</text>
    </g>
    <!-- 6 代码review -->
    <g transform="translate(640,472)">
      <rect width="500" height="92" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="2"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#a5b4fc">⑥ 代码审查</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">finding 带：证据 / 严重度 / 归属 / 验证方式</text>
    </g>
    <!-- 7 经验沉淀 -->
    <g transform="translate(350,588)">
      <rect width="500" height="92" rx="12" fill="#172554" stroke="#818cf8" stroke-width="2.5"/>
      <text x="24" y="40" font-size="22" font-weight="700" fill="#a5b4fc">⑦ 经验沉淀</text>
      <text x="24" y="72" font-size="17" fill="#cbd5e1">按需检索的可复用经验（Knowledge Harness）</text>
    </g>
  </g>

  <!-- 箭头连接 -->
  <g stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)" opacity="0.85" fill="none">
    <line x1="310" y1="332" x2="310" y2="350"/>
    <!-- 1→2 横向 -->
    <path d="M560 286 L640 286"/>
    <!-- 2→3 -->
    <line x1="890" y1="332" x2="890" y2="352"/>
    <!-- 3→4(可选) -->
    <path d="M640 402 L564 402" stroke-dasharray="5 3"/>
    <!-- 4→5 -->
    <line x1="310" y1="448" x2="310" y2="468"/>
    <!-- 5→6 -->
    <path d="M560 518 L640 518"/>
    <!-- 6→7 -->
    <path d="M890 564 L890 588 L850 624"/>
  </g>
  <!-- 闭环回流 7→下一个需求 -->
  <g stroke="#818cf8" stroke-width="2" marker-end="url(#arrL)" opacity="0.7" fill="none" stroke-dasharray="6 4">
    <path d="M350 634 L30 634 L30 286 L60 286"/>
  </g>
  <text x="84" y="724" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#818cf8">经验回流给下一个需求 → 闭环</text>

  <!-- 主线边界 -->
  <rect x="60" y="788" width="1080" height="86" rx="12" fill="#0c1a2e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="90" y="826" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#5eead4">Scripts prepare facts · LLM workflows decide meaning</text>
  <text x="90" y="856" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#cbd5e1">脚本负责"是什么"（事实），workflow 负责"那又怎样"（语义）——这是贯穿七节点的主线</text>
</svg>
