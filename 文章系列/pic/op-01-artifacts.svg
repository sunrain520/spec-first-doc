<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-01 产物清单：每一步在仓库里落下的文件</title>
  <desc id="d">从 .spec-first 配置到 requirements、plan、代码测试、compound 知识的完整产物树。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
  </g>

  <text x="60" y="76" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">产物清单：每一步在仓库里落下什么</text>
  <text x="60" y="114" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">不是临时聊天记录，是可追溯、可复用的工程产物</text>

  <!-- 目录树(等宽字体) -->
  <g font-family="'SF Mono',Menlo,Consolas,monospace" font-size="21" fill="#cbd5e1">
    <rect x="60" y="150" width="540" height="470" rx="12" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="86" y="196" fill="#5eead4" font-weight="700">todo-app/</text>
    <text x="110" y="234" fill="#7dd3fc">.spec-first/</text>
    <text x="134" y="270" fill="#94a3b8">config/tool-facts.json</text>
    <text x="134" y="304" fill="#94a3b8">config/runtime-capabilities.json</text>
    <text x="110" y="344" fill="#7dd3fc">specs/tag-filter/</text>
    <text x="134" y="380" fill="#e2e8f0">requirements.md　<tspan fill="#64748b">← brainstorm</tspan></text>
    <text x="134" y="414" fill="#e2e8f0">plan.md　<tspan fill="#64748b">← plan + doc-review</tspan></text>
    <text x="110" y="454" fill="#7dd3fc">src/</text>
    <text x="134" y="490" fill="#e2e8f0">filter.ts　<tspan fill="#64748b">← work</tspan></text>
    <text x="134" y="524" fill="#e2e8f0">filter.test.ts　<tspan fill="#64748b">← work</tspan></text>
    <text x="110" y="564" fill="#7dd3fc">docs/solutions/</text>
    <text x="134" y="600" fill="#e2e8f0">tag-filter-grouping.md　<tspan fill="#64748b">← compound</tspan></text>
  </g>

  <!-- 右侧:每类产物的价值 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <g>
      <rect x="640" y="150" width="500" height="106" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="666" y="190" font-size="21" font-weight="700" fill="#7dd3fc">config — 环境事实</text>
      <text x="666" y="224" font-size="18" fill="#cbd5e1">下游 workflow 读它判断有哪些能力</text>
    </g>
    <g>
      <rect x="640" y="270" width="500" height="106" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="666" y="310" font-size="21" font-weight="700" fill="#7dd3fc">requirements + plan — 决策输入</text>
      <text x="666" y="344" font-size="18" fill="#cbd5e1">边界 / 约束 / 禁区，work 不用猜</text>
    </g>
    <g>
      <rect x="640" y="390" width="500" height="106" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="666" y="430" font-size="21" font-weight="700" fill="#7dd3fc">代码 + 测试 — 可验证产出</text>
      <text x="666" y="464" font-size="18" fill="#cbd5e1">改动在 plan 边界内、有测试兜底</text>
    </g>
    <g>
      <rect x="640" y="510" width="500" height="106" rx="12" fill="#172554" stroke="#818cf8" stroke-width="2"/>
      <text x="666" y="550" font-size="21" font-weight="700" fill="#a5b4fc">solutions — 经验复利</text>
      <text x="666" y="584" font-size="18" fill="#cbd5e1">下次类似需求，AI 先检索到不再踩坑</text>
    </g>
  </g>
</svg>
