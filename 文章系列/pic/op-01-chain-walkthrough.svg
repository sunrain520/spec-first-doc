<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1040" viewBox="0 0 1200 1040" role="img" aria-labelledby="t d">
  <title id="t">op-01 本例链路走查：每步的动作与产物</title>
  <desc id="d">环境就绪 → brainstorm → plan → doc-review →（write-tasks 本例跳过）→ work → code-review → compound 链路与产物。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="1040" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="1040"/><line x1="800" y1="0" x2="800" y2="1040"/>
  </g>

  <text x="60" y="74" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">本例链路走查：跑什么 · 产出什么</text>
  <text x="60" y="112" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">左列动作，右列在仓库里落下的产物；灰色节点本例跳过</text>

  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- step0 环境就绪 -->
    <g>
      <rect x="60" y="150" width="430" height="82" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2"/>
      <text x="84" y="186" font-size="22" font-weight="700" fill="#5eead4">第零步 · 环境就绪</text>
      <text x="84" y="214" font-size="17" fill="#cbd5e1">init + mcp-setup（每项目一次）</text>
      <rect x="700" y="158" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="186" font-size="16" fill="#94a3b8">.spec-first/config/tool-facts.json</text>
      <text x="722" y="210" font-size="16" fill="#94a3b8">runtime-capabilities.json</text>
    </g>
    <!-- step1 brainstorm -->
    <g>
      <rect x="60" y="252" width="430" height="82" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="288" font-size="22" font-weight="700" fill="#7dd3fc">第一步 · brainstorm 收敛需求</text>
      <text x="84" y="316" font-size="17" fill="#cbd5e1">把边界 / 约束 / 禁区问清楚</text>
      <rect x="700" y="260" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="288" font-size="16" fill="#94a3b8">docs/brainstorms/…-requirements.md</text>
      <text x="722" y="312" font-size="16" fill="#94a3b8">（WHAT / WHY，不含 HOW）</text>
    </g>
    <!-- step2 plan -->
    <g>
      <rect x="60" y="354" width="430" height="82" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="390" font-size="22" font-weight="700" fill="#7dd3fc">第二步 · plan 定方案</text>
      <text x="84" y="418" font-size="17" fill="#cbd5e1">颗粒度对齐风险，约束边界非步骤</text>
      <rect x="700" y="362" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="390" font-size="16" fill="#94a3b8">docs/plans/…-plan.md</text>
      <text x="722" y="414" font-size="16" fill="#94a3b8">绑定 requirements</text>
    </g>
    <!-- step3 doc-review -->
    <g>
      <rect x="60" y="456" width="430" height="82" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="1.8"/>
      <text x="84" y="492" font-size="22" font-weight="700" fill="#a5b4fc">第三步 · doc-review 审计划</text>
      <text x="84" y="520" font-size="17" fill="#cbd5e1">回报最高、最容易被省（本例轻量）</text>
      <rect x="700" y="464" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="492" font-size="16" fill="#94a3b8">审查意见 → 回填 plan</text>
      <text x="722" y="516" font-size="16" fill="#94a3b8">（写代码前拦住问题）</text>
    </g>
    <!-- step4 write-tasks 跳过 -->
    <g opacity="0.55">
      <rect x="60" y="558" width="430" height="82" rx="12" fill="#0e1a2c" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 5"/>
      <text x="84" y="594" font-size="22" font-weight="700" fill="#94a3b8">第四步 · write-tasks 切任务包</text>
      <text x="84" y="622" font-size="17" fill="#64748b">本例 &lt; 3 单元、无跨模块依赖 → 跳过</text>
      <rect x="700" y="566" width="440" height="66" rx="10" fill="#0e1a2c" stroke="#334155" stroke-dasharray="6 5"/>
      <text x="722" y="603" font-size="16" fill="#64748b">（大需求才产 docs/tasks/…-tasks.md）</text>
    </g>
    <!-- step5 work -->
    <g>
      <rect x="60" y="660" width="430" height="82" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="696" font-size="22" font-weight="700" fill="#7dd3fc">第五步 · work 执行</text>
      <text x="84" y="724" font-size="17" fill="#cbd5e1">边界内受控写代码 + 测试</text>
      <rect x="700" y="668" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="696" font-size="16" fill="#94a3b8">src 代码改动 + 测试 + CHANGELOG</text>
      <text x="722" y="720" font-size="16" fill="#94a3b8">（不超出 plan 边界）</text>
    </g>
    <!-- step6 code-review -->
    <g>
      <rect x="60" y="762" width="430" height="82" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="1.8"/>
      <text x="84" y="798" font-size="22" font-weight="700" fill="#a5b4fc">第六步 · code-review 审代码</text>
      <text x="84" y="826" font-size="17" fill="#cbd5e1">六维 + 带证据的 finding</text>
      <rect x="700" y="770" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="798" font-size="16" fill="#94a3b8">finding：证据/严重度/owner/验证</text>
      <text x="722" y="822" font-size="16" fill="#94a3b8">（按仓库已有规则审）</text>
    </g>
    <!-- step7 compound -->
    <g>
      <rect x="60" y="864" width="430" height="82" rx="12" fill="#172554" stroke="#818cf8" stroke-width="2"/>
      <text x="84" y="900" font-size="22" font-weight="700" fill="#a5b4fc">第七步 · compound 沉淀</text>
      <text x="84" y="928" font-size="17" fill="#cbd5e1">把这次判断变成下次输入</text>
      <rect x="700" y="872" width="440" height="66" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="900" font-size="16" fill="#94a3b8">docs/solutions/…（可复用经验）</text>
      <text x="722" y="924" font-size="16" fill="#94a3b8">（下次类似需求先检索到）</text>
    </g>
  </g>

  <!-- 纵向连接箭头 -->
  <g stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)" opacity="0.85">
    <line x1="275" y1="232" x2="275" y2="248"/>
    <line x1="275" y1="334" x2="275" y2="350"/>
    <line x1="275" y1="436" x2="275" y2="452"/>
    <line x1="275" y1="538" x2="275" y2="554"/>
    <line x1="275" y1="640" x2="275" y2="656"/>
    <line x1="275" y1="742" x2="275" y2="758"/>
    <line x1="275" y1="844" x2="275" y2="860"/>
  </g>
  <!-- 产物虚线连接 -->
  <g stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="490" y1="191" x2="700" y2="191"/>
    <line x1="490" y1="293" x2="700" y2="293"/>
    <line x1="490" y1="395" x2="700" y2="395"/>
    <line x1="490" y1="497" x2="700" y2="497"/>
    <line x1="490" y1="599" x2="700" y2="599"/>
    <line x1="490" y1="701" x2="700" y2="701"/>
    <line x1="490" y1="803" x2="700" y2="803"/>
    <line x1="490" y1="905" x2="700" y2="905"/>
  </g>

  <text x="490" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">动作</text>
  <text x="920" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">产物</text>
</svg>
