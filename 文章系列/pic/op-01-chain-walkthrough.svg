<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">op-01 本例六步走查：每步的动作与产物</title>
  <desc id="d">环境就绪 → brainstorm → plan → doc-review → work → review → compound 链路与产物。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="400" y1="0" x2="400" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
  </g>

  <text x="60" y="74" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">本例六步走查：跑什么 · 产出什么</text>
  <text x="60" y="112" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">左列动作，右列在仓库里落下的产物</text>

  <!-- 六步:每步一行,左动作右产物 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- step0 环境就绪 -->
    <g>
      <rect x="60" y="150" width="430" height="92" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2"/>
      <text x="84" y="190" font-size="23" font-weight="700" fill="#5eead4">第零步 · 环境就绪</text>
      <text x="84" y="222" font-size="18" fill="#cbd5e1">init + mcp-setup（每项目一次）</text>
      <rect x="700" y="158" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="190" font-size="17" fill="#94a3b8">.spec-first/config/tool-facts.json</text>
      <text x="722" y="216" font-size="17" fill="#94a3b8">runtime-capabilities.json</text>
    </g>
    <!-- step1 brainstorm -->
    <g>
      <rect x="60" y="262" width="430" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="302" font-size="23" font-weight="700" fill="#7dd3fc">① brainstorm · 收敛需求</text>
      <text x="84" y="334" font-size="18" fill="#cbd5e1">把边界 / 约束 / 禁区问清楚</text>
      <rect x="700" y="270" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="302" font-size="17" fill="#94a3b8">requirements.md</text>
      <text x="722" y="328" font-size="17" fill="#94a3b8">（WHAT / WHY，不含 HOW）</text>
    </g>
    <!-- step2 plan -->
    <g>
      <rect x="60" y="374" width="430" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="414" font-size="23" font-weight="700" fill="#7dd3fc">② plan · 定方案</text>
      <text x="84" y="446" font-size="18" fill="#cbd5e1">颗粒度对齐风险</text>
      <rect x="700" y="382" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="414" font-size="17" fill="#94a3b8">plan.md（步骤 / 边界 / 验证点）</text>
      <text x="722" y="440" font-size="17" fill="#94a3b8">绑定 requirements</text>
    </g>
    <!-- step3 doc-review -->
    <g>
      <rect x="60" y="486" width="430" height="92" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="1.8"/>
      <text x="84" y="526" font-size="23" font-weight="700" fill="#a5b4fc">③ doc-review · 审计划</text>
      <text x="84" y="558" font-size="18" fill="#cbd5e1">回报最高、最容易被省</text>
      <rect x="700" y="494" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="526" font-size="17" fill="#94a3b8">审查意见 → 回填 plan</text>
      <text x="722" y="552" font-size="17" fill="#94a3b8">（写代码前拦住问题）</text>
    </g>
    <!-- step4 work -->
    <g>
      <rect x="60" y="598" width="430" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="638" font-size="23" font-weight="700" fill="#7dd3fc">④ work · 执行</text>
      <text x="84" y="670" font-size="18" fill="#cbd5e1">按 plan 写代码 + 测试</text>
      <rect x="700" y="606" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="638" font-size="17" fill="#94a3b8">代码改动 + 测试</text>
      <text x="722" y="664" font-size="17" fill="#94a3b8">（不超出 plan 边界）</text>
    </g>
    <!-- step5 review+compound -->
    <g>
      <rect x="60" y="710" width="430" height="92" rx="12" fill="#1a2a4a" stroke="#818cf8" stroke-width="2"/>
      <text x="84" y="750" font-size="23" font-weight="700" fill="#a5b4fc">⑤ review → compound</text>
      <text x="84" y="782" font-size="18" fill="#cbd5e1">审代码 + 沉淀经验</text>
      <rect x="700" y="718" width="440" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="722" y="750" font-size="17" fill="#94a3b8">review 意见 + 复用知识</text>
      <text x="722" y="776" font-size="17" fill="#94a3b8">（下次更快）</text>
    </g>
  </g>

  <!-- 纵向连接箭头 -->
  <g stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)" opacity="0.85">
    <line x1="275" y1="242" x2="275" y2="258"/>
    <line x1="275" y1="354" x2="275" y2="370"/>
    <line x1="275" y1="466" x2="275" y2="482"/>
    <line x1="275" y1="578" x2="275" y2="594"/>
    <line x1="275" y1="690" x2="275" y2="706"/>
  </g>
  <!-- 产物虚线连接 -->
  <g stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="490" y1="196" x2="700" y2="196"/>
    <line x1="490" y1="308" x2="700" y2="308"/>
    <line x1="490" y1="420" x2="700" y2="420"/>
    <line x1="490" y1="532" x2="700" y2="532"/>
    <line x1="490" y1="644" x2="700" y2="644"/>
    <line x1="490" y1="756" x2="700" y2="756"/>
  </g>

  <text x="490" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">动作</text>
  <text x="920" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">产物</text>
</svg>
