<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-01 案例定位：给待办应用加标签过滤</title>
  <desc id="d">两张地图上的坐标：需求模式 1-10 增量 × 仓库拓扑 单仓单项目。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
  </g>

  <text x="60" y="76" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">先在两张地图上定位，再决定走哪条链路</text>
  <text x="60" y="114" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" fill="#94a3b8">本例：给待办应用加「按标签过滤」功能</text>

  <!-- 地图一:需求模式 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="190" font-size="24" font-weight="700" fill="#38bdf8">地图一 · 需求模式</text>
    <g>
      <rect x="60" y="212" width="340" height="70" rx="10" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="82" y="245" font-size="22" fill="#cbd5e1" font-weight="600">0-1</text>
      <text x="82" y="270" font-size="17" fill="#64748b">全新产品，方向未定</text>
    </g>
    <g>
      <rect x="60" y="294" width="340" height="78" rx="10" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
      <text x="82" y="328" font-size="22" fill="#5eead4" font-weight="700">1-10　← 本例在这</text>
      <text x="82" y="356" font-size="17" fill="#a5f3e8">已有产品，增量功能</text>
    </g>
    <g>
      <rect x="60" y="384" width="340" height="70" rx="10" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="82" y="417" font-size="22" fill="#cbd5e1" font-weight="600">10-100</text>
      <text x="82" y="442" font-size="17" fill="#64748b">存量系统，增量需求</text>
    </g>
  </g>

  <!-- 地图二:仓库拓扑 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="500" y="190" font-size="24" font-weight="700" fill="#38bdf8">地图二 · 仓库拓扑</text>
    <g>
      <rect x="500" y="212" width="340" height="78" rx="10" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
      <text x="522" y="246" font-size="22" fill="#5eead4" font-weight="700">单仓单项目　← 本例在这</text>
      <text x="522" y="274" font-size="17" fill="#a5f3e8">一个 Git 仓库 = 一个应用</text>
    </g>
    <g>
      <rect x="500" y="302" width="340" height="70" rx="10" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="522" y="335" font-size="22" fill="#cbd5e1" font-weight="600">单仓多模块</text>
      <text x="522" y="360" font-size="17" fill="#64748b">一个仓里多个模块</text>
    </g>
    <g>
      <rect x="500" y="384" width="340" height="70" rx="10" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/>
      <text x="522" y="417" font-size="22" fill="#cbd5e1" font-weight="600">多仓工作区</text>
      <text x="522" y="442" font-size="17" fill="#64748b">多个独立仓协作</text>
    </g>
  </g>

  <!-- 交点结论 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="900" y="212" width="245" height="242" rx="12" fill="#172554" stroke="#818cf8" stroke-width="2"/>
    <text x="1022" y="262" text-anchor="middle" font-size="22" font-weight="700" fill="#a5b4fc">交点</text>
    <text x="1022" y="312" text-anchor="middle" font-size="26" font-weight="700" fill="#f8fafc">1-10</text>
    <text x="1022" y="344" text-anchor="middle" font-size="22" fill="#cbd5e1">×</text>
    <text x="1022" y="378" text-anchor="middle" font-size="24" font-weight="700" fill="#f8fafc">单仓单项目</text>
    <text x="1022" y="424" text-anchor="middle" font-size="16" fill="#94a3b8">最高频、最短链路</text>
  </g>

  <!-- 底部判断 -->
  <rect x="60" y="510" width="1085" height="105" rx="12" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="90" y="556" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#e2e8f0">坐标变了，需求阶段和边界规则跟着变，但中间的</text>
  <text x="90" y="592" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#5eead4">plan → work → review → compound 基本不动</text>
  <text x="1115" y="592" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">先把主干吃透</text>
</svg>
