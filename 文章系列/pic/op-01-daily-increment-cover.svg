<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">给一个真实功能从头跑一遍：spec-first 日常增量实操</title>
  <desc id="desc">微信公众号 2.35:1 封面图：op-01 日常增量功能，1-10 单仓单项目完整链路。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-20%" width="124%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="511" fill="url(#bg)"/>

  <g opacity="0.10" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="73" x2="1200" y2="73"/>
    <line x1="0" y1="146" x2="1200" y2="146"/>
    <line x1="0" y1="219" x2="1200" y2="219"/>
    <line x1="0" y1="292" x2="1200" y2="292"/>
    <line x1="0" y1="365" x2="1200" y2="365"/>
    <line x1="0" y1="438" x2="1200" y2="438"/>
    <line x1="200" y1="0" x2="200" y2="511"/>
    <line x1="400" y1="0" x2="400" y2="511"/>
    <line x1="600" y1="0" x2="600" y2="511"/>
    <line x1="800" y1="0" x2="800" y2="511"/>
    <line x1="1000" y1="0" x2="1000" y2="511"/>
  </g>

  <!-- 顶部标签 -->
  <text x="90" y="96" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#38bdf8" letter-spacing="2">Spec-First · 第二季 · 项目实操</text>

  <!-- 主标题 -->
  <text x="90" y="190" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="62" font-weight="700" fill="#f8fafc">给一个真实功能</text>
  <text x="90" y="272" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="62" font-weight="700" fill="#f8fafc">从头跑一遍</text>

  <!-- 副标题 -->
  <text x="92" y="340" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="29" fill="#cbd5e1">我才敢说它能用</text>

  <rect x="92" y="372" width="64" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- 右下角链路节点示意 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#0b1220" font-weight="600">
    <g transform="translate(610,410)"><rect width="86" height="44" rx="8" fill="#7dd3fc"/><text x="43" y="28" text-anchor="middle">plan</text></g>
    <g transform="translate(708,410)"><rect width="86" height="44" rx="8" fill="#5eead4"/><text x="43" y="28" text-anchor="middle">work</text></g>
    <g transform="translate(806,410)"><rect width="98" height="44" rx="8" fill="#a5b4fc"/><text x="49" y="28" text-anchor="middle">review</text></g>
    <g transform="translate(916,410)"><rect width="110" height="44" rx="8" fill="#38bdf8"/><text x="55" y="28" text-anchor="middle">compound</text></g>
  </g>
  <g stroke="#7dd3fc" stroke-width="2" opacity="0.7">
    <line x1="696" y1="432" x2="708" y2="432"/>
    <line x1="794" y1="432" x2="806" y2="432"/>
    <line x1="904" y1="432" x2="916" y2="432"/>
  </g>

  <!-- 坐标标记 -->
  <text x="1110" y="96" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#64748b">op-01 · 1-10 × 单仓单项目</text>
</svg>
