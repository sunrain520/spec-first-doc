<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">op-02 0-1 翻车：方向没定就动手，建在沙子上</title>
  <desc id="d">方向未定时直接让 AI 动手，AI 替你赌一个方向，越往后做废得越彻底。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.08" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="300" y1="0" x2="300" y2="900"/><line x1="600" y1="0" x2="600" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/>
  </g>

  <text x="60" y="84" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">方向没定就动手，等于在沙子上盖楼</text>
  <text x="60" y="124" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" fill="#94a3b8">一句话："帮我做个管理本地零散脚本的小工具"</text>

  <!-- 模糊想法 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="168" width="380" height="92" rx="12" fill="#0c1a2e" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 5"/>
    <text x="84" y="208" font-size="22" fill="#cbd5e1" font-weight="600">模糊想法（形状没定）</text>
    <text x="84" y="240" font-size="17" fill="#64748b">CLI？界面？插件？搜索还是运行？</text>
  </g>

  <!-- 箭头 直接甩 -->
  <g stroke="#f87171" stroke-width="3" fill="none" marker-end="url(#ar)">
    <path d="M450 214 L600 214"/>
  </g>
  <defs><marker id="ar" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#f87171"/></marker></defs>
  <text x="468" y="200" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#f87171">直接甩给 AI</text>

  <!-- AI 替你赌方向 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="612" y="168" width="528" height="92" rx="12" fill="#3a1518" stroke="#f87171" stroke-width="2"/>
    <text x="636" y="206" font-size="22" fill="#fca5a5" font-weight="700">AI 默默替你赌了一个方向</text>
    <text x="636" y="238" font-size="17" fill="#fecaca">→ 做了个"命令行运行器"（其实你要的是搜索器）</text>
  </g>

  <!-- 沙子上的楼：四层，越往上越歪 -->
  <text x="60" y="332" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#38bdf8">楼盖得越高，塌得越彻底</text>

  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- plan 层 -->
    <rect x="380" y="372" width="440" height="56" rx="8" fill="#172554" stroke="#475569" stroke-width="1.5" transform="rotate(-1.5 600 400)"/>
    <text x="600" y="406" text-anchor="middle" font-size="19" fill="#cbd5e1" transform="rotate(-1.5 600 400)">plan：为"运行器"写的计划</text>
    <!-- work 层 -->
    <rect x="400" y="438" width="400" height="56" rx="8" fill="#172554" stroke="#475569" stroke-width="1.5" transform="rotate(2.5 600 466)"/>
    <text x="600" y="472" text-anchor="middle" font-size="19" fill="#cbd5e1" transform="rotate(2.5 600 466)">work：为"运行器"写的代码</text>
    <!-- test 层 -->
    <rect x="420" y="504" width="360" height="56" rx="8" fill="#172554" stroke="#475569" stroke-width="1.5" transform="rotate(-3 600 532)"/>
    <text x="600" y="538" text-anchor="middle" font-size="19" fill="#cbd5e1" transform="rotate(-3 600 532)">test：为"运行器"写的测试</text>
  </g>

  <!-- 沙子地基 -->
  <rect x="120" y="588" width="960" height="70" rx="8" fill="#3a1518" stroke="#f87171" stroke-width="2"/>
  <text x="600" y="632" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#fca5a5">地基 = 一个没人确认过的错方向（沙子）</text>

  <!-- 崩塌结论 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="700" width="1080" height="150" rx="12" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="90" y="748" font-size="22" fill="#e2e8f0">代码层的错，review 能拦住；</text>
    <text x="90" y="788" font-size="22" font-weight="700" fill="#fca5a5">方向层的错，要等你对着跑起来的成品才发现——全得推倒重来。</text>
    <text x="90" y="826" font-size="19" fill="#94a3b8">在 0-1，最关键的决策输入是"方向"本身；它缺了，后面填得再好都是白填。</text>
  </g>
</svg>
