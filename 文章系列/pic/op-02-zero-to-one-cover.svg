<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">方向都还没想清楚，怎么让 AI 别瞎跑：spec-first 0-1 起步实操</title>
  <desc id="desc">微信公众号 2.35:1 封面图：op-02 从模糊想法到能动手，0-1 单仓单项目，ideate 发散 brainstorm 收敛。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="511" fill="url(#bg)"/>

  <g opacity="0.10" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="73" x2="1200" y2="73"/>
    <line x1="0" y1="146" x2="1200" y2="146"/>
    <line x1="0" y1="219" x2="1200" y2="219"/>
    <line x1="0" y1="292" x2="1200" y2="292"/>
    <line x1="0" y1="365" x2="1200" y2="365"/>
    <line x1="0" y1="438" x2="1200" y2="438"/>
    <line x1="200" y1="0" x2="200" y2="511"/>
    <line x1="400" y1="0" x2="400" y2="511"/>
    <line x1="600" y1="0" x2="600" y2="511"/>
    <line x1="800" y1="0" x2="800" y2="511"/>
    <line x1="1000" y1="0" x2="1000" y2="511"/>
  </g>

  <!-- 顶部标签 -->
  <text x="90" y="96" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#38bdf8" letter-spacing="2">Spec-First · 第二季 · 项目实操</text>

  <!-- 主标题 -->
  <text x="90" y="190" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">方向都还没想清楚</text>
  <text x="90" y="266" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">怎么让 AI 别瞎跑</text>

  <!-- 副标题 -->
  <text x="92" y="334" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="#cbd5e1">从模糊想法，收敛到能动手</text>

  <rect x="92" y="366" width="64" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- 右下角起步段节点示意 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#0b1220" font-weight="600">
    <g transform="translate(636,408)"><rect width="100" height="44" rx="8" fill="#38bdf8"/><text x="50" y="28" text-anchor="middle">ideate</text></g>
    <g transform="translate(748,408)"><rect width="132" height="44" rx="8" fill="#5eead4"/><text x="66" y="28" text-anchor="middle">brainstorm</text></g>
    <g transform="translate(892,408)"><rect width="134" height="44" rx="8" fill="#a5b4fc"/><text x="67" y="28" text-anchor="middle">plan → …</text></g>
  </g>
  <g stroke="#7dd3fc" stroke-width="2" opacity="0.7">
    <line x1="736" y1="430" x2="748" y2="430"/>
    <line x1="880" y1="430" x2="892" y2="430"/>
  </g>
  <text x="636" y="478" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#64748b">先发散选方向，再收敛成需求</text>

  <!-- 坐标标记 -->
  <text x="1110" y="96" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#64748b">op-02 · 0-1 × 单仓单项目</text>
