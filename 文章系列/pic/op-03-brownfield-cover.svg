<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">在有历史包袱的老系统上改代码，怎么不改崩</title>
  <desc id="desc">微信公众号封面：op-03 存量改造，10-100 单仓多模块，用 spec-prd 取证现状与变化。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="511" fill="url(#bg)"/>

  <g opacity="0.10" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="73" x2="1200" y2="73"/>
    <line x1="0" y1="146" x2="1200" y2="146"/>
    <line x1="0" y1="219" x2="1200" y2="219"/>
    <line x1="0" y1="292" x2="1200" y2="292"/>
    <line x1="0" y1="365" x2="1200" y2="365"/>
    <line x1="0" y1="438" x2="1200" y2="438"/>
    <line x1="200" y1="0" x2="200" y2="511"/>
    <line x1="400" y1="0" x2="400" y2="511"/>
    <line x1="600" y1="0" x2="600" y2="511"/>
    <line x1="800" y1="0" x2="800" y2="511"/>
    <line x1="1000" y1="0" x2="1000" y2="511"/>
  </g>

  <text x="90" y="96" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#38bdf8" letter-spacing="2">Spec-First · 第二季 · 项目实操</text>

  <text x="90" y="190" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">在老系统上改代码</text>
  <text x="90" y="266" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">怎么<tspan fill="#5eead4">不改崩</tspan></text>

  <text x="92" y="334" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="28" fill="#cbd5e1">动手前先取证现状，把不能动的标死</text>

  <rect x="92" y="366" width="64" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- 右下角:改一处崩三处示意 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <g transform="translate(636,400)"><rect width="120" height="46" rx="9" fill="#0f2942" stroke="#38bdf8" stroke-width="2"/><text x="60" y="29" text-anchor="middle" font-size="20" font-weight="600" fill="#f8fafc">订单</text></g>
    <g transform="translate(792,400)"><rect width="120" height="46" rx="9" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/><text x="60" y="29" text-anchor="middle" font-size="20" font-weight="600" fill="#f87171">库存崩</text></g>
    <g transform="translate(948,400)"><rect width="120" height="46" rx="9" fill="#0f2942" stroke="#1e3a5f" stroke-width="1.5"/><text x="60" y="29" text-anchor="middle" font-size="20" font-weight="600" fill="#f87171">通知崩</text></g>
  </g>
  <g stroke="#f87171" stroke-width="2" opacity="0.75">
    <line x1="756" y1="423" x2="792" y2="423"/>
    <line x1="912" y1="423" x2="948" y2="423"/>
  </g>

  <text x="1110" y="96" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#64748b">op-03 · 10-100 × 单仓多模块</text>
</svg>
