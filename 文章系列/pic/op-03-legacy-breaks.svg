<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">op-03 存量翻车：改一处崩三处</title>
  <desc id="d">AI 只改订单状态，看不见的对账约束让库存对不上账，连环崩三处。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="300" y1="0" x2="300" y2="900"/><line x1="600" y1="0" x2="600" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/>
  </g>

  <text x="60" y="80" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="36" font-weight="700" fill="#f8fafc">让 AI「自由发挥」改老系统：改一处，崩三处</text>
  <text x="60" y="120" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" fill="#94a3b8">它只改了订单状态，却踩中了一条看不见的既有约束</text>

  <!-- 顶部:AI 的输入 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="156" width="1080" height="76" rx="12" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
    <text x="84" y="190" font-size="20" fill="#64748b">需求：</text>
    <text x="150" y="190" font-size="21" fill="#e2e8f0" font-weight="600">「给订单加一个超时自动取消的功能」</text>
    <text x="84" y="218" font-size="18" fill="#94a3b8">AI 读了订单模块，写了个改状态的函数 cancelOrder()，能跑。然后……</text>
  </g>

  <!-- 中部:连锁崩塌 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- 订单 -->
    <rect x="60" y="290" width="300" height="150" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="84" y="328" font-size="23" font-weight="700" fill="#5eead4">订单模块</text>
    <text x="84" y="362" font-size="18" fill="#cbd5e1">状态改成「已取消」</text>
    <text x="84" y="392" font-size="17" fill="#94a3b8">AI 改对了这一处</text>
    <text x="84" y="420" font-size="16" fill="#38bdf8">✓ 代码本身没毛病</text>

    <!-- 库存 -->
    <rect x="450" y="290" width="300" height="150" rx="12" fill="#0f2942" stroke="#f87171" stroke-width="2.5"/>
    <text x="474" y="328" font-size="23" font-weight="700" fill="#f87171">库存模块 · 崩</text>
    <text x="474" y="362" font-size="18" fill="#cbd5e1">占用的库存没释放回去</text>
    <text x="474" y="392" font-size="17" fill="#fca5a5">绕开了对账账本</text>
    <text x="474" y="420" font-size="16" fill="#fca5a5">✗ 账面对不上，有的还重复释放</text>

    <!-- 通知 -->
    <rect x="840" y="290" width="300" height="150" rx="12" fill="#0f2942" stroke="#f59e0b" stroke-width="2"/>
    <text x="864" y="328" font-size="23" font-weight="700" fill="#fbbf24">通知模块 · 崩</text>
    <text x="864" y="362" font-size="18" fill="#cbd5e1">取消了却没发通知</text>
    <text x="864" y="392" font-size="17" fill="#fcd34d">联动关系 AI 根本没看见</text>
    <text x="864" y="420" font-size="16" fill="#fcd34d">✗ 用户不知道订单没了</text>
  </g>
  <g stroke="#f87171" stroke-width="3" opacity="0.8" marker-end="url(#ar)">
    <line x1="360" y1="365" x2="448" y2="365"/>
    <line x1="750" y1="365" x2="838" y2="365"/>
  </g>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f87171"/></marker>
  </defs>

  <!-- 看不见的约束 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="490" width="1080" height="130" rx="12" fill="#0c1a2e" stroke="#475569" stroke-width="1.5" stroke-dasharray="7 5"/>
    <text x="84" y="528" font-size="22" font-weight="700" fill="#94a3b8">藏在代码深处、没人写在明面上的既有约束</text>
    <text x="84" y="566" font-size="19" fill="#cbd5e1">「订单一旦取消，库存释放必须走对账账本，而且对同一订单只能释放一次」</text>
    <text x="84" y="600" font-size="18" fill="#64748b">三年前某个人写的，没文档、没注释 —— AI 读不到，你自己一时也想不起来</text>
  </g>

  <!-- 底部:三种缺失 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="685" font-size="24" font-weight="700" fill="#38bdf8">归根到底，是三种缺失 —— 没一种靠「换个更聪明的模型」能解决</text>
    <g>
      <rect x="60" y="710" width="345" height="120" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="84" y="748" font-size="21" font-weight="700" fill="#a5b4fc">缺既有约束</text>
      <text x="84" y="782" font-size="17" fill="#cbd5e1">系统现在怎么跑、</text>
      <text x="84" y="808" font-size="17" fill="#cbd5e1">有哪些不能碰的规矩</text>
    </g>
    <g>
      <rect x="427" y="710" width="345" height="120" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="451" y="748" font-size="21" font-weight="700" fill="#a5b4fc">缺模块边界</text>
      <text x="451" y="782" font-size="17" fill="#cbd5e1">改动牵连哪几个模块、</text>
      <text x="451" y="808" font-size="17" fill="#cbd5e1">它们怎么联动</text>
    </g>
    <g>
      <rect x="794" y="710" width="346" height="120" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="818" y="748" font-size="21" font-weight="700" fill="#a5b4fc">缺禁区</text>
      <text x="818" y="782" font-size="17" fill="#cbd5e1">哪些历史代码是用</text>
      <text x="818" y="808" font-size="17" fill="#cbd5e1">事故喂出来、绝对不能动</text>
    </g>
  </g>

  <text x="600" y="872" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" fill="#5eead4" font-weight="600">真正重要的约束，往往不在你让它读的那段代码里</text>
</svg>
