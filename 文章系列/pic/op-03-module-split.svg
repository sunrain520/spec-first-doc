<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">op-03 单仓多模块的正确拆法</title>
  <desc id="d">一个仓库一套 .spec-first，不为每个模块拆一套；模块边界由 plan 按实现单元切，write-tasks 锁执行波次。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="225" x2="1200" y2="225"/><line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="675" x2="1200" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
  </g>

  <text x="60" y="78" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="36" font-weight="700" fill="#f8fafc">单仓多模块：一个仓一套链路，模块边界交给 plan 切</text>

  <!-- 错误拆法 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="138" font-size="22" font-weight="700" fill="#f87171">✗ 错误：为每个模块拆一套 .spec-first</text>
    <g opacity="0.85">
      <rect x="60" y="158" width="200" height="90" rx="10" fill="#0f2942" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="160" y="200" text-anchor="middle" font-size="18" fill="#cbd5e1">订单 / .spec-first</text>
      <text x="160" y="226" text-anchor="middle" font-size="15" fill="#fca5a5">各跑各的链路</text>
      <rect x="280" y="158" width="200" height="90" rx="10" fill="#0f2942" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="380" y="200" text-anchor="middle" font-size="18" fill="#cbd5e1">库存 / .spec-first</text>
      <text x="380" y="226" text-anchor="middle" font-size="15" fill="#fca5a5">各跑各的链路</text>
      <rect x="500" y="158" width="200" height="90" rx="10" fill="#0f2942" stroke="#f87171" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="600" y="200" text-anchor="middle" font-size="18" fill="#cbd5e1">通知 / .spec-first</text>
      <text x="600" y="226" text-anchor="middle" font-size="15" fill="#fca5a5">各跑各的链路</text>
    </g>
    <text x="730" y="195" font-size="18" fill="#fca5a5">→ 最关键的跨模块约束</text>
    <text x="730" y="222" font-size="18" fill="#fca5a5">　 被切断在模块边界上</text>
  </g>

  <!-- 正确拆法 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="312" font-size="22" font-weight="700" fill="#5eead4">✓ 正确：一个仓库 = 一套 .spec-first（哪怕几十个模块）</text>
    <rect x="60" y="332" width="1080" height="150" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="84" y="372" font-size="20" font-weight="700" fill="#5eead4">电商后台仓库 · 一套 .spec-first · 一份需求 · 一份计划</text>
    <g>
      <rect x="84" y="392" width="320" height="72" rx="9" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="244" y="424" text-anchor="middle" font-size="18" fill="#e2e8f0">order 模块</text>
      <text x="244" y="450" text-anchor="middle" font-size="14" fill="#94a3b8">同一份现状取证</text>
      <rect x="424" y="392" width="320" height="72" rx="9" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="584" y="424" text-anchor="middle" font-size="18" fill="#e2e8f0">inventory 模块</text>
      <text x="584" y="450" text-anchor="middle" font-size="14" fill="#94a3b8">同一套 change delta</text>
      <rect x="764" y="392" width="352" height="72" rx="9" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="940" y="424" text-anchor="middle" font-size="18" fill="#e2e8f0">notification 模块</text>
      <text x="940" y="450" text-anchor="middle" font-size="14" fill="#94a3b8">同一个对账约束目标</text>
    </g>
  </g>

  <!-- plan 按实现单元拆 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="546" font-size="22" font-weight="700" fill="#818cf8">模块边界由 plan 按实现单元切，write-tasks 锁波次</text>
    <g>
      <rect x="60" y="568" width="255" height="86" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="84" y="600" font-size="17" fill="#a5b4fc" font-weight="600">单元 1 · [order]</text>
      <text x="84" y="626" font-size="15" fill="#cbd5e1">超时扫描 + cancel 触发</text>
      <rect x="335" y="568" width="255" height="86" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="359" y="600" font-size="17" fill="#a5b4fc" font-weight="600">单元 2 · [order→inv]</text>
      <text x="359" y="626" font-size="15" fill="#cbd5e1">调 releaseByReconciliation</text>
      <rect x="610" y="568" width="255" height="86" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="634" y="600" font-size="17" fill="#a5b4fc" font-weight="600">单元 3 · [order→notif]</text>
      <text x="634" y="626" font-size="15" fill="#cbd5e1">触发既有通知</text>
      <rect x="885" y="568" width="255" height="86" rx="10" fill="#172554" stroke="#818cf8" stroke-width="1.5"/>
      <text x="909" y="600" font-size="17" fill="#a5b4fc" font-weight="600">单元 4 · 集成验证</text>
      <text x="909" y="626" font-size="15" fill="#cbd5e1">释放且只释放一次</text>
    </g>
  </g>

  <!-- 执行波次 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <text x="60" y="716" font-size="20" font-weight="700" fill="#22d3ee">write-tasks 把依赖固化成执行波次（防乱序、防半成品互相依赖）</text>
    <g>
      <rect x="60" y="736" width="300" height="64" rx="10" fill="#0c1a2e" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="84" y="764" font-size="17" fill="#5eead4" font-weight="600">波次 1</text>
      <text x="84" y="788" font-size="15" fill="#cbd5e1">单元 1（基础）</text>
      <rect x="390" y="736" width="380" height="64" rx="10" fill="#0c1a2e" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="414" y="764" font-size="17" fill="#5eead4" font-weight="600">波次 2</text>
      <text x="414" y="788" font-size="15" fill="#cbd5e1">单元 2、3（可并行，依赖 1）</text>
      <rect x="800" y="736" width="340" height="64" rx="10" fill="#0c1a2e" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="824" y="764" font-size="17" fill="#5eead4" font-weight="600">波次 3</text>
      <text x="824" y="788" font-size="15" fill="#cbd5e1">单元 4（依赖全部完成）</text>
    </g>
    <g stroke="#22d3ee" stroke-width="2.5" opacity="0.8">
      <line x1="360" y1="768" x2="388" y2="768"/>
      <line x1="770" y1="768" x2="798" y2="768"/>
    </g>
  </g>

  <text x="600" y="858" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#5eead4" font-weight="600">拓扑上一仓一套链路，模块边界交给 plan / work / review 在执行时按实现单元去切</text>
</svg>
