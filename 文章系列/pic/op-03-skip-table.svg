<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-03 这次不能跳：与 op-01 的跳过判断镜像对照</title>
  <desc id="d">同一张判断表，op-01 每行落右侧跳过，op-03 每行落左侧该用；write-tasks 和 doc-review 在存量多模块场景都不能跳。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="168" x2="1200" y2="168"/><line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
  </g>

  <text x="60" y="74" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">同一张判断表，两次相反的结论</text>
  <text x="60" y="110" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">判断的是需求本身，不是步骤 —— write-tasks 该不该用，全看需求落在哪一侧</text>

  <!-- op-01 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="142" width="520" height="468" rx="14" fill="#0c1a2e" stroke="#475569" stroke-width="1.5"/>
    <text x="84" y="184" font-size="23" font-weight="700" fill="#94a3b8">op-01　增量 × 单仓单项目</text>
    <text x="84" y="214" font-size="17" fill="#64748b">标签过滤 —— 每行落右侧</text>

    <g font-size="17" fill="#cbd5e1">
      <rect x="84" y="234" width="472" height="78" rx="8" fill="#0f2942" stroke="#1e3a5f" stroke-width="1"/>
      <text x="104" y="266" font-weight="600" fill="#e2e8f0">实现单元数</text>
      <text x="104" y="294" fill="#94a3b8">&lt; 3 个</text>
      <text x="536" y="280" text-anchor="end" font-size="20" fill="#64748b">跳过</text>

      <rect x="84" y="322" width="472" height="78" rx="8" fill="#0f2942" stroke="#1e3a5f" stroke-width="1"/>
      <text x="104" y="354" font-weight="600" fill="#e2e8f0">模块范围</text>
      <text x="104" y="382" fill="#94a3b8">单一区域</text>
      <text x="536" y="368" text-anchor="end" font-size="20" fill="#64748b">跳过</text>

      <rect x="84" y="410" width="472" height="78" rx="8" fill="#0f2942" stroke="#1e3a5f" stroke-width="1"/>
      <text x="104" y="442" font-weight="600" fill="#e2e8f0">依赖关系</text>
      <text x="104" y="470" fill="#94a3b8">线性、无依赖</text>
      <text x="536" y="456" text-anchor="end" font-size="20" fill="#64748b">跳过</text>

      <rect x="84" y="498" width="472" height="78" rx="8" fill="#0f2942" stroke="#1e3a5f" stroke-width="1"/>
      <text x="104" y="530" font-weight="600" fill="#e2e8f0">验证面</text>
      <text x="104" y="558" fill="#94a3b8">单一层级</text>
      <text x="536" y="544" text-anchor="end" font-size="20" fill="#64748b">跳过</text>
    </g>
  </g>

  <!-- op-03 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="620" y="142" width="520" height="468" rx="14" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="644" y="184" font-size="23" font-weight="700" fill="#5eead4">op-03　存量 × 单仓多模块</text>
    <text x="644" y="214" font-size="17" fill="#7dd3fc">超时自动取消 —— 每行落左侧</text>

    <g font-size="17">
      <rect x="644" y="234" width="472" height="78" rx="8" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="664" y="266" font-weight="600" fill="#e2e8f0">实现单元数</text>
      <text x="664" y="294" fill="#5eead4">4 个</text>
      <text x="1096" y="280" text-anchor="end" font-size="20" fill="#5eead4" font-weight="700">✅ 该用</text>

      <rect x="644" y="322" width="472" height="78" rx="8" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="664" y="354" font-weight="600" fill="#e2e8f0">模块范围</text>
      <text x="664" y="382" fill="#5eead4">跨 3 个模块</text>
      <text x="1096" y="368" text-anchor="end" font-size="20" fill="#5eead4" font-weight="700">✅ 该用</text>

      <rect x="644" y="410" width="472" height="78" rx="8" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="664" y="442" font-weight="600" fill="#e2e8f0">依赖关系</text>
      <text x="664" y="470" fill="#5eead4">有跨模块依赖</text>
      <text x="1096" y="456" text-anchor="end" font-size="20" fill="#5eead4" font-weight="700">✅ 该用</text>

      <rect x="644" y="498" width="472" height="78" rx="8" fill="#0f2942" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="664" y="530" font-weight="600" fill="#e2e8f0">验证面</text>
      <text x="664" y="558" fill="#5eead4">跨单测 + 集成</text>
      <text x="1096" y="544" text-anchor="end" font-size="20" fill="#5eead4" font-weight="700">✅ 该用</text>
    </g>
  </g>

  <!-- 底部结论 -->
  <text x="600" y="650" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#a5b4fc">给小需求套大流程，和给大需求省关键步骤，是同一种错误的两个方向</text>
</svg>
