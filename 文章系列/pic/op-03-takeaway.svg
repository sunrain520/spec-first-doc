<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-03 存量改造链路全景：每步守护什么，哪步不能省</title>
  <desc id="d">brownfield 链路从 spec-prd 取证现状、标死变化，到 plan 拆模块、write-tasks 锁波次、doc-review、work、code-review、compound，每步守护什么、哪步不能省。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#172554"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="168" x2="1200" y2="168"/><line x1="0" y1="336" x2="1200" y2="336"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
  </g>

  <text x="60" y="72" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">存量改造链路全景：每一步在守护什么</text>
  <text x="60" y="106" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="19" fill="#64748b">建议先截图存下 · 老系统上改代码的判断地图</text>

  <!-- 链路节点 两行 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- row 1 -->
    <g>
      <rect x="60" y="140" width="250" height="118" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
      <text x="84" y="176" font-size="20" font-weight="700" fill="#5eead4">spec-prd ① 取证现状</text>
      <text x="84" y="208" font-size="15" fill="#cbd5e1">现状标出处，最硬的优先</text>
      <text x="84" y="234" font-size="15" fill="#5eead4">把「我以为」换成「我确认」</text>
    </g>
    <g>
      <rect x="345" y="140" width="250" height="118" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
      <text x="369" y="176" font-size="20" font-weight="700" fill="#5eead4">spec-prd ② 标死变化</text>
      <text x="369" y="208" font-size="15" fill="#cbd5e1">keep / extend / unknown</text>
      <text x="369" y="234" font-size="15" fill="#5eead4">把「和以前一样」换成明确</text>
    </g>
    <g>
      <rect x="630" y="140" width="250" height="118" rx="12" fill="#0f2942" stroke="#818cf8" stroke-width="2"/>
      <text x="654" y="176" font-size="20" font-weight="700" fill="#a5b4fc">plan</text>
      <text x="654" y="208" font-size="15" fill="#cbd5e1">按 module 边界拆实现单元</text>
      <text x="654" y="234" font-size="15" fill="#a5b4fc">一仓一套链路，不拆多套</text>
    </g>
    <g>
      <rect x="915" y="140" width="225" height="118" rx="12" fill="#0f2942" stroke="#22d3ee" stroke-width="2"/>
      <text x="939" y="176" font-size="19" font-weight="700" fill="#22d3ee">write-tasks</text>
      <text x="939" y="206" font-size="15" fill="#cbd5e1">锁波次、防过期</text>
      <text x="939" y="230" font-size="15" fill="#5eead4">不能跳</text>
    </g>
  </g>
  <g stroke="#38bdf8" stroke-width="2.5" opacity="0.7">
    <line x1="310" y1="199" x2="343" y2="199"/>
    <line x1="595" y1="199" x2="628" y2="199"/>
    <line x1="880" y1="199" x2="913" y2="199"/>
  </g>

  <!-- row 2 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <g>
      <rect x="60" y="300" width="250" height="118" rx="12" fill="#0f2942" stroke="#818cf8" stroke-width="2"/>
      <text x="84" y="336" font-size="20" font-weight="700" fill="#a5b4fc">doc-review</text>
      <text x="84" y="368" font-size="15" fill="#cbd5e1">拦住会扩散成事故的缝</text>
      <text x="84" y="394" font-size="15" fill="#5eead4">不能省</text>
    </g>
    <g>
      <rect x="345" y="300" width="250" height="118" rx="12" fill="#0f2942" stroke="#818cf8" stroke-width="2"/>
      <text x="369" y="336" font-size="20" font-weight="700" fill="#a5b4fc">work</text>
      <text x="369" y="368" font-size="15" fill="#cbd5e1">边界内受控执行</text>
      <text x="369" y="394" font-size="15" fill="#cbd5e1">source_plan_hash 防过期</text>
    </g>
    <g>
      <rect x="630" y="300" width="250" height="118" rx="12" fill="#0f2942" stroke="#818cf8" stroke-width="2"/>
      <text x="654" y="336" font-size="20" font-weight="700" fill="#a5b4fc">code-review</text>
      <text x="654" y="368" font-size="15" fill="#cbd5e1">拿 keep 当尺子</text>
      <text x="654" y="394" font-size="15" fill="#f87171">盯会不会冲掉既有行为</text>
    </g>
    <g>
      <rect x="915" y="300" width="225" height="118" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2.5"/>
      <text x="939" y="336" font-size="20" font-weight="700" fill="#5eead4">compound</text>
      <text x="939" y="368" font-size="15" fill="#cbd5e1">把隐藏约束</text>
      <text x="939" y="394" font-size="15" fill="#5eead4">刻进仓库</text>
    </g>
  </g>
  <g stroke="#818cf8" stroke-width="2.5" opacity="0.7">
    <line x1="310" y1="359" x2="343" y2="359"/>
    <line x1="595" y1="359" x2="628" y2="359"/>
    <line x1="880" y1="359" x2="913" y2="359"/>
  </g>

  <!-- 存量三条判断要点 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="450" width="1080" height="180" rx="12" fill="#172554" stroke="#5eead4" stroke-width="2"/>
    <text x="90" y="492" font-size="22" font-weight="700" fill="#5eead4">存量场景三条判断要点</text>
    <text x="90" y="534" font-size="18" fill="#e2e8f0"><tspan fill="#38bdf8" font-weight="700">1. 入口换成 spec-prd</tspan> —— 不确定的是「现状」不是「方向」，先取证、再标变化，不发散探索</text>
    <text x="90" y="570" font-size="18" fill="#e2e8f0"><tspan fill="#38bdf8" font-weight="700">2. 拓扑是一仓一套链路</tspan> —— 不拆多套 .spec-first，模块边界交给 plan 切、write-tasks 锁波次</text>
    <text x="90" y="606" font-size="18" fill="#e2e8f0"><tspan fill="#38bdf8" font-weight="700">3. 该认真的步骤别省</tspan> —— 跨模块、背硬约束、做好几天，doc-review 和 write-tasks 通常不能跳</text>
  </g>
</svg>
