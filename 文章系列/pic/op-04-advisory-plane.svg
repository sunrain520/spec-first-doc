<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-04 advisory 控制面：父 workspace 不是超级 repo</title>
  <desc id="d">父 workspace 只写 advisory summary、不拥有任何 child repo 的权威真相；每个 child repo 各自拥有 canonical 的 .spec-first。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/><line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="300" y1="0" x2="300" y2="675"/><line x1="600" y1="0" x2="600" y2="675"/><line x1="900" y1="0" x2="900" y2="675"/>
  </g>

  <text x="60" y="74" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">父 workspace 是 advisory 控制面，不是超级 repo</text>
  <text x="60" y="112" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">它给跨仓概览、列候选仓——但真相在每个 child 自己那里，它不替你拍板</text>

  <!-- 父层 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <rect x="60" y="150" width="1080" height="116" rx="14" fill="#1a2a4a" stroke="#818cf8" stroke-width="2"/>
    <text x="86" y="190" font-size="22" font-weight="700" fill="#a5b4fc">父 workspace/（advisory 控制面）</text>
    <text x="86" y="224" font-family="'SF Mono',Menlo,Consolas,monospace" font-size="17" fill="#cbd5e1">.spec-first/workspace/*summary.json</text>
    <text x="86" y="250" font-size="16" fill="#94a3b8">只是各仓真相的"摘要镜像" · 跨仓看一眼用 · 不是任何仓的 canonical truth</text>
    <g transform="translate(820,176)">
      <rect width="296" height="64" rx="10" fill="#3a1530" stroke="#f87171" stroke-width="1.5"/>
      <text x="148" y="30" text-anchor="middle" font-size="16" fill="#fca5a5" font-weight="600">别在父层立"统管所有仓"</text>
      <text x="148" y="52" text-anchor="middle" font-size="16" fill="#fca5a5" font-weight="600">的影子配置</text>
    </g>
  </g>

  <!-- 连接线 -->
  <g stroke="#475569" stroke-width="1.8" stroke-dasharray="5 4">
    <line x1="240" y1="266" x2="240" y2="330"/>
    <line x1="600" y1="266" x2="600" y2="330"/>
    <line x1="960" y1="266" x2="960" y2="330"/>
  </g>
  <text x="600" y="306" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#64748b">advisory 概览 ↓ 真相下沉到各仓</text>

  <!-- 三个 child -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <g>
      <rect x="60" y="334" width="340" height="240" rx="14" fill="#0b3a52" stroke="#5eead4" stroke-width="2.5"/>
      <text x="84" y="376" font-size="22" font-weight="700" fill="#5eead4">web/</text>
      <text x="84" y="404" font-size="15" fill="#a5f3e8">独立 child repo</text>
      <text x="100" y="446" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">.git/</text>
      <text x="100" y="476" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#5eead4">.spec-first/ ← 权威</text>
      <text x="100" y="506" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">src/  docs/</text>
      <text x="84" y="548" font-size="15" fill="#cbd5e1">自己的 CI / 发布节奏</text>
    </g>
    <g>
      <rect x="430" y="334" width="340" height="240" rx="14" fill="#0b3a52" stroke="#5eead4" stroke-width="2.5"/>
      <text x="454" y="376" font-size="22" font-weight="700" fill="#5eead4">api/</text>
      <text x="454" y="404" font-size="15" fill="#a5f3e8">独立 child repo</text>
      <text x="470" y="446" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">.git/</text>
      <text x="470" y="476" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#5eead4">.spec-first/ ← 权威</text>
      <text x="470" y="506" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">src/  docs/</text>
      <text x="454" y="548" font-size="15" fill="#cbd5e1">自己的 CI / 发布节奏</text>
    </g>
    <g>
      <rect x="800" y="334" width="340" height="240" rx="14" fill="#0b3a52" stroke="#5eead4" stroke-width="2.5"/>
      <text x="824" y="376" font-size="22" font-weight="700" fill="#5eead4">shared/</text>
      <text x="824" y="404" font-size="15" fill="#a5f3e8">独立 child repo</text>
      <text x="840" y="446" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">.git/</text>
      <text x="840" y="476" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#5eead4">.spec-first/ ← 权威</text>
      <text x="840" y="506" font-family="'SF Mono',Menlo,monospace" font-size="16" fill="#94a3b8">src/  docs/</text>
      <text x="824" y="548" font-size="15" fill="#cbd5e1">自己的 CI / 发布节奏</text>
    </g>
  </g>

  <rect x="60" y="600" width="1080" height="56" rx="10" fill="#0c1a2e" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="600" y="635" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#e2e8f0">读法：workspace summary 是参考、不是权威；真相在每个仓自己那里，父层只是个看板</text>
</svg>
