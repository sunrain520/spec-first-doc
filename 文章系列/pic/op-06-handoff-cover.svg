<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">换个 AI、换个人接手，怎么不用从头讲一遍：spec-first 跨会话与协作接力</title>
  <desc id="desc">微信公众号 2.35:1 封面图：op-06 接力切面，用 docs 沉淀 + sessions 检索对抗上下文蒸发。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b2038"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.52" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="511" fill="url(#bg)"/>

  <g opacity="0.10" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="73" x2="1200" y2="73"/>
    <line x1="0" y1="146" x2="1200" y2="146"/>
    <line x1="0" y1="219" x2="1200" y2="219"/>
    <line x1="0" y1="292" x2="1200" y2="292"/>
    <line x1="0" y1="365" x2="1200" y2="365"/>
    <line x1="0" y1="438" x2="1200" y2="438"/>
    <line x1="200" y1="0" x2="200" y2="511"/>
    <line x1="400" y1="0" x2="400" y2="511"/>
    <line x1="600" y1="0" x2="600" y2="511"/>
    <line x1="800" y1="0" x2="800" y2="511"/>
    <line x1="1000" y1="0" x2="1000" y2="511"/>
  </g>

  <text x="90" y="96" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="26" fill="#38bdf8" letter-spacing="2">Spec-First · 第二季 · 项目实操</text>

  <text x="90" y="190" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">换个 AI、换个人接手</text>
  <text x="90" y="266" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="58" font-weight="700" fill="#f8fafc">怎么不用从头讲一遍</text>

  <text x="92" y="334" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="27" fill="#cbd5e1">把会蒸发的上下文，落进读得到的文件</text>

  <rect x="92" y="366" width="64" height="5" rx="2.5" fill="url(#accent)"/>

  <!-- 接力示意：上一棒 → 文件 → 下一棒 -->
  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#0b1220" font-weight="600">
    <g transform="translate(610,406)"><rect width="92" height="44" rx="8" fill="#64748b"/><text x="46" y="28" text-anchor="middle" fill="#e2e8f0">上一棒</text></g>
    <g transform="translate(742,406)"><rect width="120" height="44" rx="8" fill="#5eead4"/><text x="60" y="28" text-anchor="middle">docs / sessions</text></g>
    <g transform="translate(902,406)"><rect width="92" height="44" rx="8" fill="#38bdf8"/><text x="46" y="28" text-anchor="middle">下一棒</text></g>
  </g>
  <g stroke="#7dd3fc" stroke-width="2" opacity="0.75">
    <line x1="702" y1="428" x2="742" y2="428"/>
    <line x1="862" y1="428" x2="902" y2="428"/>
  </g>

  <text x="1110" y="96" text-anchor="end" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" fill="#64748b">op-06 · 跨会话与协作接力</text>
