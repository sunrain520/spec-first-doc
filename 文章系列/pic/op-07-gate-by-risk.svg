<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="t d">
  <title id="t">op-07 按改动风险匹配把关强度</title>
  <desc id="d">小改动轻量把关、中等改动核心维度、高风险/敏感改动重型把关加专项审计。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="400" y1="0" x2="400" y2="675"/><line x1="800" y1="0" x2="800" y2="675"/>
  </g>

  <text x="60" y="70" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">把关强度，对齐改动风险</text>
  <text x="60" y="108" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">不给小改动套大审计，也不给高风险省关键门——和裁剪链路是同一个判断</text>

  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- 轻 -->
    <g>
      <rect x="60" y="160" width="350" height="420" rx="16" fill="#0f2942" stroke="#38bdf8" stroke-width="1.6"/>
      <text x="235" y="212" text-anchor="middle" font-size="24" font-weight="700" fill="#7dd3fc">小 / 低风险</text>
      <text x="235" y="246" text-anchor="middle" font-size="16" fill="#94a3b8">文案、注释、单文件局部修</text>
      <line x1="92" y1="268" x2="378" y2="268" stroke="#1e3a5f"/>
      <g font-size="17" fill="#cbd5e1">
        <text x="92" y="306">· 轻量把关</text>
        <text x="92" y="344">· 最小维度集</text>
        <text x="92" y="382">  （如规范 + 可维护性）</text>
        <text x="92" y="420">· 不上专项审计</text>
        <text x="92" y="458">· 快速扫一眼没硬伤就过</text>
      </g>
      <rect x="92" y="498" width="286" height="56" rx="10" fill="#0b3a52" stroke="#38bdf8"/>
      <text x="235" y="533" text-anchor="middle" font-size="17" fill="#5eead4" font-weight="700">几分钟，别省但别重</text>
    </g>

    <!-- 中 -->
    <g>
      <rect x="430" y="160" width="350" height="420" rx="16" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="605" y="212" text-anchor="middle" font-size="24" font-weight="700" fill="#7dd3fc">中等改动</text>
      <text x="605" y="246" text-anchor="middle" font-size="16" fill="#94a3b8">本篇标签过滤就在这档</text>
      <line x1="462" y1="268" x2="748" y2="268" stroke="#1e3a5f"/>
      <g font-size="17" fill="#cbd5e1">
        <text x="462" y="306">· 上全套核心维度</text>
        <text x="462" y="344">  正确性/测试/可维护/规范</text>
        <text x="462" y="382">· 碰到的面加挂条件维度</text>
        <text x="462" y="420">· 测试这道门必须绿</text>
        <text x="462" y="458">· 涉及领域才上专项</text>
      </g>
      <rect x="462" y="498" width="286" height="56" rx="10" fill="#0b3a52" stroke="#38bdf8"/>
      <text x="605" y="533" text-anchor="middle" font-size="17" fill="#5eead4" font-weight="700">核心兜底 + 按需加挂</text>
    </g>

    <!-- 重 -->
    <g>
      <rect x="800" y="160" width="340" height="420" rx="16" fill="#172554" stroke="#818cf8" stroke-width="2"/>
      <text x="970" y="212" text-anchor="middle" font-size="24" font-weight="700" fill="#a5b4fc">高风险 / 敏感</text>
      <text x="970" y="246" text-anchor="middle" font-size="16" fill="#94a3b8">认证、支付、数据、迁移</text>
      <line x1="832" y1="268" x2="1108" y2="268" stroke="#2c3a66"/>
      <g font-size="17" fill="#cbd5e1">
        <text x="832" y="306">· 核心 + 对抗性审查</text>
        <text x="832" y="344">· 安全/数据/可靠性全上</text>
        <text x="832" y="382">· 专项审计必上</text>
        <text x="832" y="420">· 回归测试 + 残余风险</text>
        <text x="832" y="458">· 说不清就当高风险审</text>
      </g>
      <rect x="832" y="498" width="276" height="56" rx="10" fill="#1e2a52" stroke="#818cf8"/>
      <text x="970" y="533" text-anchor="middle" font-size="17" fill="#a5b4fc" font-weight="700">宁可重，不可漏</text>
    </g>
  </g>

  <text x="600" y="630" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" font-weight="700" fill="#cbd5e1">判断不清时往重里走——上线的代价，远高于多审几分钟</text>
</svg>
