<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="t d">
  <title id="t">op-07 上线前把关 walkthrough 脊柱</title>
  <desc id="d">一个改动从准备证据 → 多维度审 → 读 finding → 测试 → 专项审计 → 上线信心清单的把关流程。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/><stop offset="0.6" stop-color="#0b2038"/><stop offset="1" stop-color="#162449"/>
    </linearGradient>
    <marker id="arr" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L11,6 L0,12 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#7dd3fc" stroke-width="1">
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="540" x2="1200" y2="540"/><line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="400" y1="0" x2="400" y2="900"/><line x1="800" y1="0" x2="800" y2="900"/>
  </g>

  <text x="60" y="70" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#f8fafc">一个改动的上线前把关，跑一遍</text>
  <text x="60" y="108" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="20" fill="#94a3b8">左列每一步在改动上做什么，右列它产出什么证据；信心是一步步攒出来的</text>

  <g font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif">
    <!-- step1 -->
    <g>
      <rect x="60" y="150" width="450" height="92" rx="12" fill="#0b3a52" stroke="#38bdf8" stroke-width="2"/>
      <text x="84" y="190" font-size="22" font-weight="700" fill="#5eead4">第一步 · 准备证据</text>
      <text x="84" y="222" font-size="17" fill="#cbd5e1">算 diff 范围 / 规模 / 敏不敏感 / 有没有 plan</text>
      <rect x="720" y="158" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="190" font-size="16" fill="#94a3b8">改动事实表：3 文件、非敏感、有 plan</text>
      <text x="742" y="216" font-size="16" fill="#94a3b8">→ 据此决定审多重</text>
    </g>
    <!-- step2 -->
    <g>
      <rect x="60" y="262" width="450" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="302" font-size="22" font-weight="700" fill="#7dd3fc">第二步 · 多维度并行审</text>
      <text x="84" y="334" font-size="17" fill="#cbd5e1">几个核心维度并行，安全/性能按需触发</text>
      <rect x="720" y="270" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="302" font-size="16" fill="#94a3b8">正确性 / 测试 / 可维护性 + 项目规范</text>
      <text x="742" y="328" font-size="16" fill="#94a3b8">→ 各维度交回结构化 finding</text>
    </g>
    <!-- step3 -->
    <g>
      <rect x="60" y="374" width="450" height="92" rx="12" fill="#1a2a4a" stroke="#a5b4fc" stroke-width="1.8"/>
      <text x="84" y="414" font-size="22" font-weight="700" fill="#a5b4fc">第三步 · 读一条真实 finding</text>
      <text x="84" y="446" font-size="17" fill="#cbd5e1">带证据 / 严重度 / 谁修 / 怎么验证 / 置信度</text>
      <rect x="720" y="382" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="414" font-size="16" fill="#94a3b8">合并去重 → 单一报告</text>
      <text x="742" y="440" font-size="16" fill="#94a3b8">→ 拿到就能动手，不用再猜</text>
    </g>
    <!-- step4 -->
    <g>
      <rect x="60" y="486" width="450" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="526" font-size="22" font-weight="700" fill="#7dd3fc">第四步 · 测试这道门</text>
      <text x="84" y="558" font-size="17" fill="#cbd5e1">空结果 / 边界 / 回归，哪些必须有测试兜底</text>
      <rect x="720" y="494" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="526" font-size="16" fill="#94a3b8">测试结果作为证据回流给 review</text>
      <text x="742" y="552" font-size="16" fill="#94a3b8">→ 绿了才算这道门过了</text>
    </g>
    <!-- step5 -->
    <g>
      <rect x="60" y="598" width="450" height="92" rx="12" fill="#102a44" stroke="#38bdf8" stroke-width="1.8"/>
      <text x="84" y="638" font-size="22" font-weight="700" fill="#7dd3fc">第五步 · 专项审计</text>
      <text x="84" y="670" font-size="17" fill="#cbd5e1">通用 review 之外，特定领域上专项闸</text>
      <rect x="720" y="606" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="638" font-size="16" fill="#94a3b8">如移动端一致性 / skill 一致性</text>
      <text x="742" y="664" font-size="16" fill="#94a3b8">→ 涉及才上，不涉及不套</text>
    </g>
    <!-- step6 -->
    <g>
      <rect x="60" y="710" width="450" height="92" rx="12" fill="#172554" stroke="#818cf8" stroke-width="2"/>
      <text x="84" y="750" font-size="22" font-weight="700" fill="#a5b4fc">收口 · 上线信心清单</text>
      <text x="84" y="782" font-size="17" fill="#cbd5e1">证据齐 / 验证过 / 按规则审 / 残余风险记</text>
      <rect x="720" y="718" width="420" height="76" rx="10" fill="#0f2942" stroke="#1e3a5f"/>
      <text x="742" y="750" font-size="16" fill="#94a3b8">四项都打勾 → 这才叫敢上线</text>
      <text x="742" y="776" font-size="16" fill="#94a3b8">→ 一条完整的可追溯证据链</text>
    </g>
  </g>

  <!-- 纵向箭头 -->
  <g stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)" opacity="0.85">
    <line x1="285" y1="242" x2="285" y2="258"/>
    <line x1="285" y1="354" x2="285" y2="370"/>
    <line x1="285" y1="466" x2="285" y2="482"/>
    <line x1="285" y1="578" x2="285" y2="594"/>
    <line x1="285" y1="690" x2="285" y2="706"/>
  </g>
  <!-- 产物虚线 -->
  <g stroke="#475569" stroke-width="1.5" stroke-dasharray="4 4">
    <line x1="510" y1="196" x2="720" y2="196"/>
    <line x1="510" y1="308" x2="720" y2="308"/>
    <line x1="510" y1="420" x2="720" y2="420"/>
    <line x1="510" y1="532" x2="720" y2="532"/>
    <line x1="510" y1="644" x2="720" y2="644"/>
    <line x1="510" y1="756" x2="720" y2="756"/>
  </g>

  <text x="285" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">把关动作</text>
  <text x="930" y="138" text-anchor="middle" font-family="-apple-system,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">攒下的证据</text>
</svg>
