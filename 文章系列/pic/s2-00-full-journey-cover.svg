<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">从一句话到上线：spec-first 完整工作流链路</title>
  <desc id="desc">spec-first 第二季总览封面：两张地图决定链路，每步留下高质量上下文</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="200" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 第二季 · 总览篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="44" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">从一句话到上线</text>
  <text x="100" y="278" fill="#f8fafc" font-size="36" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">我用 spec-first 跑完了整个流程</text>
  <text x="100" y="330" fill="#93c5fd" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">需求模式 · 仓库拓扑 · 完整链路 · 两张地图</text>
  <rect x="100" y="362" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="394" fill="#64748b" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">先选地图，再走链路——不是所有人都走同一条路。</text>
  <!-- 右侧：链路节点装饰 -->
  <g filter="url(#glow)" opacity="0.25">
    <circle cx="920" cy="180" r="28" fill="#0b2138" stroke="#34d399" stroke-width="2"/>
    <text x="920" y="186" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">需求</text>
    <circle cx="1000" cy="240" r="28" fill="#0b2138" stroke="#38bdf8" stroke-width="2"/>
    <text x="1000" y="246" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">计划</text>
    <circle cx="1080" cy="180" r="28" fill="#0b2138" stroke="#a78bfa" stroke-width="2"/>
    <text x="1080" y="186" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">执行</text>
    <circle cx="1000" cy="320" r="28" fill="#0b2138" stroke="#fbbf24" stroke-width="2"/>
    <text x="1000" y="326" text-anchor="middle" fill="#fde68a" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">审查</text>
    <circle cx="920" cy="380" r="28" fill="#0b2138" stroke="#34d399" stroke-width="2"/>
    <text x="920" y="386" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">沉淀</text>
    <line x1="920" y1="208" x2="980" y2="218" stroke="#38bdf8" stroke-width="1.5"/>
    <line x1="1020" y1="240" x2="1060" y2="200" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="1000" y1="268" x2="1000" y2="292" stroke="#fbbf24" stroke-width="1.5"/>
    <line x1="980" y1="338" x2="940" y2="358" stroke="#34d399" stroke-width="1.5"/>
  </g>
  <text x="100" y="470" fill="#475569" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
