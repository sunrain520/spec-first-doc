<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">两张地图的组合：需求模式 × 仓库拓扑</title>
  <desc id="desc">三种需求模式和三种仓库拓扑的组合，决定了不同场景下的链路特点</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">两张地图的组合：先选模式，再选拓扑</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">不同组合决定不同链路特点</text>

  <!-- 表头：列 -->
  <text x="310" y="130" text-anchor="middle" fill="#34d399" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">单仓单项目</text>
  <text x="620" y="130" text-anchor="middle" fill="#38bdf8" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">单仓多模块</text>
  <text x="930" y="130" text-anchor="middle" fill="#fbbf24" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">多仓工作区</text>

  <!-- 表头：行 -->
  <text x="80" y="210" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">0-1</text>
  <text x="80" y="350" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">1-10</text>
  <text x="80" y="490" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">10-100</text>

  <!-- 分隔线 -->
  <line x1="140" y1="148" x2="1140" y2="148" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="140" y1="288" x2="1140" y2="288" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="140" y1="428" x2="1140" y2="428" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="460" y1="148" x2="460" y2="568" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="770" y1="148" x2="770" y2="568" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 0-1 × 单仓单项目 ★ 最简单 -->
  <g filter="url(#shadow)">
    <rect x="150" y="158" width="300" height="120" rx="12" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="300" y="186" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">★ 最简单</text>
    <text x="300" y="210" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">ideate → brainstorm</text>
    <text x="300" y="230" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ plan → work</text>
    <text x="300" y="250" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ review → compound</text>
  </g>

  <!-- 0-1 × 单仓多模块 -->
  <g filter="url(#shadow)">
    <rect x="470" y="158" width="290" height="120" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1"/>
    <text x="615" y="186" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">标准流程</text>
    <text x="615" y="210" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">plan 按 module 拆 units</text>
    <text x="615" y="230" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">review 按影响面分组</text>
  </g>

  <!-- 0-1 × 多仓工作区 -->
  <g filter="url(#shadow)">
    <rect x="780" y="158" width="290" height="120" rx="12" fill="url(#card)" stroke="#fbbf24" stroke-width="1"/>
    <text x="925" y="186" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">需确认 target_repo</text>
    <text x="925" y="210" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">父 workspace 发现候选</text>
    <text x="925" y="230" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">进入 child repo 后标准流程</text>
  </g>

  <!-- 1-10 × 单仓单项目 -->
  <g filter="url(#shadow)">
    <rect x="150" y="298" width="300" height="120" rx="12" fill="url(#card)" stroke="#34d399" stroke-width="1"/>
    <text x="300" y="326" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">最常见场景</text>
    <text x="300" y="350" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">brainstorm 或 spec-prd</text>
    <text x="300" y="370" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ plan → doc-review</text>
    <text x="300" y="390" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ work → review</text>
  </g>

  <!-- 1-10 × 单仓多模块 -->
  <g filter="url(#shadow)">
    <rect x="470" y="298" width="290" height="120" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1"/>
    <text x="615" y="326" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">跨模块需求</text>
    <text x="615" y="350" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 写清楚 delta</text>
    <text x="615" y="370" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">plan 标明 module 边界</text>
    <text x="615" y="390" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">write-tasks 拆切片</text>
  </g>

  <!-- 1-10 × 多仓工作区 -->
  <g filter="url(#shadow)">
    <rect x="780" y="298" width="290" height="120" rx="12" fill="url(#card)" stroke="#fbbf24" stroke-width="1"/>
    <text x="925" y="326" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">跨仓需求</text>
    <text x="925" y="350" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">每个 child repo 独立 plan</text>
    <text x="925" y="370" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">task 带 target_repo</text>
    <text x="925" y="390" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">写入前确认边界</text>
  </g>

  <!-- 10-100 × 单仓单项目 -->
  <g filter="url(#shadow)">
    <rect x="150" y="438" width="300" height="110" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="300" y="466" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">存量系统标准路径</text>
    <text x="300" y="490" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">spec-prd → plan</text>
    <text x="300" y="510" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ doc-review → write-tasks</text>
    <text x="300" y="530" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">→ work → review</text>
  </g>

  <!-- 10-100 × 单仓多模块 -->
  <g filter="url(#shadow)">
    <rect x="470" y="438" width="290" height="110" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="615" y="466" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">大型存量系统</text>
    <text x="615" y="490" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 写 delta</text>
    <text x="615" y="510" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">plan 按 module 拆 units</text>
    <text x="615" y="530" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">review 按影响面分组</text>
  </g>

  <!-- 10-100 × 多仓工作区 -->
  <g filter="url(#shadow)">
    <rect x="780" y="438" width="290" height="110" rx="12" fill="url(#card)" stroke="#f87171" stroke-width="1.5"/>
    <text x="925" y="466" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">最复杂场景</text>
    <text x="925" y="490" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">每个 child repo 独立 spec-prd</text>
    <text x="925" y="510" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">严格 target_repo 边界</text>
    <text x="925" y="530" text-anchor="middle" fill="#f87171" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">建议先从单仓开始</text>
  </g>

  <text x="600" y="618" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">★ 推荐新手从「0-1 × 单仓单项目」开始，熟悉链路后再扩展到其他组合</text>
</svg>
