<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">三种仓库拓扑：单仓单项目 / 单仓多模块 / 多仓工作区</title>
  <desc id="desc">spec-first 的项目边界按 Git 拓扑判断，三种拓扑的 .spec-first 权威边界和关键约束不同</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="58" text-anchor="middle" fill="#e0f2fe" font-size="32" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">三种仓库拓扑：边界决定工作方式</text>
  <text x="600" y="92" text-anchor="middle" fill="#93c5fd" font-size="17" font-family="Arial, 'PingFang SC', sans-serif">spec-first 的项目边界按 Git 拓扑判断，不按 workflow 参数判断</text>

  <!-- 单仓单项目 -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="340" height="420" rx="20" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="230" y="162" text-anchor="middle" fill="#6ee7b7" font-size="19" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">单仓单项目</text>
    <text x="230" y="190" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">一个 Git repo = 一个应用/SDK/CLI</text>
    <!-- 目录树 -->
    <rect x="90" y="210" width="280" height="130" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1"/>
    <text x="110" y="238" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">my-app/</text>
    <text x="120" y="260" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.git/</text>
    <text x="120" y="280" fill="#34d399" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/  ← 权威</text>
    <text x="120" y="300" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">src/</text>
    <text x="120" y="320" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">docs/</text>
    <text x="230" y="380" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">最稳定的基础模式</text>
    <text x="230" y="406" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">所有 workflow 以当前</text>
    <text x="230" y="426" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">repo 为边界</text>
    <rect x="90" y="460" width="280" height="50" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1"/>
    <text x="230" y="491" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">直接运行 spec-first init</text>
  </g>

  <!-- 单仓多模块 -->
  <g filter="url(#shadow)">
    <rect x="430" y="120" width="340" height="420" rx="20" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="162" text-anchor="middle" fill="#7dd3fc" font-size="19" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">单仓多模块</text>
    <text x="600" y="190" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">一个 repo 含多个 package/service</text>
    <rect x="460" y="210" width="280" height="130" rx="10" fill="#082f49" stroke="#38bdf8" stroke-width="1"/>
    <text x="480" y="238" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">platform/</text>
    <text x="490" y="258" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.git/</text>
    <text x="490" y="278" fill="#38bdf8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/  ← 权威</text>
    <text x="490" y="298" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">packages/cli/ core/ web/</text>
    <text x="490" y="318" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">services/api/ worker/</text>
    <text x="600" y="380" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">⚠ 不要为每个 module</text>
    <text x="600" y="402" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">拆多套 .spec-first</text>
    <text x="600" y="432" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">由 plan/work/review</text>
    <text x="600" y="452" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">按 module 边界拆分</text>
    <rect x="460" y="460" width="280" height="50" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="1"/>
    <text x="600" y="491" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-first init（整个 repo）</text>
  </g>

  <!-- 多仓工作区 -->
  <g filter="url(#shadow)">
    <rect x="800" y="120" width="340" height="420" rx="20" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="970" y="162" text-anchor="middle" fill="#fde68a" font-size="19" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">多仓工作区</text>
    <text x="970" y="190" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">父目录下多个独立 child repos</text>
    <rect x="830" y="210" width="280" height="130" rx="10" fill="#1c1606" stroke="#fbbf24" stroke-width="1"/>
    <text x="850" y="238" fill="#fde68a" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">workspace/</text>
    <text x="860" y="258" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">frontend/.git/.spec-first/</text>
    <text x="860" y="278" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">backend/.git/.spec-first/</text>
    <text x="860" y="298" fill="#fbbf24" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/workspace/ ← advisory</text>
    <text x="970" y="380" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">⚠ 写入前必须有</text>
    <text x="970" y="402" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">明确 target_repo</text>
    <text x="970" y="432" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">父 workspace 只做</text>
    <text x="970" y="452" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">候选发现和 advisory</text>
    <rect x="830" y="460" width="280" height="50" rx="8" fill="#1c1606" stroke="#fbbf24" stroke-width="1"/>
    <text x="970" y="484" text-anchor="middle" fill="#fde68a" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">--repo project-a</text>
    <text x="970" y="502" text-anchor="middle" fill="#fde68a" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">--all-repos</text>
  </g>

  <text x="600" y="610" text-anchor="middle" fill="#475569" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">项目边界按 Git 拓扑判断——.spec-first 的权威范围决定了 workflow 的写入边界</text>
</svg>
