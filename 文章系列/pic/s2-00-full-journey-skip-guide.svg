<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">什么时候可以跳过某些步骤</title>
  <desc id="desc">spec-first 链路中各步骤的跳过条件和决策逻辑</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">什么时候可以跳过某些步骤</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">spec-first 不是固定流水线，按场景灵活组合</text>

  <!-- ideate 可跳过 -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="520" height="100" rx="14" fill="url(#card)" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="100" y="156" fill="#94a3b8" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">spec-ideate</text>
    <text x="100" y="182" fill="#64748b" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">跳过条件：方向已清晰，直接 brainstorm 或 spec-prd</text>
    <text x="100" y="204" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适用：1-10 / 10-100 场景，或 0-1 但方向已有共识</text>
  </g>

  <!-- write-tasks 可跳过 -->
  <g filter="url(#shadow)">
    <rect x="620" y="120" width="520" height="100" rx="14" fill="url(#card)" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="660" y="156" fill="#94a3b8" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">spec-write-tasks</text>
    <text x="660" y="182" fill="#64748b" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">跳过条件：plan 小（&lt;3 units），无跨模块依赖</text>
    <text x="660" y="204" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适用：单文件修复、小功能、typo 类改动</text>
  </g>

  <!-- doc-review 轻量化 -->
  <g filter="url(#shadow)">
    <rect x="60" y="244" width="520" height="100" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="100" y="280" fill="#c4b5fd" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">spec-doc-review</text>
    <text x="100" y="306" fill="#64748b" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">轻量化条件：低风险改动，plan 简单清晰</text>
    <text x="100" y="328" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">⚠ 大需求、跨模块、高风险时不建议跳过</text>
  </g>

  <!-- 不能跳过的 -->
  <g filter="url(#shadow)">
    <rect x="620" y="244" width="520" height="100" rx="14" fill="#1c0606" stroke="#f87171" stroke-width="1.5"/>
    <text x="660" y="280" fill="#fca5a5" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">不建议跳过的步骤</text>
    <text x="660" y="306" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">环境就绪（init/mcp-setup/graph-bootstrap）</text>
    <text x="660" y="328" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">需求收敛（brainstorm 或 spec-prd）</text>
  </g>

  <!-- 最小链路 -->
  <g filter="url(#shadow)">
    <rect x="60" y="368" width="1080" height="120" rx="16" fill="#082f49" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="404" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">最小可用链路（单仓单项目 + 小需求）</text>
    <text x="600" y="436" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="'SF Mono', Menlo, Consolas, monospace">brainstorm → plan → work → compound</text>
    <text x="600" y="466" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">四步完成，每步都留下高质量上下文</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">跳过步骤的原则：降低成本，但不降低上下文质量——每步的产出物仍然要可被下游消费</text>
</svg>
