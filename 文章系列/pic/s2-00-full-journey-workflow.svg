<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">spec-first 完整工作流链路图</title>
  <desc id="desc">从环境就绪到经验沉淀的完整链路，每个节点的输入输出和交接边界</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="700" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-first 完整工作流链路</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">每一步都留下下一步能读取的高质量上下文</text>

  <!-- 节点定义：y=140 第一行，y=340 第二行 -->
  <!-- 行1: 环境 → 需求 → 计划 → doc-review -->
  <!-- 行2: write-tasks → work → code-review → compound -->

  <!-- 环境就绪 -->
  <g filter="url(#shadow)">
    <rect x="40" y="130" width="160" height="80" rx="14" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="120" y="162" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">环境就绪</text>
    <text x="120" y="182" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">init / mcp-setup</text>
    <text x="120" y="198" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">graph-bootstrap</text>
  </g>
  <path d="M200 170 H228" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 需求收敛 -->
  <g filter="url(#shadow)">
    <rect x="228" y="130" width="160" height="80" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="308" y="162" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">需求收敛</text>
    <text x="308" y="182" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">brainstorm</text>
    <text x="308" y="198" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-prd</text>
  </g>
  <path d="M388 170 H416" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 计划形成 -->
  <g filter="url(#shadow)">
    <rect x="416" y="130" width="160" height="80" rx="14" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="496" y="162" text-anchor="middle" fill="#67e8f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">计划形成</text>
    <text x="496" y="182" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-plan</text>
    <text x="496" y="198" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">plan doc</text>
  </g>
  <path d="M576 170 H604" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- doc-review -->
  <g filter="url(#shadow)">
    <rect x="604" y="130" width="160" height="80" rx="14" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="684" y="162" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">计划 review</text>
    <text x="684" y="182" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-doc-review</text>
    <text x="684" y="198" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">findings</text>
  </g>
  <path d="M764 170 H792" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- write-tasks（可选） -->
  <g filter="url(#shadow)">
    <rect x="792" y="130" width="160" height="80" rx="14" fill="#0f172a" stroke="#475569" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="872" y="158" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">任务切片</text>
    <text x="872" y="176" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">write-tasks</text>
    <text x="872" y="194" text-anchor="middle" fill="#475569" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">（可选）</text>
  </g>

  <!-- 折线向下 -->
  <path d="M872 210 L872 260 L120 260 L120 330" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 3" opacity="0.4"/>
  <path d="M496 210 L496 260" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 第二行 -->
  <!-- 执行 -->
  <g filter="url(#shadow)">
    <rect x="416" y="330" width="160" height="80" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="496" y="362" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">执行</text>
    <text x="496" y="382" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-work</text>
    <text x="496" y="398" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">code + verification</text>
  </g>
  <path d="M576 370 H604" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- code-review -->
  <g filter="url(#shadow)">
    <rect x="604" y="330" width="160" height="80" rx="14" fill="#082f49" stroke="#fbbf24" stroke-width="2"/>
    <text x="684" y="362" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">代码审查</text>
    <text x="684" y="382" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-code-review</text>
    <text x="684" y="398" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">findings</text>
  </g>
  <path d="M764 370 H792" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- compound -->
  <g filter="url(#shadow)">
    <rect x="792" y="330" width="160" height="80" rx="14" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="872" y="362" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">经验沉淀</text>
    <text x="872" y="382" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">spec-compound</text>
    <text x="872" y="398" text-anchor="middle" fill="#64748b" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">docs/solutions/</text>
  </g>

  <!-- 产物标注 -->
  <text x="120" y="240" text-anchor="middle" fill="#34d399" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">readiness facts</text>
  <text x="308" y="240" text-anchor="middle" fill="#38bdf8" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">requirements brief</text>
  <text x="496" y="240" text-anchor="middle" fill="#22d3ee" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">plan doc</text>
  <text x="684" y="240" text-anchor="middle" fill="#a78bfa" font-size="11" font-family="'SF Mono', Menlo, Consolas, monospace">findings</text>

  <!-- 底部说明 -->
  <rect x="60" y="470" width="1080" height="80" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="600" y="506" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">每一步都留下下一步能读取的高质量上下文</text>
  <text x="600" y="534" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">脚本负责确定性事实 · LLM 负责语义判断 · 人负责最终确认</text>

  <!-- 跳过说明 -->
  <text x="600" y="610" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">虚线节点（write-tasks）可选跳过；小任务可直接从 plan 进入 work</text>
</svg>
