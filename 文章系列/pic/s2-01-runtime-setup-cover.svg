<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">开始第一个任务之前，你需要做这三件事</title>
  <desc id="desc">spec-first 第二季第 1 篇封面：init / mcp-setup / graph-bootstrap 三件事有顺序依赖</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="200" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 第二季 · 第 1 篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="44" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">开始第一个任务之前</text>
  <text x="100" y="278" fill="#f8fafc" font-size="36" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">你需要做这三件事</text>
  <text x="100" y="330" fill="#93c5fd" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">init · mcp-setup · graph-bootstrap</text>
  <rect x="100" y="362" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="394" fill="#64748b" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">装完就能用？三件事有顺序依赖，缺一不可。</text>
  <!-- 右侧：三步链条 -->
  <g filter="url(#glow)" opacity="0.3">
    <circle cx="900" cy="200" r="36" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="900" y="196" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">01</text>
    <text x="900" y="212" text-anchor="middle" fill="#6ee7b7" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">init</text>
    <path d="M900 236 L900 264" stroke="#34d399" stroke-width="2" marker-end="url(#arr)"/>
    <circle cx="900" cy="300" r="36" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="900" y="296" text-anchor="middle" fill="#7dd3fc" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">02</text>
    <text x="900" y="312" text-anchor="middle" fill="#7dd3fc" font-size="10" font-family="Arial, 'PingFang SC', sans-serif">mcp-setup</text>
    <path d="M900 336 L900 364" stroke="#38bdf8" stroke-width="2" marker-end="url(#arr)"/>
    <circle cx="900" cy="400" r="36" fill="#0b0618" stroke="#a78bfa" stroke-width="2"/>
    <text x="900" y="396" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">03</text>
    <text x="900" y="412" text-anchor="middle" fill="#c4b5fd" font-size="10" font-family="Arial, 'PingFang SC', sans-serif">graph-bootstrap</text>
  </g>
  <text x="100" y="470" fill="#475569" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
