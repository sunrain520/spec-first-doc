<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">三件事完成后的目录结构</title>
  <desc id="desc">init + mcp-setup + graph-bootstrap 完成后，项目目录里会有哪些文件</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">三件事完成后的目录结构</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每一步都在项目里留下可追踪的产物</text>

  <!-- 左：init 产出 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="340" height="340" rx="16" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="230" y="148" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">① init 产出</text>
    <text x="90" y="178" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.claude/</text>
    <text x="110" y="200" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">commands/spec/  ← workflow 命令</text>
    <text x="110" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">skills/         ← skill 定义</text>
    <text x="110" y="240" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">agents/         ← agent 定义</text>
    <text x="90" y="268" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.agents/</text>
    <text x="110" y="290" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">skills/         ← Codex skill mirror</text>
    <text x="90" y="318" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.gitignore</text>
    <text x="110" y="340" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace"># spec-first managed block</text>
    <text x="230" y="420" text-anchor="middle" fill="#34d399" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">宿主识别 workflow 命令</text>
  </g>

  <!-- 中：mcp-setup 产出 -->
  <g filter="url(#shadow)">
    <rect x="430" y="110" width="340" height="340" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="148" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">② mcp-setup 产出</text>
    <text x="460" y="178" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/config/</text>
    <text x="480" y="200" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">graph-providers.json</text>
    <text x="480" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">runtime-capabilities.json</text>
    <text x="480" y="240" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">provider-artifacts.json</text>
    <text x="480" y="260" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">readiness-ledger-v2.json</text>
    <text x="460" y="290" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/workspace/</text>
    <text x="480" y="312" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">scenario-fingerprint-setup.json</text>
    <text x="600" y="420" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">graph-bootstrap 的配置来源</text>
  </g>

  <!-- 右：graph-bootstrap 产出 -->
  <g filter="url(#shadow)">
    <rect x="800" y="110" width="340" height="340" rx="16" fill="#0b0618" stroke="#a78bfa" stroke-width="2"/>
    <text x="970" y="148" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">③ graph-bootstrap 产出</text>
    <text x="830" y="178" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/graph/</text>
    <text x="850" y="200" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">graph-facts.json  ← 核心</text>
    <text x="850" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">provider-status.json</text>
    <text x="850" y="240" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">bootstrap-report.md</text>
    <text x="830" y="268" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/impact/</text>
    <text x="850" y="290" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">bootstrap-impact-capabilities.json</text>
    <text x="830" y="318" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/providers/gitnexus/</text>
    <text x="850" y="340" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">normalized/architecture-facts.json</text>
    <text x="970" y="420" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">下游 workflow 的 evidence 基础</text>
  </g>

  <text x="600" y="510" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">这些目录都在 .gitignore 的 managed block 里，不会被提交到 Git</text>
</svg>
