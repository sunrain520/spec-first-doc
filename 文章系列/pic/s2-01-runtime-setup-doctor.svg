<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">spec-first doctor 检查的五个维度</title>
  <desc id="desc">doctor 检查 Node.js 版本、Git、宿主 CLI、runtime assets、drift 五个维度</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="600" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-first doctor 检查的五个维度</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">遇到问题先跑 doctor——它会告诉你哪里出了问题，以及该怎么修</text>

  <!-- 维度1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="210" height="380" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="165" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Node.js 版本</text>
    <text x="165" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">要求 >= 20</text>
    <rect x="80" y="200" width="170" height="36" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1"/>
    <text x="165" y="224" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">node --version</text>
    <text x="165" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">版本不满足时</text>
    <text x="165" y="300" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">报 ERROR</text>
    <text x="165" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">Fix: 升级 Node.js</text>
  </g>

  <!-- 维度2 -->
  <g filter="url(#shadow)">
    <rect x="290" y="110" width="210" height="380" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="395" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Git 可用性</text>
    <text x="395" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Git 必须可用</text>
    <rect x="310" y="200" width="170" height="36" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="1"/>
    <text x="395" y="224" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">git --version</text>
    <text x="395" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">非 Git 目录时</text>
    <text x="395" y="300" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">报 WARN</text>
    <text x="395" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">Fix: git init</text>
  </g>

  <!-- 维度3 -->
  <g filter="url(#shadow)">
    <rect x="520" y="110" width="210" height="380" rx="16" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <text x="625" y="148" text-anchor="middle" fill="#67e8f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">宿主 CLI</text>
    <text x="625" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Claude Code / Codex</text>
    <rect x="540" y="200" width="170" height="36" rx="8" fill="#082f49" stroke="#22d3ee" stroke-width="1"/>
    <text x="625" y="224" text-anchor="middle" fill="#67e8f9" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">claude --version</text>
    <text x="625" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">宿主未安装时</text>
    <text x="625" y="300" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">报 WARN</text>
    <text x="625" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">Fix: 安装宿主</text>
  </g>

  <!-- 维度4 -->
  <g filter="url(#shadow)">
    <rect x="750" y="110" width="210" height="380" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="855" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Runtime Assets</text>
    <text x="855" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">命令是否存在</text>
    <rect x="770" y="200" width="170" height="36" rx="8" fill="#0b0618" stroke="#a78bfa" stroke-width="1"/>
    <text x="855" y="224" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">检查 .claude/</text>
    <text x="855" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">命令缺失时</text>
    <text x="855" y="300" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">报 ERROR</text>
    <text x="855" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">Fix: spec-first init</text>
  </g>

  <!-- 维度5 -->
  <g filter="url(#shadow)">
    <rect x="980" y="110" width="160" height="380" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="1060" y="148" text-anchor="middle" fill="#fde68a" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Drift 检测</text>
    <text x="1060" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">source vs runtime</text>
    <rect x="1000" y="200" width="120" height="36" rx="8" fill="#1c1606" stroke="#fbbf24" stroke-width="1"/>
    <text x="1060" y="224" text-anchor="middle" fill="#fde68a" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">hash 对比</text>
    <text x="1060" y="280" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">drift 时</text>
    <text x="1060" y="300" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">报 WARN</text>
    <text x="1060" y="340" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">Fix: init</text>
  </g>

  <text x="600" y="550" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">doctor 输出格式：LEVEL name: message（INFO / WARN / ERROR）；有 ERROR 时必须修复</text>
</svg>
