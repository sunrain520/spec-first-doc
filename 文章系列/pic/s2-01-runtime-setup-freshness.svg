<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">graph-facts.json 四种 freshness 状态</title>
  <desc id="desc">fresh / dirty-advisory / stale / query-unverified 四种状态的含义和使用方式</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">graph-facts.json 四种 freshness 状态</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">使用图谱结果前，先看 freshness_state 和 limitations</text>

  <!-- fresh -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="520" height="190" rx="18" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="60" y="120" width="520" height="6" rx="3" fill="#34d399"/>
    <text x="320" y="162" text-anchor="middle" fill="#6ee7b7" font-size="22" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">fresh</text>
    <text x="320" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">图谱与当前 checkout 一致</text>
    <text x="320" y="222" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">可以作为 primary evidence 使用</text>
    <rect x="90" y="244" width="460" height="40" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1"/>
    <text x="320" y="270" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✓ 可用于 plan/work/review 的 evidence</text>
  </g>

  <!-- dirty-advisory -->
  <g filter="url(#shadow)">
    <rect x="620" y="120" width="520" height="190" rx="18" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <rect x="620" y="120" width="520" height="6" rx="3" fill="#fbbf24"/>
    <text x="880" y="162" text-anchor="middle" fill="#fde68a" font-size="22" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">dirty-advisory</text>
    <text x="880" y="192" text-anchor="middle" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">工作区有未提交改动</text>
    <text x="880" y="222" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">图谱结果只能当参考，不能当确认证据</text>
    <rect x="650" y="244" width="460" height="40" rx="8" fill="#1c1606" stroke="#fbbf24" stroke-width="1"/>
    <text x="880" y="270" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">⚠ advisory 级别，需补 bounded direct reads</text>
  </g>

  <!-- stale -->
  <g filter="url(#shadow)">
    <rect x="60" y="340" width="520" height="190" rx="18" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
    <rect x="60" y="340" width="520" height="6" rx="3" fill="#f87171"/>
    <text x="320" y="382" text-anchor="middle" fill="#fca5a5" font-size="22" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">stale</text>
    <text x="320" y="412" text-anchor="middle" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">source_revision 与 graph-facts 不符</text>
    <text x="320" y="442" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">图谱基于旧版本代码，不能当真</text>
    <rect x="90" y="464" width="460" height="40" rx="8" fill="#1c0606" stroke="#f87171" stroke-width="1"/>
    <text x="320" y="490" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 必须重跑 graph-bootstrap 后才能使用</text>
  </g>

  <!-- query-unverified -->
  <g filter="url(#shadow)">
    <rect x="620" y="340" width="520" height="190" rx="18" fill="url(#card)" stroke="#64748b" stroke-width="2"/>
    <rect x="620" y="340" width="520" height="6" rx="3" fill="#64748b"/>
    <text x="880" y="382" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">query-unverified</text>
    <text x="880" y="412" text-anchor="middle" fill="#f1f5f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">provider 可用性未经验证</text>
    <text x="880" y="442" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">setup 完成但 bootstrap 未运行</text>
    <rect x="650" y="464" width="460" height="40" rx="8" fill="#111c2e" stroke="#64748b" stroke-width="1"/>
    <text x="880" y="490" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">⚠ 需要运行 graph-bootstrap 验证</text>
  </g>

  <text x="600" y="600" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">当前仓库状态：dirty-advisory（工作区有未提交改动）+ definitions-only（无 process graph）</text>
</svg>
