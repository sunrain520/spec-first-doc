<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">三件事的顺序依赖关系</title>
  <desc id="desc">spec-first init → spec-mcp-setup → spec-graph-bootstrap 三件事的顺序依赖和每步产出物</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">三件事的顺序依赖</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">每一步都依赖上一步的产出物，不能跳过或乱序</text>

  <!-- 第一件事：init -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="320" height="360" rx="20" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="220" y="162" text-anchor="middle" fill="#6ee7b7" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">① spec-first init</text>
    <text x="220" y="192" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">从 source 生成 host runtime assets</text>
    <text x="90" y="230" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">命令：</text>
    <rect x="90" y="242" width="260" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="266" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first init --claude</text>
    <rect x="90" y="286" width="260" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="220" y="310" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first init --codex</text>
    <text x="90" y="350" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">产出物：</text>
    <text x="90" y="374" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.claude/commands/spec/</text>
    <text x="90" y="396" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.agents/skills/</text>
    <text x="90" y="418" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.gitignore (managed block)</text>
    <text x="90" y="452" fill="#f87171" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">⚠ 不要手改这些目录</text>
  </g>

  <!-- 箭头 1→2 -->
  <path d="M382 300 H418" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="400" y="286" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">依赖</text>

  <!-- 第二件事：mcp-setup -->
  <g filter="url(#shadow)">
    <rect x="420" y="120" width="320" height="360" rx="20" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="580" y="162" text-anchor="middle" fill="#7dd3fc" font-size="22" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">② spec-mcp-setup</text>
    <text x="580" y="192" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">安装并验证 MCP/helper runtime</text>
    <text x="450" y="230" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">命令：</text>
    <rect x="450" y="242" width="260" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="580" y="266" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">/spec:mcp-setup</text>
    <rect x="450" y="286" width="260" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="580" y="310" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">$spec-mcp-setup</text>
    <text x="450" y="350" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">产出物：</text>
    <text x="450" y="374" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/config/graph-providers.json</text>
    <text x="450" y="396" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/config/runtime-capabilities.json</text>
    <text x="450" y="418" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/config/provider-artifacts.json</text>
    <text x="450" y="452" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">readiness ledger v2</text>
  </g>

  <!-- 箭头 2→3 -->
  <path d="M742 300 H778" stroke="#38bdf8" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="760" y="286" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">依赖</text>

  <!-- 第三件事：graph-bootstrap -->
  <g filter="url(#shadow)">
    <rect x="780" y="120" width="360" height="360" rx="20" fill="#0b0618" stroke="#a78bfa" stroke-width="2"/>
    <text x="960" y="162" text-anchor="middle" fill="#c4b5fd" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">③ spec-graph-bootstrap</text>
    <text x="960" y="192" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">编译 graph readiness facts</text>
    <text x="810" y="230" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">命令：</text>
    <rect x="810" y="242" width="300" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="960" y="266" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">/spec:graph-bootstrap</text>
    <rect x="810" y="286" width="300" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="960" y="310" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">$spec-graph-bootstrap</text>
    <text x="810" y="350" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">产出物：</text>
    <text x="810" y="374" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/graph/graph-facts.json</text>
    <text x="810" y="396" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/graph/provider-status.json</text>
    <text x="810" y="418" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">.spec-first/impact/bootstrap-impact-capabilities.json</text>
    <text x="810" y="452" fill="#a78bfa" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">下游 workflow 的 evidence 基础</text>
  </g>

  <text x="600" y="560" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">三件事完成后，重启宿主（Claude Code 或 Codex），才能进入第一个 workflow</text>
</svg>
