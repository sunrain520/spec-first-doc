<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">ideate vs brainstorm：发散 vs 收敛</title>
  <desc id="desc">spec-ideate 回答"有哪些方向值得探索"，spec-brainstorm 回答"这个方向具体要做什么"</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">ideate vs brainstorm：发散 vs 收敛</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">两个工具解决不同阶段的问题，不能互相替代</text>

  <!-- ideate -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="480" height="380" rx="22" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="300" y="166" text-anchor="middle" fill="#6ee7b7" font-size="24" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">spec-ideate</text>
    <text x="300" y="198" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">发散：探索方向</text>
    <text x="300" y="228" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">回答：有哪些方向值得探索？</text>
    <rect x="90" y="254" width="420" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="300" y="283" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">生成多个候选方向，批判性评估</text>
    <rect x="90" y="310" width="420" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="300" y="339" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">排序并推荐最有价值的方向</text>
    <rect x="90" y="366" width="420" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="300" y="395" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产出：ideation artifact（方向候选）</text>
    <text x="300" y="460" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适用：0-1 场景，方向未定</text>
    <text x="300" y="482" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">触发词：what should I improve / give me ideas</text>
  </g>

  <!-- 箭头 -->
  <path d="M542 300 H646" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="594" y="284" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">选定方向后</text>

  <!-- brainstorm -->
  <g filter="url(#shadow)">
    <rect x="648" y="120" width="492" height="380" rx="22" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="894" y="166" text-anchor="middle" fill="#7dd3fc" font-size="24" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">spec-brainstorm</text>
    <text x="894" y="198" text-anchor="middle" fill="#f8fafc" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">收敛：定义边界</text>
    <text x="894" y="228" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">回答：这个方向具体要做什么？</text>
    <rect x="678" y="254" width="432" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="894" y="283" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">明确目标、非目标、验收标准</text>
    <rect x="678" y="310" width="432" height="46" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="894" y="339" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">识别边界和风险</text>
    <rect x="678" y="366" width="432" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="894" y="395" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产出：requirements brief（可交给 plan）</text>
    <text x="894" y="460" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适用：方向已定，需要收敛边界</text>
    <text x="894" y="482" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">触发词：let's brainstorm / help me think through X</text>
  </g>

  <text x="600" y="568" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">ideate 不能直接进入 plan——必须先经过 brainstorm 把方向收敛成可执行的需求边界</text>
</svg>
