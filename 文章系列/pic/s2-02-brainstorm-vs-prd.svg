<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">brainstorm vs spec-prd：什么时候用哪个</title>
  <desc id="desc">brainstorm 适合方向不确定时，spec-prd 适合存量系统增量需求，两者的选择标准</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">brainstorm vs spec-prd：什么时候用哪个</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">两个工具都产出需求文档，但适用场景不同</text>

  <!-- 表头 -->
  <rect x="60" y="100" width="1080" height="44" rx="8" fill="#082f49"/>
  <text x="200" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">判断维度</text>
  <text x="560" y="128" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-brainstorm</text>
  <text x="960" y="128" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-prd</text>
  <line x1="360" y1="100" x2="360" y2="500" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="760" y1="100" x2="760" y2="500" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 行1 -->
  <rect x="60" y="144" width="1080" height="56" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="178" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产品阶段</text>
  <text x="560" y="178" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">0-1 / 1-10（方向不确定）</text>
  <text x="960" y="178" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">1-10 / 10-100（存量系统）</text>

  <!-- 行2 -->
  <text x="200" y="234" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">核心问题</text>
  <text x="560" y="234" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">我们要做什么？</text>
  <text x="960" y="234" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">在已有系统上改什么？</text>

  <!-- 行3 -->
  <rect x="60" y="256" width="1080" height="56" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="290" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">输入</text>
  <text x="560" y="290" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">想法、问题、模糊需求</text>
  <text x="960" y="290" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">存量系统 + 变更请求</text>

  <!-- 行4 -->
  <text x="200" y="346" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产出物</text>
  <text x="560" y="346" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">requirements brief</text>
  <text x="960" y="346" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">prd-requirements 文档</text>

  <!-- 行5 -->
  <rect x="60" y="368" width="1080" height="56" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="402" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">对 plan 的价值</text>
  <text x="560" y="402" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">明确 WHAT 和边界</text>
  <text x="960" y="402" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">明确 delta，不用猜当前状态</text>

  <!-- 行6 -->
  <text x="200" y="458" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">不适合</text>
  <text x="560" y="458" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">存量系统精确 delta 描述</text>
  <text x="960" y="458" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">0-1 产品探索</text>

  <line x1="60" y1="476" x2="1140" y2="476" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="520" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">两者都产出 docs/brainstorms/*-requirements.md，但 spec-prd 的产物带 artifact_kind: prd-requirements 标记</text>
</svg>
