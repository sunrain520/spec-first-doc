<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">spec-prd 的核心逻辑：current-state evidence + change delta</title>
  <desc id="desc">spec-prd 先描述当前系统是什么样的，再描述这次改动要改什么，让 plan 不用猜 WHAT</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1,1 L13,7 L1,13 Z" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="600" y="56" text-anchor="middle" fill="#e0f2fe" font-size="30" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-prd 的核心逻辑</text>
  <text x="600" y="88" text-anchor="middle" fill="#93c5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">先描述当前系统，再描述变化——让 plan 不用猜 WHAT</text>

  <!-- 没有 spec-prd 时 -->
  <g filter="url(#shadow)">
    <rect x="60" y="120" width="480" height="380" rx="22" fill="#0f172a" stroke="#64748b" stroke-width="2" stroke-dasharray="8 5"/>
    <text x="300" y="162" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">没有 spec-prd</text>
    <text x="300" y="192" text-anchor="middle" fill="#64748b" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 需要自己猜当前系统状态</text>
    <rect x="90" y="218" width="420" height="50" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="300" y="249" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">用户说："给 CLI 加健康检查"</text>
    <rect x="90" y="278" width="420" height="50" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="300" y="309" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 猜：当前没有健康检查？</text>
    <rect x="90" y="338" width="420" height="50" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="300" y="369" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 猜：用什么框架实现？</text>
    <rect x="90" y="398" width="420" height="50" rx="10" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="300" y="429" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 猜：影响哪些现有接口？</text>
    <text x="300" y="480" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">plan 发明行为 → AI 做错</text>
  </g>

  <!-- 箭头 -->
  <path d="M542 300 H646" stroke="#38bdf8" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="594" y="284" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">加 spec-prd</text>

  <!-- 有 spec-prd 时 -->
  <g filter="url(#shadow)">
    <rect x="648" y="120" width="492" height="380" rx="22" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="894" y="162" text-anchor="middle" fill="#7dd3fc" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">有 spec-prd</text>
    <text x="894" y="192" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">current-state evidence + change delta</text>
    <rect x="678" y="218" width="432" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="894" y="249" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">当前：CLI 有 /api/v1/ 路由，无健康检查</text>
    <rect x="678" y="278" width="432" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="894" y="309" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">变化：新增 /health，检查 DB + 依赖服务</text>
    <rect x="678" y="338" width="432" height="50" rx="10" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="894" y="369" text-anchor="middle" fill="#bae6fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">不变：现有 /api/v1/ 路由不受影响</text>
    <rect x="678" y="398" width="432" height="50" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="894" y="429" text-anchor="middle" fill="#bbf7d0" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产出：prd-requirements 文档</text>
    <text x="894" y="480" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">plan 直接决定 HOW → AI 做对</text>
  </g>

  <text x="600" y="568" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 的价值：把"当前系统是什么样的"写清楚，让 plan 只需要决定"怎么改"</text>
</svg>
