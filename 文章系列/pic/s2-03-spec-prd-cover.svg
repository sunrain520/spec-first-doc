<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="511" viewBox="0 0 1200 511" role="img" aria-labelledby="title desc">
  <title id="title">改老系统时，AI 最容易在哪里翻车</title>
  <desc id="desc">spec-first 第二季第 3 篇封面：spec-prd 的 brownfield 逻辑，让 plan 不用猜 WHAT</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#102a43"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="511" fill="url(#bg)"/>
  <g opacity="0.07" stroke="#60a5fa" stroke-width="1">
    <path d="M0 100 H1200"/><path d="M0 200 H1200"/><path d="M0 300 H1200"/><path d="M0 400 H1200"/>
    <path d="M200 0 V511"/><path d="M400 0 V511"/><path d="M600 0 V511"/><path d="M800 0 V511"/><path d="M1000 0 V511"/>
  </g>
  <rect x="80" y="120" width="5" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="100" y="120" width="200" height="32" rx="6" fill="#0b2138" stroke="#2563eb" stroke-width="1.5"/>
  <text x="200" y="141" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">Spec-First 第二季 · 第 3 篇</text>
  <text x="100" y="218" fill="#f8fafc" font-size="44" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">改老系统时</text>
  <text x="100" y="278" fill="#f8fafc" font-size="36" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">AI 最容易在哪里翻车</text>
  <text x="100" y="330" fill="#93c5fd" font-size="20" font-family="Arial, 'PingFang SC', sans-serif">spec-prd · brownfield · current-state + delta</text>
  <rect x="100" y="362" width="680" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
  <text x="100" y="394" fill="#64748b" font-size="16" font-family="Arial, 'PingFang SC', sans-serif">AI 不知道当前系统是什么样的——spec-prd 解决这个问题。</text>
  <!-- 右侧：current-state + delta 示意 -->
  <g opacity="0.25">
    <rect x="880" y="160" width="240" height="60" rx="10" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="1000" y="196" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">current-state evidence</text>
    <text x="1000" y="248" text-anchor="middle" fill="#38bdf8" font-size="20" font-family="Arial, sans-serif">+</text>
    <rect x="880" y="270" width="240" height="60" rx="10" fill="#0b0618" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1000" y="306" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">change delta</text>
    <text x="1000" y="358" text-anchor="middle" fill="#38bdf8" font-size="20" font-family="Arial, sans-serif">=</text>
    <rect x="880" y="376" width="240" height="60" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="1000" y="412" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">prd-requirements</text>
  </g>
  <text x="100" y="470" fill="#475569" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">spec-first.cn</text>
</svg>
