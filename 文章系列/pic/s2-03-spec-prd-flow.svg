<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">spec-prd 的执行流程</title>
  <desc id="desc">spec-prd 的四个阶段：分类意图、收集当前状态证据、确认变化 delta、写 PRD 文档</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-prd 的执行流程</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">四个阶段，从增量请求到 PRD-grade 需求文档</text>

  <!-- 阶段1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 0</text>
    <text x="180" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">分类意图</text>
    <text x="90" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• create / refine / validate</text>
    <text x="90" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 检查已有 PRD 文档</text>
    <text x="90" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确认 target surface</text>
    <rect x="90" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="170" y="384" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">意图分类</text>
  </g>
  <path d="M302 270 H338" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段2 -->
  <g filter="url(#shadow)">
    <rect x="340" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="460" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 1</text>
    <text x="460" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">收集当前状态</text>
    <text x="370" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 读取 source/docs/contracts</text>
    <text x="370" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 标注 evidence_grade</text>
    <text x="370" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写 Current System Snapshot</text>
    <text x="370" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 未确认的放 Assumptions</text>
    <rect x="370" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="450" y="384" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">current-state evidence</text>
  </g>
  <path d="M582 270 H618" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段3 -->
  <g filter="url(#shadow)">
    <rect x="620" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="740" y="148" text-anchor="middle" fill="#67e8f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 2</text>
    <text x="740" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">确认变化 delta</text>
    <text x="650" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确认 keep/extend/replace/remove</text>
    <text x="650" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 问最小阻塞性问题</text>
    <text x="650" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 不让 current-state 扩张 scope</text>
    <rect x="650" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#22d3ee" stroke-width="1"/>
    <text x="730" y="384" text-anchor="middle" fill="#67e8f9" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">change delta 确认</text>
  </g>
  <path d="M862 270 H898" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段4 -->
  <g filter="url(#shadow)">
    <rect x="900" y="110" width="240" height="320" rx="16" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="1020" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 3</text>
    <text x="1020" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">写 PRD 文档</text>
    <text x="930" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写 Requirements (R1/R2/...)</text>
    <text x="930" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写 Acceptance Examples</text>
    <text x="930" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写 Scope Boundaries</text>
    <text x="930" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 运行 readiness gate</text>
    <rect x="930" y="360" width="180" height="36" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="1020" y="384" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">prd-requirements.md</text>
  </g>

  <text x="600" y="500" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 不写实现计划，不写代码——它只负责把 WHAT/WHY 写清楚</text>
</svg>
