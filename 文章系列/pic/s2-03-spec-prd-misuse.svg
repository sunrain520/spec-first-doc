<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">spec-prd 的常见误用：把它当 implementation plan 用</title>
  <desc id="desc">spec-prd 只负责 WHAT/WHY，不负责 HOW——常见误用和正确用法对比</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-prd 的常见误用</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 只负责 WHAT/WHY，不负责 HOW</text>

  <!-- 误用 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="340" rx="18" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="315" y="152" text-anchor="middle" fill="#fca5a5" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 误用：把 spec-prd 当 implementation plan</text>
    <rect x="90" y="172" width="460" height="46" rx="10" fill="#111c2e" stroke="#f87171" stroke-width="1"/>
    <text x="315" y="201" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"使用 Express.js 实现 /health 接口"（库选型）</text>
    <rect x="90" y="228" width="460" height="46" rx="10" fill="#111c2e" stroke="#f87171" stroke-width="1"/>
    <text x="315" y="257" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"在 src/routes/health.ts 添加路由"（文件路径）</text>
    <rect x="90" y="284" width="460" height="46" rx="10" fill="#111c2e" stroke="#f87171" stroke-width="1"/>
    <text x="315" y="313" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"返回格式：{status, timestamp, checks}"（schema）</text>
    <rect x="90" y="340" width="460" height="46" rx="10" fill="#111c2e" stroke="#f87171" stroke-width="1"/>
    <text x="315" y="369" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"第一步：创建 health.ts，第二步：..."（任务拆分）</text>
    <text x="315" y="430" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">这些是 HOW，属于 plan 的职责</text>
  </g>

  <!-- 正确用法 -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="340" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="885" y="152" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✓ 正确：spec-prd 只写 WHAT/WHY</text>
    <rect x="660" y="172" width="460" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="885" y="201" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"新增健康检查端点，支持 K8s probe"（功能描述）</text>
    <rect x="660" y="228" width="460" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="885" y="257" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"检查 DB 连接和依赖服务可用性"（验收标准）</text>
    <rect x="660" y="284" width="460" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="885" y="313" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"不做 metrics 收集，不做 alerting"（non-goals）</text>
    <rect x="660" y="340" width="460" height="46" rx="10" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="885" y="369" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">"现有 /api/v1/ 路由不受影响"（scope boundary）</text>
    <text x="885" y="430" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">这些是 WHAT/WHY，plan 可以精确消费</text>
  </g>

  <text x="600" y="510" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 写完后，交给 spec-plan——plan 读取 PRD，决定 HOW</text>
</svg>
