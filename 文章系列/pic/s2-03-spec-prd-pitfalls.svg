<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">AI 改老系统时最容易翻车的三个地方</title>
  <desc id="desc">不知道当前状态、误判影响范围、发明不存在的约束——三个翻车点和 spec-prd 的解法</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">AI 改老系统时最容易翻车的三个地方</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 的 current-state evidence 专门解决这三个问题</text>

  <!-- 翻车点1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="340" height="320" rx="18" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
    <text x="230" y="152" text-anchor="middle" fill="#fca5a5" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">翻车点 1</text>
    <text x="230" y="180" text-anchor="middle" fill="#f8fafc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">不知道当前状态</text>
    <text x="90" y="216" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：这个功能现在有没有？</text>
    <text x="90" y="240" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：现在用的是什么框架？</text>
    <text x="90" y="264" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：现有接口是什么格式？</text>
    <rect x="90" y="300" width="280" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="230" y="322" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 解法：</text>
    <text x="230" y="342" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Current System Snapshot</text>
  </g>

  <!-- 翻车点2 -->
  <g filter="url(#shadow)">
    <rect x="430" y="110" width="340" height="320" rx="18" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="600" y="152" text-anchor="middle" fill="#fde68a" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">翻车点 2</text>
    <text x="600" y="180" text-anchor="middle" fill="#f8fafc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">误判影响范围</text>
    <text x="460" y="216" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：这个改动影响哪些模块？</text>
    <text x="460" y="240" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：哪些接口需要同步修改？</text>
    <text x="460" y="264" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：哪些测试需要更新？</text>
    <rect x="460" y="300" width="280" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="600" y="322" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 解法：</text>
    <text x="600" y="342" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Change Delta + Scope Boundaries</text>
  </g>

  <!-- 翻车点3 -->
  <g filter="url(#shadow)">
    <rect x="800" y="110" width="340" height="320" rx="18" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="970" y="152" text-anchor="middle" fill="#c4b5fd" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">翻车点 3</text>
    <text x="970" y="180" text-anchor="middle" fill="#f8fafc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">发明不存在的约束</text>
    <text x="830" y="216" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：这里应该有权限控制</text>
    <text x="830" y="240" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：这里应该有缓存</text>
    <text x="830" y="264" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">AI 猜：这里应该有日志</text>
    <rect x="830" y="300" width="280" height="50" rx="10" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="970" y="322" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">spec-prd 解法：</text>
    <text x="970" y="342" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Evidence And Assumptions</text>
  </g>

  <text x="600" y="500" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">三个翻车点的共同根因：AI 不知道当前系统是什么样的，只能猜</text>
</svg>
