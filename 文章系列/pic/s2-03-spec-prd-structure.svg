<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">prd-requirements 文档的核心结构</title>
  <desc id="desc">spec-prd 产出的 prd-requirements 文档包含 Summary、Change Delta、Requirements、Acceptance Examples、Scope Boundaries 等核心章节</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#132f4c"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">prd-requirements 文档的核心结构</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每个章节都有明确的职责，让 plan 精确消费</text>

  <!-- frontmatter -->
  <g filter="url(#shadow)">
    <rect x="60" y="100" width="1080" height="80" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="90" y="132" fill="#7dd3fc" font-size="15" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">frontmatter</text>
    <text x="90" y="158" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">artifact_kind: prd-requirements · spec_id: YYYY-MM-DD-NNN-slug · status: draft · evidence_grade: mixed</text>
    <text x="900" y="145" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">标记为 PRD 级需求</text>
  </g>

  <!-- 必须章节 -->
  <text x="90" y="218" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">必须章节（每份 PRD 都要有）</text>

  <g filter="url(#shadow)">
    <rect x="60" y="232" width="200" height="80" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="160" y="264" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Summary</text>
    <text x="160" y="288" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">一句话概述</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="280" y="232" width="200" height="80" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="380" y="264" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Change Delta</text>
    <text x="380" y="288" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">这次改什么</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="232" width="200" height="80" rx="12" fill="url(#card)" stroke="#34d399" stroke-width="1.5"/>
    <text x="600" y="264" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Requirements</text>
    <text x="600" y="288" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">R1/R2/... 需求列表</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="720" y="232" width="220" height="80" rx="12" fill="url(#card)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="830" y="264" text-anchor="middle" fill="#fde68a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Acceptance Examples</text>
    <text x="830" y="288" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">AE1/AE2/... 验收样例</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="232" width="180" height="80" rx="12" fill="url(#card)" stroke="#f87171" stroke-width="1.5"/>
    <text x="1050" y="264" text-anchor="middle" fill="#fca5a5" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Scope Boundaries</text>
    <text x="1050" y="288" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">不做什么</text>
  </g>

  <!-- 条件章节 -->
  <text x="90" y="358" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">条件章节（按需包含，减少 plan 的发明空间）</text>

  <g filter="url(#shadow)">
    <rect x="60" y="372" width="220" height="80" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="170" y="404" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Current System Snapshot</text>
    <text x="170" y="428" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">当前系统状态</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="300" y="372" width="200" height="80" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="400" y="404" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Problem Frame</text>
    <text x="400" y="428" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">问题背景</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="372" width="200" height="80" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="620" y="404" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Goals / Success Metrics</text>
    <text x="620" y="428" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">成功指标</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="372" width="200" height="80" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="840" y="404" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Evidence And Assumptions</text>
    <text x="840" y="428" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">证据和假设</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="960" y="372" width="180" height="80" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="1050" y="404" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Outstanding Questions</text>
    <text x="1050" y="428" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">待解决问题</text>
  </g>

  <!-- 关键规则 -->
  <g filter="url(#shadow)">
    <rect x="60" y="490" width="1080" height="100" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="526" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">关键规则：PRD 只写 WHAT/WHY，不写 HOW</text>
    <text x="600" y="556" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">不包含：库选型、schema、endpoint 定义、文件路径、数据库表结构、任务拆分</text>
    <text x="600" y="578" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">这些属于 plan 的职责，不属于 PRD</text>
  </g>
</svg>
