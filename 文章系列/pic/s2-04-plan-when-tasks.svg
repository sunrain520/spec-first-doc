<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">什么时候 plan 就够了，什么时候需要 write-tasks</title>
  <desc id="desc">小任务直接 plan → work，复杂任务需要 write-tasks 编译 task pack</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">什么时候需要 write-tasks</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">task pack 是可选的——只有复杂任务才需要</text>

  <!-- 表头 -->
  <rect x="60" y="100" width="1080" height="44" rx="8" fill="#082f49"/>
  <text x="200" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">信号</text>
  <text x="560" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">推荐</text>
  <text x="960" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">原因</text>
  <line x1="360" y1="100" x2="360" y2="460" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="760" y1="100" x2="760" y2="460" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 行1 -->
  <rect x="60" y="144" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="176" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">plan 只有 1-2 个 units</text>
  <text x="560" y="176" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">直接 spec-work</text>
  <text x="960" y="176" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 增加不必要的复杂度</text>

  <!-- 行2 -->
  <text x="200" y="228" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">plan 有 3+ 个 units</text>
  <text x="560" y="228" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">考虑 write-tasks</text>
  <text x="960" y="228" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 提供更清晰的执行边界</text>

  <!-- 行3 -->
  <rect x="60" y="248" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="280" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">跨模块，有依赖关系</text>
  <text x="560" y="280" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">需要 write-tasks</text>
  <text x="960" y="280" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 明确依赖顺序</text>

  <!-- 行4 -->
  <text x="200" y="332" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">有并行机会</text>
  <text x="560" y="332" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">需要 write-tasks</text>
  <text x="960" y="332" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 支持并行执行</text>

  <!-- 行5 -->
  <rect x="60" y="352" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="384" text-anchor="middle" fill="#f1f5f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">需要明确 stop_if 和 done_signal</text>
  <text x="560" y="384" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">需要 write-tasks</text>
  <text x="960" y="384" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 支持精确的完成信号</text>

  <line x1="60" y1="404" x2="1140" y2="404" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="444" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task pack 是可选的——不要为了"看起来更完整"而强制使用</text>
  <text x="600" y="468" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">plan 变了必须重新编译 task pack，否则 source_plan_hash 不匹配会被拒绝</text>
</svg>
