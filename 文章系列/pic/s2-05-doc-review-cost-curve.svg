<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">修复成本随发现时机指数级增长</title>
  <desc id="desc">需求阶段发现问题成本最低，代码写完后发现成本最高</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">修复成本随发现时机指数级增长</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">越早发现问题，修复成本越低——doc-review 在 plan 之后立即运行</text>

  <!-- 阶段标签 -->
  <text x="150" y="130" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">需求阶段</text>
  <text x="390" y="130" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">计划阶段</text>
  <text x="630" y="130" text-anchor="middle" fill="#fbbf24" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">执行阶段</text>
  <text x="870" y="130" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">代码 review</text>
  <text x="1080" y="130" text-anchor="middle" fill="#dc2626" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">上线后</text>

  <!-- 成本柱状图 -->
  <g filter="url(#shadow)">
    <rect x="100" y="380" width="100" height="80" rx="8" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="150" y="450" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">1x</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="340" y="320" width="100" height="140" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="390" y="450" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">3x</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="580" y="230" width="100" height="230" rx="8" fill="#1c1606" stroke="#fbbf24" stroke-width="2"/>
    <text x="630" y="450" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">10x</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="820" y="180" width="100" height="280" rx="8" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="870" y="450" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">30x</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1030" y="150" width="100" height="310" rx="8" fill="#1c0606" stroke="#dc2626" stroke-width="2"/>
    <text x="1080" y="450" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">100x+</text>
  </g>

  <!-- doc-review 标注 -->
  <rect x="280" y="155" width="220" height="40" rx="8" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
  <text x="390" y="181" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">← doc-review 在这里运行</text>

  <!-- 横轴 -->
  <line x1="80" y1="460" x2="1160" y2="460" stroke="#1e3a5f" stroke-width="2"/>
  <text x="600" y="500" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">发现问题的时机</text>
  <text x="600" y="524" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">doc-review 在 plan 之后立即运行，是发现问题成本最低的时机</text>
</svg>
