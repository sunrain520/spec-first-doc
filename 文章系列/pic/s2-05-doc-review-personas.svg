<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">doc-review 的六个 persona</title>
  <desc id="desc">coherence / feasibility / scope-guardian / adversarial / product-lens / security-lens 六个 reviewer persona 的职责</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="620" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">doc-review 的六个 persona</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每个 persona 从不同角度审查文档，发现不同类型的问题</text>

  <!-- coherence -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <rect x="60" y="110" width="6" height="130" rx="3" fill="#38bdf8"/>
    <text x="90" y="148" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">coherence</text>
    <text x="90" y="174" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">目标和范围是否自洽</text>
    <text x="90" y="220" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">需求和计划是否一致，有没有矛盾</text>
  </g>

  <!-- feasibility -->
  <g filter="url(#shadow)">
    <rect x="430" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#22d3ee" stroke-width="2"/>
    <rect x="430" y="110" width="6" height="130" rx="3" fill="#22d3ee"/>
    <text x="460" y="148" fill="#67e8f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">feasibility</text>
    <text x="460" y="174" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">执行单元是否可验证可交接</text>
    <text x="460" y="220" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">implementation units 是否可执行，验证方式是否清晰</text>
  </g>

  <!-- scope-guardian -->
  <g filter="url(#shadow)">
    <rect x="800" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <rect x="800" y="110" width="6" height="130" rx="3" fill="#fbbf24"/>
    <text x="830" y="148" fill="#fde68a" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">scope-guardian</text>
    <text x="830" y="174" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">scope 是否合理</text>
    <text x="830" y="220" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">有没有遗漏或过度，non-goals 是否明确</text>
  </g>

  <!-- adversarial -->
  <g filter="url(#shadow)">
    <rect x="60" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
    <rect x="60" y="270" width="6" height="130" rx="3" fill="#f87171"/>
    <text x="90" y="308" fill="#fca5a5" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">adversarial</text>
    <text x="90" y="334" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">有没有明显的风险或盲点</text>
    <text x="90" y="380" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">主动构造失败场景，挑战假设</text>
  </g>

  <!-- product-lens -->
  <g filter="url(#shadow)">
    <rect x="430" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <rect x="430" y="270" width="6" height="130" rx="3" fill="#a78bfa"/>
    <text x="460" y="308" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">product-lens</text>
    <text x="460" y="334" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">产品价值是否合理</text>
    <text x="460" y="380" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">WHAT/WHY 是否有说服力，有没有更好的方向</text>
  </g>

  <!-- security-lens -->
  <g filter="url(#shadow)">
    <rect x="800" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <rect x="800" y="270" width="6" height="130" rx="3" fill="#34d399"/>
    <text x="830" y="308" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">security-lens</text>
    <text x="830" y="334" fill="#f1f5f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">有没有安全风险</text>
    <text x="830" y="380" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">认证、授权、数据边界、敏感信息处理</text>
  </g>

  <!-- 说明 -->
  <g filter="url(#shadow)">
    <rect x="60" y="434" width="1080" height="80" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="468" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">六个 persona 并行审查，每个从不同角度发现问题</text>
    <text x="600" y="498" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">dispatch 不可用时，自动降级为 single-agent report-only review</text>
  </g>
</svg>
