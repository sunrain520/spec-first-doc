<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">doc-review 在工作流中的位置</title>
  <desc id="desc">doc-review 在 plan 之后、write-tasks 之前运行，是发现问题成本最低的时机</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="480" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="26" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">doc-review 在工作流中的位置</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 之后、write-tasks 之前——发现问题成本最低的时机</text>

  <!-- 节点 -->
  <g filter="url(#shadow)">
    <rect x="40" y="160" width="130" height="60" rx="12" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="105" y="196" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">requirements</text>
  </g>
  <path d="M172 190 H208" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="210" y="160" width="100" height="60" rx="12" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="260" y="196" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">plan</text>
  </g>
  <path d="M312 190 H348" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- doc-review 高亮 -->
  <g filter="url(#shadow)">
    <rect x="350" y="140" width="140" height="100" rx="12" fill="#04221a" stroke="#34d399" stroke-width="3"/>
    <text x="420" y="182" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace" font-weight="700">doc-review</text>
    <text x="420" y="204" text-anchor="middle" fill="#34d399" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">← 在这里</text>
    <text x="420" y="224" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">成本最低</text>
  </g>
  <path d="M492 190 H528" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="530" y="160" width="130" height="60" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4"/>
    <text x="595" y="188" text-anchor="middle" fill="#94a3b8" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">write-tasks</text>
    <text x="595" y="208" text-anchor="middle" fill="#475569" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">（可选）</text>
  </g>
  <path d="M662 190 H698" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="700" y="160" width="100" height="60" rx="12" fill="#082f49" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="750" y="196" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">work</text>
  </g>
  <path d="M802 190 H838" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="840" y="160" width="130" height="60" rx="12" fill="#082f49" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="905" y="188" text-anchor="middle" fill="#fde68a" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">code-review</text>
    <text x="905" y="208" text-anchor="middle" fill="#64748b" font-size="11" font-family="Arial, 'PingFang SC', sans-serif">HOW 审查</text>
  </g>
  <path d="M972 190 H1008" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="160" width="130" height="60" rx="12" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="1075" y="196" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">compound</text>
  </g>

  <!-- 说明 -->
  <text x="420" y="310" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">doc-review 在这里发现问题</text>
  <text x="420" y="334" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">只需要改文档，成本最低</text>
  <line x1="420" y1="280" x2="420" y2="244" stroke="#34d399" stroke-width="2" stroke-dasharray="4 3"/>

  <text x="750" y="310" text-anchor="middle" fill="#fbbf24" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">code-review 在这里发现问题</text>
  <text x="750" y="334" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">需要改代码，成本更高</text>
  <line x1="905" y1="280" x2="905" y2="224" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4 3"/>

  <text x="600" y="420" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">两种 review 都需要——doc-review 防止在错误方向上写代码，code-review 防止实现质量问题</text>
</svg>
