<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">doc-review 的适用范围</title>
  <desc id="desc">doc-review 可以审查 requirements、plan、task pack、设计文档等不同类型的文档</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">doc-review 的适用范围</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">不只是 plan——任何需要审查 WHAT/WHY 的文档都可以用</text>

  <!-- requirements -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="185" y="152" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">requirements</text>
    <text x="185" y="180" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">需求文档</text>
    <text x="90" y="214" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 目标是否清晰</text>
    <text x="90" y="234" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• non-goals 是否明确</text>
    <text x="90" y="254" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 验收条件是否可验证</text>
    <text x="185" y="290" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">*-requirements.md</text>
  </g>

  <!-- plan -->
  <g filter="url(#shadow)">
    <rect x="330" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="455" y="152" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">plan</text>
    <text x="455" y="180" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">实施计划</text>
    <text x="360" y="214" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 需求和计划是否一致</text>
    <text x="360" y="234" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• implementation units 是否可执行</text>
    <text x="360" y="254" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 风险是否充分考虑</text>
    <text x="455" y="290" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">*-plan.md</text>
  </g>

  <!-- task pack -->
  <g filter="url(#shadow)">
    <rect x="600" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="725" y="152" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">task pack</text>
    <text x="725" y="180" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">任务包</text>
    <text x="630" y="214" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• spec_id 是否正确</text>
    <text x="630" y="234" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 任务切片是否合理</text>
    <text x="630" y="254" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• done_signal 是否清晰</text>
    <text x="725" y="290" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">*-tasks.md</text>
  </g>

  <!-- 设计文档 -->
  <g filter="url(#shadow)">
    <rect x="870" y="110" width="270" height="200" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="1005" y="152" text-anchor="middle" fill="#fde68a" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">设计文档</text>
    <text x="1005" y="180" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">架构、API、数据模型</text>
    <text x="900" y="214" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 设计是否合理</text>
    <text x="900" y="234" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 有没有安全风险</text>
    <text x="900" y="254" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 是否符合项目约定</text>
    <text x="1005" y="290" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">docs/contracts/ 等</text>
  </g>

  <text x="600" y="380" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">doc-review 会自动检测文档类型，选择合适的 persona 组合</text>
  <text x="600" y="404" text-anchor="middle" fill="#475569" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">低风险文档用最小 persona 集，高风险文档用完整 persona 集</text>
</svg>
