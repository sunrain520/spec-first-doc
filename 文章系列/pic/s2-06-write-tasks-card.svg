<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">一个 task card 的完整结构</title>
  <desc id="desc">task card 包含 id、goal、files、context_refs、test_focus、done_signal、stop_if、review_gate 等字段</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="600" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">一个 task card 的完整结构</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每个字段都有明确的作用，让 spec-work 精确执行</text>

  <!-- 左列 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="400" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="315" y="148" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">task card 示例</text>
    <text x="90" y="178" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">id: T1</text>
    <text x="90" y="200" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">goal: "实现 GET /health 端点"</text>
    <text x="90" y="222" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">files:</text>
    <text x="110" y="244" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">- src/routes/health.ts</text>
    <text x="110" y="266" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">- src/app.ts</text>
    <text x="90" y="288" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">context_refs:</text>
    <text x="110" y="310" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">- path: src/app.ts</text>
    <text x="110" y="332" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">  section: "路由注册部分"</text>
    <text x="90" y="354" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">test_focus: tests/unit/health.test.js</text>
    <text x="90" y="376" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">done_signal: "curl /health 返回 200"</text>
    <text x="90" y="398" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">stop_if: "DB 连接失败且无法降级"</text>
    <text x="90" y="420" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">review_gate: required</text>
    <text x="90" y="442" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">wave: 1</text>
    <text x="90" y="464" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">depends_on: []</text>
  </g>

  <!-- 右列：字段说明 -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="400" rx="18" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="885" y="148" text-anchor="middle" fill="#94a3b8" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">字段说明</text>
    <text x="660" y="178" fill="#38bdf8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">id</text>
    <text x="760" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">task 的唯一标识</text>
    <text x="660" y="200" fill="#34d399" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">goal</text>
    <text x="760" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">这个 task 要达到什么目标</text>
    <text x="660" y="222" fill="#7dd3fc" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">files</text>
    <text x="760" y="222" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">涉及的文件（scope 边界）</text>
    <text x="660" y="244" fill="#a78bfa" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">context_refs</text>
    <text x="760" y="244" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">有界读取指针（不是 scope authority）</text>
    <text x="660" y="266" fill="#fbbf24" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">test_focus</text>
    <text x="760" y="266" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">完成后重点测试的文件</text>
    <text x="660" y="288" fill="#34d399" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">done_signal</text>
    <text x="760" y="288" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">什么时候算完成</text>
    <text x="660" y="310" fill="#f87171" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">stop_if</text>
    <text x="760" y="310" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">遇到什么情况应该停下来</text>
    <text x="660" y="332" fill="#22d3ee" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">review_gate</text>
    <text x="760" y="332" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">完成后是否需要 review</text>
    <text x="660" y="354" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">wave</text>
    <text x="760" y="354" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">执行波次（同 wave 可并行）</text>
    <text x="660" y="376" fill="#94a3b8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">depends_on</text>
    <text x="760" y="376" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">依赖的 task id 列表</text>
  </g>
</svg>
