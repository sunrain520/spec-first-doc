<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">task pack 过期时如何处理</title>
  <desc id="desc">plan 变了，task pack 的 source_plan_hash 不匹配，必须重新编译</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">task pack 过期时如何处理</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">plan 变了，task pack 必须重新编译——不能强制继续执行</text>

  <!-- 错误做法 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="480" height="280" rx="18" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="300" y="152" text-anchor="middle" fill="#fca5a5" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 错误做法</text>
    <text x="90" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 变了</text>
    <path d="M300 196 L300 224" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="90" y="246" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">忽略 hash 不匹配，强制继续执行旧 task pack</text>
    <path d="M300 256 L300 284" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="90" y="306" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">基于过期的 task pack 执行</text>
    <text x="90" y="330" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">→ 可能做了 plan 已经不需要的事情</text>
    <text x="90" y="354" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">→ 可能漏掉了 plan 新增的内容</text>
  </g>

  <!-- 正确做法 -->
  <g filter="url(#shadow)">
    <rect x="660" y="110" width="480" height="280" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="900" y="152" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✓ 正确做法</text>
    <text x="690" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">plan 变了</text>
    <path d="M900 196 L900 224" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="690" y="246" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">spec-work 检测到 hash 不匹配，拒绝执行</text>
    <path d="M900 256 L900 284" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="690" y="306" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">重新运行 write-tasks，编译新的 task pack</text>
    <text x="690" y="330" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">→ 新 task pack 基于最新的 plan</text>
    <text x="690" y="354" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">→ 执行结果和 plan 一致</text>
  </g>

  <text x="600" y="460" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">source_plan_hash 是防止静默错误的关键——它让"plan 变了但 task pack 没更新"变成显式错误</text>
</svg>
