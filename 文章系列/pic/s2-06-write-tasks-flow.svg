<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">write-tasks 的执行流程</title>
  <desc id="desc">write-tasks 的四个阶段：分类输入、验证 plan、编译 task cards、输出 task pack</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">write-tasks 的执行流程</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">从 plan 到可执行 task pack</text>

  <!-- 阶段1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 0</text>
    <text x="180" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">分类输入</text>
    <text x="90" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• compile / skip / return / draft</text>
    <text x="90" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 判断是否值得编译</text>
    <text x="90" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 检查已有 task pack</text>
    <rect x="90" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="170" y="384" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">输入分类</text>
  </g>
  <path d="M302 270 H338" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段2 -->
  <g filter="url(#shadow)">
    <rect x="340" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="460" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 1</text>
    <text x="460" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">验证 plan</text>
    <text x="370" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 读取 plan frontmatter</text>
    <text x="370" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确认 spec_id 存在</text>
    <text x="370" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确认 target_repo（多仓）</text>
    <text x="370" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 计算 source_plan_hash</text>
    <rect x="370" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="450" y="384" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">plan 验证通过</text>
  </g>
  <path d="M582 270 H618" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段3 -->
  <g filter="url(#shadow)">
    <rect x="620" y="110" width="240" height="320" rx="16" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="740" y="148" text-anchor="middle" fill="#67e8f9" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 2</text>
    <text x="740" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">编译 task cards</text>
    <text x="650" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 从 plan units 生成 task cards</text>
    <text x="650" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 设置 context_refs（有界指针）</text>
    <text x="650" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 设置 done_signal / stop_if</text>
    <text x="650" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确定 wave 和依赖顺序</text>
    <rect x="650" y="360" width="160" height="36" rx="8" fill="#0b2138" stroke="#22d3ee" stroke-width="1"/>
    <text x="730" y="384" text-anchor="middle" fill="#67e8f9" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">task cards 就绪</text>
  </g>
  <path d="M862 270 H898" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段4 -->
  <g filter="url(#shadow)">
    <rect x="900" y="110" width="240" height="320" rx="16" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="1020" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 3</text>
    <text x="1020" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">输出 task pack</text>
    <text x="930" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写入 docs/tasks/</text>
    <text x="930" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 带 spec_id + hash</text>
    <text x="930" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• mode: executable</text>
    <text x="930" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 交接给 spec-work</text>
    <rect x="930" y="360" width="180" height="36" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="1020" y="384" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">*-tasks.md</text>
  </g>

  <text x="600" y="500" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">write-tasks 只能重排执行切片，不能修改 scope、验收标准或 non-goals</text>
</svg>
