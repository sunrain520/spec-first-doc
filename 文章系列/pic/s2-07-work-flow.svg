<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">spec-work 的执行流程</title>
  <desc id="desc">spec-work 的四个阶段：triage 输入、验证边界、执行实现、输出 handoff</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-work 的执行流程</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">从输入到 handoff evidence 的完整链路</text>

  <!-- 阶段1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="240" height="300" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="180" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 0</text>
    <text x="180" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Triage 输入</text>
    <text x="90" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 识别输入类型</text>
    <text x="90" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• plan / task pack / bare</text>
    <text x="90" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 判断执行策略</text>
    <rect x="90" y="340" width="160" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="170" y="364" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">输入分类</text>
  </g>
  <path d="M302 260 H338" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段2 -->
  <g filter="url(#shadow)">
    <rect x="340" y="110" width="240" height="300" rx="16" fill="#082f49" stroke="#f87171" stroke-width="2"/>
    <text x="460" y="148" text-anchor="middle" fill="#fca5a5" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 1</text>
    <text x="460" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">验证边界</text>
    <text x="370" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• scope 验证</text>
    <text x="370" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• task identity 验证</text>
    <text x="370" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• target_repo 确认</text>
    <text x="370" y="272" fill="#f87171" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 失败则停止</text>
    <rect x="370" y="340" width="160" height="36" rx="8" fill="#0b2138" stroke="#f87171" stroke-width="1"/>
    <text x="450" y="364" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">边界确认</text>
  </g>
  <path d="M582 260 H618" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段3 -->
  <g filter="url(#shadow)">
    <rect x="620" y="110" width="240" height="300" rx="16" fill="#082f49" stroke="#34d399" stroke-width="2"/>
    <text x="740" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 2</text>
    <text x="740" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">执行实现</text>
    <text x="650" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• vertical tracer bullet</text>
    <text x="650" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 每个 unit 独立验证</text>
    <text x="650" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• review gate 检查</text>
    <text x="650" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• scope 扩张时停止</text>
    <rect x="650" y="340" width="160" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1"/>
    <text x="730" y="364" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">实现完成</text>
  </g>
  <path d="M862 260 H898" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段4 -->
  <g filter="url(#shadow)">
    <rect x="900" y="110" width="240" height="300" rx="16" fill="#04221a" stroke="#a78bfa" stroke-width="2"/>
    <text x="1020" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Phase 3</text>
    <text x="1020" y="172" text-anchor="middle" fill="#f8fafc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">输出 handoff</text>
    <text x="930" y="206" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• diff 摘要</text>
    <text x="930" y="228" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 验证结果</text>
    <text x="930" y="250" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 残余风险</text>
    <text x="930" y="272" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• CHANGELOG</text>
    <rect x="930" y="340" width="180" height="36" rx="8" fill="#04221a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1020" y="364" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">handoff envelope</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Phase 1 验证失败时，work 停止并输出 handoff envelope，不会静默继续执行</text>
</svg>
