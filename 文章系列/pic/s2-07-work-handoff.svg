<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">handoff evidence：任务结束时留下可被下游消费的证据</title>
  <desc id="desc">work 完成后的 handoff envelope 包含 diff 摘要、验证结果、残余风险、CHANGELOG 等</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">handoff evidence：任务结束时的证据包</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">work 完成后，留下可被 review 和 compound 消费的证据</text>

  <!-- 四个字段 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="185" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">diff 摘要</text>
    <text x="90" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 改了哪些文件</text>
    <text x="90" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 每个文件改了什么</text>
    <text x="90" y="222" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 为什么这样改</text>
    <text x="185" y="268" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">review 的输入</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="455" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">验证结果</text>
    <text x="360" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 跑了哪些测试</text>
    <text x="360" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 测试结果如何</text>
    <text x="360" y="222" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 验证命令和输出</text>
    <text x="455" y="268" text-anchor="middle" fill="#34d399" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">review 的证据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="725" y="148" text-anchor="middle" fill="#fde68a" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">残余风险</text>
    <text x="630" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 已知但未处理的问题</text>
    <text x="630" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 需要后续跟进的事项</text>
    <text x="630" y="222" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 不确定的地方</text>
    <text x="725" y="268" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">review 的关注点</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="110" width="270" height="180" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="1005" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">CHANGELOG</text>
    <text x="900" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 用户可见的变化</text>
    <text x="900" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 按仓库格式记录</text>
    <text x="900" y="222" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 标注 user-visible</text>
    <text x="1005" y="268" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">release 的输入</text>
  </g>

  <!-- 下游消费 -->
  <g filter="url(#shadow)">
    <rect x="60" y="330" width="1080" height="80" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="366" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">handoff evidence 的下游消费者</text>
    <text x="600" y="396" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">spec-code-review（审查 diff）· spec-compound（沉淀经验）· release（更新 CHANGELOG）</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">work 完成后不是终点——handoff evidence 让下游 workflow 能精确消费这次任务的结果</text>
</svg>
