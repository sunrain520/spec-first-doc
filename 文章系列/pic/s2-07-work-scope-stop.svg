<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">scope 扩张时如何停止</title>
  <desc id="desc">work 遇到 scope 扩张时的正确处理方式：停止，不要继续</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">scope 扩张时如何停止</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">遇到 scope 扩张，停止比继续更重要</text>

  <!-- 错误做法 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="480" height="300" rx="18" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="300" y="152" text-anchor="middle" fill="#fca5a5" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 错误：继续执行</text>
    <text x="90" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">发现需要改一个不在 plan 里的文件</text>
    <path d="M300 196 L300 224" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="90" y="246" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">继续改，"顺手"处理</text>
    <path d="M300 256 L300 284" stroke="#f87171" stroke-width="2" marker-end="url(#arrow-red)"/>
    <text x="90" y="306" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">diff 变大，review 很难判断</text>
    <text x="90" y="330" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">可能引入新的 bug</text>
    <text x="90" y="354" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">任务完成时间不可预测</text>
  </g>

  <!-- 正确做法 -->
  <g filter="url(#shadow)">
    <rect x="660" y="110" width="480" height="300" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="900" y="152" text-anchor="middle" fill="#6ee7b7" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✓ 正确：停止并报告</text>
    <text x="690" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">发现需要改一个不在 plan 里的文件</text>
    <path d="M900 196 L900 224" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="690" y="246" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">停止，输出 handoff envelope</text>
    <path d="M900 256 L900 284" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="690" y="306" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">告诉用户：发现了 scope 扩张</text>
    <text x="690" y="330" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">建议：回到 plan 更新 scope</text>
    <text x="690" y="354" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">或：接受风险，继续执行</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">scope 扩张不是 work 的问题——它是 plan 需要更新的信号</text>
</svg>
