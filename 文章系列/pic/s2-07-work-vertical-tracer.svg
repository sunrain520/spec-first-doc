<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">vertical tracer bullet：先关闭一个行为，再扩展</title>
  <desc id="desc">vertical tracer bullet 策略：每次完整关闭一个行为（实现+验证+文档），再开始下一个</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">vertical tracer bullet</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">先完整关闭一个行为，再开始下一个——不要同时开多个半成品</text>

  <!-- 错误做法 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="480" height="340" rx="18" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="300" y="152" text-anchor="middle" fill="#fca5a5" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 错误：水平切片</text>
    <text x="300" y="180" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">先写所有测试，再写所有实现</text>
    <rect x="90" y="200" width="400" height="36" rx="8" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="290" y="224" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">写 Unit1 测试 + Unit2 测试 + Unit3 测试</text>
    <path d="M300 236 L300 256" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="90" y="264" width="400" height="36" rx="8" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="290" y="288" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">写 Unit1 实现 + Unit2 实现 + Unit3 实现</text>
    <path d="M300 300 L300 320" stroke="#f87171" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="90" y="328" width="400" height="36" rx="8" fill="#111c2e" stroke="#334155" stroke-width="1.5"/>
    <text x="290" y="352" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">验证（但不知道哪里出了问题）</text>
    <text x="300" y="420" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">多个半成品同时存在，难以定位问题</text>
  </g>

  <!-- 正确做法 -->
  <g filter="url(#shadow)">
    <rect x="660" y="110" width="480" height="340" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="900" y="152" text-anchor="middle" fill="#6ee7b7" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✓ 正确：vertical tracer bullet</text>
    <text x="900" y="180" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">每次完整关闭一个行为</text>
    <rect x="690" y="200" width="420" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="900" y="224" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Unit1：实现 + 测试 + 验证 ✓</text>
    <path d="M900 236 L900 256" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="690" y="264" width="420" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="900" y="288" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Unit2：实现 + 测试 + 验证 ✓</text>
    <path d="M900 300 L900 320" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="690" y="328" width="420" height="36" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="900" y="352" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Unit3：实现 + 测试 + 验证 ✓</text>
    <text x="900" y="420" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">每个 unit 独立可验证，问题容易定位</text>
  </g>

  <text x="600" y="520" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">vertical tracer bullet 不是 TDD——它是"先完整关闭一个行为，再开始下一个"的执行策略</text>
</svg>
