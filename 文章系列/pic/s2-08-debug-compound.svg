<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">debug 结束后：把失败经验沉淀到 docs/solutions/</title>
  <desc id="desc">debug 完成后，把根因、解决方案、预防策略沉淀到 docs/solutions/，让下次不需要重新 debug</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">debug 结束后：沉淀失败经验</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">失败是最有价值的 evidence——让下次不需要重新 debug</text>

  <!-- 左：debug 完成 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="400" height="280" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="260" y="152" text-anchor="middle" fill="#7dd3fc" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">debug 完成</text>
    <text x="90" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 根因已确认（有证据支撑）</text>
    <text x="90" y="210" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 修复已验证（测试通过）</text>
    <text x="90" y="234" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 残余风险已说明</text>
    <text x="90" y="258" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 哪些假设被否定了</text>
    <text x="90" y="282" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 哪些方法没有用</text>
    <text x="260" y="360" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">spec-compound</text>
  </g>

  <!-- 箭头 -->
  <path d="M462 250 H536" stroke="#34d399" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="499" y="234" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">沉淀</text>

  <!-- 右：docs/solutions/ -->
  <g filter="url(#shadow)">
    <rect x="538" y="110" width="602" height="280" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="839" y="152" text-anchor="middle" fill="#6ee7b7" font-size="17" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">docs/solutions/workflow-issues/</text>
    <text x="568" y="186" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">症状：并发下偶发 500</text>
    <text x="568" y="210" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">根因：数据库连接池配置不足（max_connections=5）</text>
    <text x="568" y="234" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">解决方案：调整 max_connections=50</text>
    <text x="568" y="258" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">预防策略：压测时监控连接池状态</text>
    <text x="568" y="282" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">What Didn't Work：加锁、清空缓存</text>
    <text x="839" y="360" text-anchor="middle" fill="#34d399" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">applies_when: "并发下偶发 500"</text>
  </g>

  <text x="600" y="460" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">What Didn't Work section 记录了哪些方法没有用——下次遇到类似问题，可以直接跳过这些方法</text>
</svg>
