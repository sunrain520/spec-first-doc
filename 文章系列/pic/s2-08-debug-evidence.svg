<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">根因必须有证据支撑</title>
  <desc id="desc">根因声明必须有 source / test / log / runtime 支撑，不能只是猜测</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">根因必须有证据支撑</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">不能只是猜测——根因声明必须有可验证的证据</text>

  <!-- 四种证据类型 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="185" y="148" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">source</text>
    <text x="185" y="176" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">源码证据</text>
    <text x="90" y="210" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 找到有问题的代码行</text>
    <text x="90" y="230" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 解释为什么这行代码有问题</text>
    <text x="185" y="288" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">confirmed</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="455" y="148" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">test</text>
    <text x="455" y="176" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">测试证据</text>
    <text x="360" y="210" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 写一个能复现 bug 的测试</text>
    <text x="360" y="230" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 修复后测试通过</text>
    <text x="455" y="288" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">confirmed</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="110" width="250" height="200" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="725" y="148" text-anchor="middle" fill="#fde68a" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">log</text>
    <text x="725" y="176" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">日志证据</text>
    <text x="630" y="210" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 日志里有明确的错误信息</text>
    <text x="630" y="230" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 日志显示了问题发生的时机</text>
    <text x="725" y="288" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">session-local</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="110" width="270" height="200" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="1005" y="148" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">runtime</text>
    <text x="1005" y="176" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">运行时证据</text>
    <text x="900" y="210" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 在运行时观察到的行为</text>
    <text x="900" y="230" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 通过 probe 或 trace 确认</text>
    <text x="1005" y="288" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">session-local</text>
  </g>

  <!-- 不能用的 -->
  <g filter="url(#shadow)">
    <rect x="60" y="350" width="1080" height="80" rx="16" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="600" y="386" text-anchor="middle" fill="#fca5a5" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">✗ 不能用的"证据"</text>
    <text x="600" y="412" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">"我觉得可能是..."  "AI 说可能是..."  "看起来像是..."  "应该是..."</text>
  </g>

  <text x="600" y="490" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">根因声明必须能回答：你是怎么知道这是根因的？证据在哪里？</text>
</svg>
