<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">debug 的 feedback loop</title>
  <desc id="desc">建立 feedback loop 是 debug 的第一步：能观察到症状的最小环境</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">建立 feedback loop：debug 的第一步</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">没有 feedback loop，就没有办法验证修复是否有效</text>

  <!-- 四种 feedback loop -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="185" y="148" text-anchor="middle" fill="#6ee7b7" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">失败的测试</text>
    <text x="90" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 写一个能复现 bug 的测试</text>
    <text x="90" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 修复后测试通过</text>
    <text x="185" y="268" text-anchor="middle" fill="#34d399" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">最可靠的 feedback loop</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="330" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="455" y="148" text-anchor="middle" fill="#7dd3fc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">CLI 调用</text>
    <text x="360" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 一个能触发 bug 的命令</text>
    <text x="360" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 修复后命令正常执行</text>
    <text x="455" y="268" text-anchor="middle" fill="#38bdf8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">适合 CLI 工具的 bug</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="110" width="250" height="180" rx="14" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="725" y="148" text-anchor="middle" fill="#fde68a" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">HTTP 请求</text>
    <text x="630" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 一个能触发 bug 的请求</text>
    <text x="630" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 修复后请求正常响应</text>
    <text x="725" y="268" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">适合 API 的 bug</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="110" width="270" height="180" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="1005" y="148" text-anchor="middle" fill="#c4b5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">trace replay</text>
    <text x="900" y="178" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 重放触发 bug 的操作序列</text>
    <text x="900" y="200" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 修复后操作序列正常</text>
    <text x="1005" y="268" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">适合复杂交互的 bug</text>
  </g>

  <!-- 无法建立 feedback loop 时 -->
  <g filter="url(#shadow)">
    <rect x="60" y="330" width="1080" height="80" rx="16" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="600" y="366" text-anchor="middle" fill="#fca5a5" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">无法建立 feedback loop 时</text>
    <text x="600" y="396" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">记录 feedback_loop_not_possible 和原因，继续用 bounded evidence 调查——不要假装 loop 存在</text>
  </g>

  <text x="600" y="470" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">feedback loop 是验证修复有效的唯一可靠方式——没有 loop，就没有办法确认 bug 是否真的被修复</text>
</svg>
