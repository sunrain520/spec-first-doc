<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-labelledby="title desc">
  <title id="title">hypothesis ledger：把猜测变成可追踪的假设</title>
  <desc id="desc">hypothesis ledger 记录每个假设、验证方式、结果和结论，让 debug 过程可追踪</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="600" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">hypothesis ledger：把猜测变成可追踪的假设</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每个假设都有验证方式和结果，debug 过程可追踪可复盘</text>

  <!-- 表头 -->
  <rect x="60" y="100" width="1080" height="44" rx="8" fill="#082f49"/>
  <text x="160" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">假设</text>
  <text x="460" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">验证方式</text>
  <text x="760" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">结果</text>
  <text x="1020" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">结论</text>
  <line x1="260" y1="100" x2="260" y2="500" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="660" y1="100" x2="660" y2="500" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="860" y1="100" x2="860" y2="500" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 行1：被否定的假设 -->
  <rect x="60" y="144" width="1080" height="56" rx="0" fill="#1c0606" opacity="0.5"/>
  <text x="160" y="178" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">H1: 并发锁问题</text>
  <text x="460" y="178" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">加锁后复现</text>
  <text x="760" y="178" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">bug 仍然存在</text>
  <text x="1020" y="178" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 否定</text>

  <!-- 行2：被否定的假设 -->
  <text x="160" y="234" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">H2: 缓存失效</text>
  <text x="460" y="234" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">清空缓存后复现</text>
  <text x="760" y="234" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">bug 仍然存在</text>
  <text x="1020" y="234" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 否定</text>

  <!-- 行3：被确认的假设 -->
  <rect x="60" y="256" width="1080" height="56" rx="0" fill="#04221a" opacity="0.5"/>
  <text x="160" y="290" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">H3: 数据库连接池耗尽</text>
  <text x="460" y="290" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">监控连接池状态</text>
  <text x="760" y="290" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">连接池在高并发时耗尽</text>
  <text x="1020" y="290" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✓ 确认</text>

  <!-- 行4：根因 -->
  <rect x="60" y="312" width="1080" height="56" rx="0" fill="#082f49" opacity="0.8"/>
  <text x="160" y="346" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">根因：连接池大小配置不足</text>
  <text x="460" y="346" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">读取配置文件</text>
  <text x="760" y="346" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">max_connections=5，远低于并发量</text>
  <text x="1020" y="346" text-anchor="middle" fill="#7dd3fc" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">source 确认</text>

  <!-- 行5：修复 -->
  <rect x="60" y="368" width="1080" height="56" rx="0" fill="#04221a" opacity="0.5"/>
  <text x="160" y="402" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">修复：调整连接池配置</text>
  <text x="460" y="402" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">max_connections=50，压测</text>
  <text x="760" y="402" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">bug 消失，压测通过</text>
  <text x="1020" y="402" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✓ 验证</text>

  <line x1="60" y1="424" x2="1140" y2="424" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="464" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">hypothesis ledger 记录了完整的 debug 过程：哪些假设被否定，哪个假设被确认，根因是什么</text>
  <text x="600" y="488" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">这个记录可以被 compound 沉淀，让下次遇到类似问题时不需要重新走一遍</text>
</svg>
