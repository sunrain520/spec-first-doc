<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">spec-debug 的执行阶段</title>
  <desc id="desc">Triage → Investigate → Root Cause → Fix → Close 五个阶段</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-debug 的执行阶段</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">先调查，再修复——不是"试几个修复看看"</text>

  <!-- 阶段1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="180" height="300" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="148" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Triage</text>
    <text x="90" y="178" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 解析输入</text>
    <text x="90" y="198" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 收集上下文</text>
    <text x="90" y="218" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 判断复杂度</text>
    <rect x="90" y="340" width="120" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="150" y="364" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">症状理解</text>
  </g>
  <path d="M242 260 H268" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 阶段2 -->
  <g filter="url(#shadow)">
    <rect x="270" y="110" width="180" height="300" rx="14" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="360" y="148" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Investigate</text>
    <text x="300" y="178" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 建立 feedback loop</text>
    <text x="300" y="198" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 复现问题</text>
    <text x="300" y="218" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 跟踪代码路径</text>
    <rect x="300" y="340" width="120" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="360" y="364" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">复现成功</text>
  </g>
  <path d="M452 260 H478" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 阶段3 -->
  <g filter="url(#shadow)">
    <rect x="480" y="110" width="180" height="300" rx="14" fill="#082f49" stroke="#fbbf24" stroke-width="2"/>
    <text x="570" y="148" text-anchor="middle" fill="#fde68a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Root Cause</text>
    <text x="510" y="178" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 提出假设</text>
    <text x="510" y="198" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 一次验证一个</text>
    <text x="510" y="218" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 建立因果链</text>
    <rect x="510" y="340" width="120" height="36" rx="8" fill="#0b2138" stroke="#fbbf24" stroke-width="1"/>
    <text x="570" y="364" text-anchor="middle" fill="#fde68a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">根因确认</text>
  </g>
  <path d="M662 260 H688" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 阶段4 -->
  <g filter="url(#shadow)">
    <rect x="690" y="110" width="180" height="300" rx="14" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="780" y="148" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Fix</text>
    <text x="720" y="178" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 一次只改一件事</text>
    <text x="720" y="198" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 验证修复有效</text>
    <text x="720" y="218" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 确认不引入新问题</text>
    <rect x="720" y="340" width="120" height="36" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="780" y="364" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">修复验证</text>
  </g>
  <path d="M872 260 H898" stroke="#38bdf8" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- 阶段5 -->
  <g filter="url(#shadow)">
    <rect x="900" y="110" width="240" height="300" rx="14" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="1020" y="148" text-anchor="middle" fill="#67e8f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Close</text>
    <text x="930" y="178" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 结构化总结</text>
    <text x="930" y="198" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 残余风险说明</text>
    <text x="930" y="218" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 沉淀到 docs/solutions/</text>
    <rect x="930" y="340" width="180" height="36" rx="8" fill="#0b2138" stroke="#22d3ee" stroke-width="1"/>
    <text x="1020" y="364" text-anchor="middle" fill="#67e8f9" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">handoff + compound</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Fix 阶段是可选的——如果只需要诊断，可以在 Root Cause 阶段停止</text>
</svg>
