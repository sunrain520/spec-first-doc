<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">reviewer dispatch：多角色并行 review</title>
  <desc id="desc">spec-code-review 派发多个 reviewer persona 并行审查，dispatch 不可用时降级为 single-agent</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">reviewer dispatch：多角色并行 review</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每个 reviewer 从不同角度审查，dispatch 不可用时自动降级</text>

  <!-- 中心：spec-code-review -->
  <g filter="url(#shadow)">
    <rect x="460" y="200" width="280" height="80" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="246" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">spec-code-review</text>
  </g>

  <!-- 派发箭头 -->
  <path d="M540 200 L300 140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M600 200 L600 140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M660 200 L900 140" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M540 280 L300 360" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M660 280 L900 360" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- reviewer personas -->
  <g filter="url(#shadow)">
    <rect x="160" y="80" width="200" height="60" rx="10" fill="url(#card)" stroke="#34d399" stroke-width="1.5"/>
    <text x="260" y="116" text-anchor="middle" fill="#6ee7b7" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">correctness reviewer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="80" width="200" height="60" rx="10" fill="url(#card)" stroke="#f87171" stroke-width="1.5"/>
    <text x="600" y="116" text-anchor="middle" fill="#fca5a5" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">security reviewer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="840" y="80" width="200" height="60" rx="10" fill="url(#card)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="940" y="116" text-anchor="middle" fill="#fde68a" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">performance reviewer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="160" y="360" width="200" height="60" rx="10" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="260" y="396" text-anchor="middle" fill="#c4b5fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">maintainability reviewer</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="840" y="360" width="200" height="60" rx="10" fill="url(#card)" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="940" y="396" text-anchor="middle" fill="#67e8f9" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">test coverage reviewer</text>
  </g>

  <!-- 降级说明 -->
  <g filter="url(#shadow)">
    <rect x="60" y="460" width="1080" height="70" rx="14" fill="#1c0606" stroke="#f87171" stroke-width="1.5"/>
    <text x="600" y="492" text-anchor="middle" fill="#fca5a5" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">dispatch 不可用时：自动降级为 single-agent report-only review</text>
    <text x="600" y="516" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">仍然输出 findings，只是不能并行运行多个 reviewer——不会因为 dispatch 不可用而完全失效</text>
  </g>
</svg>
