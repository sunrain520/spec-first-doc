<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">actionable finding 的最小结构</title>
  <desc id="desc">一个 actionable finding 必须包含 evidence、severity、owner、verification 四个字段</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">actionable finding 的最小结构</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">四个字段缺一不可——缺少任何一个，finding 就无法被执行</text>

  <!-- evidence -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="160" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="90" y="148" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">evidence（证据）</text>
    <text x="90" y="178" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">问题在哪里，为什么是问题</text>
    <text x="90" y="210" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">src/routes/health.ts:42 — 未处理 DB 连接失败的情况</text>
    <text x="90" y="248" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 没有 evidence："这里可能有问题"</text>
  </g>

  <!-- severity -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="160" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="660" y="148" fill="#fde68a" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">severity（严重程度）</text>
    <text x="660" y="178" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">P0（阻断）/ P1（重要）/ P2（建议）/ P3（FYI）</text>
    <text x="660" y="210" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">severity: P1 — 高并发下会导致 500 错误</text>
    <text x="660" y="248" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 没有 severity：不知道该优先处理哪个</text>
  </g>

  <!-- owner -->
  <g filter="url(#shadow)">
    <rect x="60" y="300" width="510" height="160" rx="16" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="90" y="338" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">owner（负责人）</text>
    <text x="90" y="368" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">谁来修这个问题</text>
    <text x="90" y="400" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">owner: work — 需要在下一个 work 阶段修复</text>
    <text x="90" y="438" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 没有 owner：finding 会被遗忘</text>
  </g>

  <!-- verification -->
  <g filter="url(#shadow)">
    <rect x="630" y="300" width="510" height="160" rx="16" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="660" y="338" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">verification（验证方式）</text>
    <text x="660" y="368" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">修复后怎么验证</text>
    <text x="660" y="400" fill="#64748b" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">verification: DB 不可用时 /health 返回 503</text>
    <text x="660" y="438" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">✗ 没有 verification：不知道修复是否有效</text>
  </g>

  <text x="600" y="530" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">review finding 必须能回答：证据在哪里？严重程度是什么？谁来修？怎么验证？</text>
</svg>
