<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">review-pre-facts：review 的证据准备层</title>
  <desc id="desc">review-pre-facts 在 review 开始前准备证据：diff、graph evidence、test results、redaction</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">review-pre-facts：review 的证据准备层</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">在 reviewer 开始工作之前，先准备好所有需要的证据</text>

  <!-- 输入 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="300" height="340" rx="18" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="210" y="152" text-anchor="middle" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">输入</text>
    <text x="90" y="186" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 当前 diff</text>
    <text x="90" y="208" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• plan / task pack</text>
    <text x="90" y="230" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 测试结果</text>
    <text x="90" y="252" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• graph evidence</text>
    <text x="90" y="274" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• project standards</text>
  </g>

  <!-- 箭头 -->
  <path d="M362 280 H418" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- review-pre-facts 处理 -->
  <g filter="url(#shadow)">
    <rect x="420" y="110" width="360" height="340" rx="18" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="600" y="152" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">review-pre-facts</text>
    <text x="450" y="186" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 规范化 diff</text>
    <text x="450" y="208" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 标注 evidence grade</text>
    <text x="450" y="230" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• redaction（脱敏）</text>
    <text x="450" y="252" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 生成 compact facts</text>
    <text x="450" y="274" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 标注 limitations</text>
    <text x="600" y="380" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">REDACTION_STATUSES:</text>
    <text x="600" y="400" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">none-required / redacted / degraded</text>
  </g>

  <!-- 箭头 -->
  <path d="M782 280 H838" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- reviewer 消费 -->
  <g filter="url(#shadow)">
    <rect x="840" y="110" width="300" height="340" rx="18" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="990" y="152" text-anchor="middle" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">reviewer 消费</text>
    <text x="870" y="186" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 基于 compact facts 审查</text>
    <text x="870" y="208" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 不直接读 raw diff</text>
    <text x="870" y="230" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 不直接读 raw MCP dump</text>
    <text x="870" y="252" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 输出 structured findings</text>
    <text x="870" y="274" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 标注 confidence</text>
  </g>

  <text x="600" y="520" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">review-pre-facts 是 Context Harness 在 review 阶段的体现：给 reviewer 正确上下文，而不是无限上下文</text>
</svg>
