<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">severity 分级：P0-P3 的含义和处理方式</title>
  <desc id="desc">P0 阻断、P1 重要、P2 建议、P3 FYI 四个 severity 级别的含义和处理方式</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="540" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">severity 分级：P0-P3</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">severity 决定了 finding 的优先级和处理方式</text>

  <!-- P0 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="250" height="300" rx="16" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="185" y="148" text-anchor="middle" fill="#fca5a5" font-size="20" font-family="Arial, sans-serif" font-weight="700">P0</text>
    <text x="185" y="176" text-anchor="middle" fill="#f8fafc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">阻断</text>
    <text x="90" y="210" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 必须修复才能合并</text>
    <text x="90" y="232" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 安全漏洞、数据丢失</text>
    <text x="90" y="254" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 核心功能崩溃</text>
    <text x="185" y="380" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">block merge</text>
  </g>

  <!-- P1 -->
  <g filter="url(#shadow)">
    <rect x="330" y="110" width="250" height="300" rx="16" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="455" y="148" text-anchor="middle" fill="#fde68a" font-size="20" font-family="Arial, sans-serif" font-weight="700">P1</text>
    <text x="455" y="176" text-anchor="middle" fill="#f8fafc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">重要</text>
    <text x="360" y="210" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 强烈建议修复</text>
    <text x="360" y="232" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 性能问题、边界条件</text>
    <text x="360" y="254" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 测试覆盖不足</text>
    <text x="455" y="380" text-anchor="middle" fill="#fbbf24" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">建议修复</text>
  </g>

  <!-- P2 -->
  <g filter="url(#shadow)">
    <rect x="600" y="110" width="250" height="300" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="725" y="148" text-anchor="middle" fill="#7dd3fc" font-size="20" font-family="Arial, sans-serif" font-weight="700">P2</text>
    <text x="725" y="176" text-anchor="middle" fill="#f8fafc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">建议</text>
    <text x="630" y="210" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 可以修复，也可以接受</text>
    <text x="630" y="232" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 代码风格、可读性</text>
    <text x="630" y="254" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 小的优化机会</text>
    <text x="725" y="380" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">可选修复</text>
  </g>

  <!-- P3 -->
  <g filter="url(#shadow)">
    <rect x="870" y="110" width="270" height="300" rx="16" fill="url(#card)" stroke="#475569" stroke-width="2"/>
    <text x="1005" y="148" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="Arial, sans-serif" font-weight="700">P3</text>
    <text x="1005" y="176" text-anchor="middle" fill="#f8fafc" font-size="15" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">FYI</text>
    <text x="900" y="210" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 仅供参考</text>
    <text x="900" y="232" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 背景信息、建议</text>
    <text x="900" y="254" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">• 不需要任何操作</text>
    <text x="1005" y="380" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">无需操作</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">P0 必须修复才能合并；P1 强烈建议修复；P2 可选；P3 仅供参考</text>
</svg>
