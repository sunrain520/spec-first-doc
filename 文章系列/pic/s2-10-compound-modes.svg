<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">compound 的完整工作流：Full mode vs Lightweight mode</title>
  <desc id="desc">Full mode 并行运行三个 subagent，Lightweight mode 单次通过，两种模式的适用场景</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">compound 的两种模式</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">Full mode 更全面，Lightweight mode 更快——按场景选择</text>

  <!-- Full mode -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="360" rx="20" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="315" y="152" text-anchor="middle" fill="#7dd3fc" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Full mode（推荐）</text>
    <text x="315" y="180" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">并行运行三个 subagent</text>
    <rect x="90" y="200" width="420" height="40" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="300" y="226" text-anchor="middle" fill="#bae6fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Context Analyzer（分析上下文）</text>
    <rect x="90" y="250" width="420" height="40" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="300" y="276" text-anchor="middle" fill="#bae6fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Solution Extractor（提取解决方案）</text>
    <rect x="90" y="300" width="420" height="40" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="300" y="326" text-anchor="middle" fill="#bae6fd" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">Related Docs Finder（检查重叠）</text>
    <text x="315" y="390" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适合：重要问题，有时间做完整记录</text>
    <text x="315" y="414" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">优势：检查重叠，防止重复文档</text>
    <text x="315" y="450" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">/spec:compound</text>
  </g>

  <!-- Lightweight mode -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="360" rx="20" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="885" y="152" text-anchor="middle" fill="#6ee7b7" font-size="18" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Lightweight mode</text>
    <text x="885" y="180" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">单次通过，不派发 subagent</text>
    <rect x="660" y="200" width="432" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="876" y="226" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">直接提取问题和解决方案</text>
    <rect x="660" y="250" width="432" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="876" y="276" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">写入 docs/solutions/</text>
    <rect x="660" y="300" width="432" height="40" rx="8" fill="#0b2138" stroke="#34d399" stroke-width="1.5"/>
    <text x="876" y="326" text-anchor="middle" fill="#bbf7d0" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">不检查重叠（可能创建重复文档）</text>
    <text x="885" y="390" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适合：简单问题，会话接近上下文限制</text>
    <text x="885" y="414" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">优势：更快，token 消耗更少</text>
    <text x="885" y="450" text-anchor="middle" fill="#34d399" font-size="13" font-family="'SF Mono', Menlo, Consolas, monospace">/spec:compound（选择 Lightweight）</text>
  </g>
</svg>
