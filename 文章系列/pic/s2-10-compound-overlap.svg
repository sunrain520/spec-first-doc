<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">五维度重叠评估：防止重复文档</title>
  <desc id="desc">compound 在写新 learning 前，从五个维度评估与已有文档的重叠程度</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">五维度重叠评估</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">写新 learning 前，先检查是否和已有文档重叠</text>

  <!-- 五个维度 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="200" height="100" rx="12" fill="url(#card)" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="160" y="148" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">问题陈述</text>
    <text x="160" y="174" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">描述的是同一个问题吗？</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="280" y="110" width="200" height="100" rx="12" fill="url(#card)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="380" y="148" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">根因</text>
    <text x="380" y="174" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">根因是否相同？</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="500" y="110" width="200" height="100" rx="12" fill="url(#card)" stroke="#34d399" stroke-width="1.5"/>
    <text x="600" y="148" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">解决方案</text>
    <text x="600" y="174" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">解决方案是否相同？</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="720" y="110" width="200" height="100" rx="12" fill="url(#card)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="820" y="148" text-anchor="middle" fill="#fde68a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">涉及文件</text>
    <text x="820" y="174" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">涉及的文件是否相同？</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="940" y="110" width="200" height="100" rx="12" fill="url(#card)" stroke="#f87171" stroke-width="1.5"/>
    <text x="1040" y="148" text-anchor="middle" fill="#fca5a5" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">预防规则</text>
    <text x="1040" y="174" text-anchor="middle" fill="#64748b" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">预防策略是否相同？</text>
  </g>

  <!-- 重叠程度 -->
  <g filter="url(#shadow)">
    <rect x="60" y="250" width="340" height="120" rx="14" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="230" y="288" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Low（0-1 维度匹配）</text>
    <text x="230" y="316" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">不同问题，正常新建文档</text>
    <text x="230" y="352" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">→ 创建新文档</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="250" width="340" height="120" rx="14" fill="#082f49" stroke="#fbbf24" stroke-width="2"/>
    <text x="600" y="288" text-anchor="middle" fill="#fde68a" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Moderate（2-3 维度匹配）</text>
    <text x="600" y="316" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">同一领域，不同角度</text>
    <text x="600" y="352" text-anchor="middle" fill="#fbbf24" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">→ 新建，标记待合并</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="800" y="250" width="340" height="120" rx="14" fill="#1c0606" stroke="#f87171" stroke-width="2"/>
    <text x="970" y="288" text-anchor="middle" fill="#fca5a5" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">High（4-5 维度匹配）</text>
    <text x="970" y="316" text-anchor="middle" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">本质上是同一个问题</text>
    <text x="970" y="352" text-anchor="middle" fill="#f87171" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">→ 更新旧文档，不新建</text>
  </g>

  <text x="600" y="440" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">High 重叠时更新旧文档而不是新建——两份说同一件事的文档会慢慢说出不同的内容</text>
</svg>
