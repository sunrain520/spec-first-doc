<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">compound-refresh 的六种处理动作</title>
  <desc id="desc">Keep / Update / Consolidate / Replace / Delete / Stale-mark 六种处理动作</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">compound-refresh 的六种处理动作</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每份 learning 都有明确的处理路径</text>

  <!-- Keep -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="90" y="148" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Keep</text>
    <text x="90" y="174" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">内容仍然准确，无需修改</text>
    <text x="90" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">不做任何改动</text>
  </g>

  <!-- Update -->
  <g filter="url(#shadow)">
    <rect x="430" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-width="2"/>
    <text x="460" y="148" fill="#7dd3fc" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Update</text>
    <text x="460" y="174" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">路径/代码片段有漂移，核心判断仍正确</text>
    <text x="460" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">更新具体内容，保留文档</text>
  </g>

  <!-- Consolidate -->
  <g filter="url(#shadow)">
    <rect x="800" y="110" width="340" height="130" rx="14" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <text x="830" y="148" fill="#c4b5fd" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Consolidate</text>
    <text x="830" y="174" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">两份文档高度重叠，都是正确的</text>
    <text x="830" y="220" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">合并到一份，删除被合并的</text>
  </g>

  <!-- Replace -->
  <g filter="url(#shadow)">
    <rect x="60" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#fbbf24" stroke-width="2"/>
    <text x="90" y="308" fill="#fde68a" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Replace</text>
    <text x="90" y="334" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">旧文档已误导性，有明确替代方案</text>
    <text x="90" y="380" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">创建新文档，删除旧文档</text>
  </g>

  <!-- Delete -->
  <g filter="url(#shadow)">
    <rect x="430" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
    <text x="460" y="308" fill="#fca5a5" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Delete</text>
    <text x="460" y="334" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">相关代码已不存在，无后继者</text>
    <text x="460" y="380" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">直接删除（Git 历史保留）</text>
  </g>

  <!-- Stale-mark -->
  <g filter="url(#shadow)">
    <rect x="800" y="270" width="340" height="130" rx="14" fill="url(#card)" stroke="#64748b" stroke-width="2"/>
    <text x="830" y="308" fill="#94a3b8" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Stale-mark</text>
    <text x="830" y="334" fill="#94a3b8" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">分类模糊，证据不足</text>
    <text x="830" y="380" fill="#64748b" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">标记为 stale，等待后续处理</text>
  </g>

  <text x="600" y="470" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">删除而不是归档——过期文档比没有文档更危险，Git 历史是真正的归档</text>
</svg>
