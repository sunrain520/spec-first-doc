<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">compound 的自动触发：什么时候该运行</title>
  <desc id="desc">compound 在任务结束时自动触发，上下文最新鲜时沉淀经验</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102a43"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">compound 的触发时机</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">上下文最新鲜时沉淀经验，质量最高</text>

  <!-- 触发词 -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="200" rx="18" fill="url(#card)" stroke="#34d399" stroke-width="2"/>
    <text x="315" y="148" text-anchor="middle" fill="#6ee7b7" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">自动触发词</text>
    <text x="90" y="182" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• "that worked"</text>
    <text x="90" y="206" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• "it's fixed"</text>
    <text x="90" y="230" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• "working now"</text>
    <text x="90" y="254" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• "problem solved"</text>
    <text x="315" y="290" text-anchor="middle" fill="#34d399" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">检测到这些词时，自动提示是否运行 compound</text>
  </g>

  <!-- 不适合触发 -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="200" rx="18" fill="url(#card)" stroke="#f87171" stroke-width="2"/>
    <text x="885" y="148" text-anchor="middle" fill="#fca5a5" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">不适合触发的情况</text>
    <text x="660" y="182" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 问题还没有解决</text>
    <text x="660" y="206" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 只是一个简单的 typo 修复</text>
    <text x="660" y="230" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 没有可复用的经验</text>
    <text x="660" y="254" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 正在进行的调试过程中</text>
    <text x="885" y="290" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">compound 不是每次任务结束都必须运行</text>
  </g>

  <!-- 最佳时机 -->
  <g filter="url(#shadow)">
    <rect x="60" y="350" width="1080" height="80" rx="16" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="600" y="386" text-anchor="middle" fill="#e0f2fe" font-size="16" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">最佳时机：问题刚解决，上下文最新鲜</text>
    <text x="600" y="412" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">等到一周后再整理，很多细节已经模糊——趁热打铁，质量最高</text>
  </g>

  <text x="600" y="480" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">compound 是 Knowledge Harness 的核心工具——每次任务结束时的自然动作</text>
</svg>
