<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">hard gate vs LLM-as-judge：两种评分方式</title>
  <desc id="desc">hard gate 适合客观指标，LLM-as-judge 适合需要语义判断的质量</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">hard gate vs LLM-as-judge</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">两种评分方式，适用不同场景</text>

  <!-- hard gate -->
  <g filter="url(#shadow)">
    <rect x="60" y="110" width="510" height="360" rx="20" fill="#082f49" stroke="#34d399" stroke-width="2"/>
    <text x="315" y="152" text-anchor="middle" fill="#6ee7b7" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">hard gate</text>
    <text x="315" y="180" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">客观指标，通过/失败</text>
    <text x="90" y="214" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 构建时间 < 30s</text>
    <text x="90" y="238" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 测试通过率 > 95%</text>
    <text x="90" y="262" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 搜索相关性 > 0.8</text>
    <text x="90" y="286" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 内存使用 < 100MB</text>
    <text x="315" y="340" text-anchor="middle" fill="#34d399" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">优势：快速、便宜、可重复</text>
    <text x="315" y="368" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适合：有明确数值目标的优化</text>
    <text x="315" y="450" text-anchor="middle" fill="#34d399" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">metric.primary.type: hard</text>
  </g>

  <!-- LLM-as-judge -->
  <g filter="url(#shadow)">
    <rect x="630" y="110" width="510" height="360" rx="20" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="885" y="152" text-anchor="middle" fill="#c4b5fd" font-size="20" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">LLM-as-judge</text>
    <text x="885" y="180" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">语义质量，需要判断</text>
    <text x="660" y="214" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• prompt 输出质量</text>
    <text x="660" y="238" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 代码可读性</text>
    <text x="660" y="262" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 文档清晰度</text>
    <text x="660" y="286" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">• 用户体验质量</text>
    <text x="885" y="340" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="600">优势：能评估主观质量</text>
    <text x="885" y="368" text-anchor="middle" fill="#64748b" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">适合：需要语义判断的优化</text>
    <text x="885" y="450" text-anchor="middle" fill="#a78bfa" font-size="12" font-family="'SF Mono', Menlo, Consolas, monospace">metric.primary.type: judge</text>
  </g>

  <text x="600" y="530" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">优先用 hard gate——更快、更便宜、更可重复；只有 hard gate 无法评估时才用 LLM-as-judge</text>
</svg>
