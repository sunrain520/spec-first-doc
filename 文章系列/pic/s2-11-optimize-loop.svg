<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">optimize 的实验循环</title>
  <desc id="desc">baseline → 实验 → 打分 → 保留 → 收敛的循环过程</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M1,1 L11,6 L1,11 Z" fill="#38bdf8"/></marker>
  </defs>
  <rect width="1200" height="560" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">optimize 的实验循环</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">每次实验结果立即写盘——crash-safety 的核心规则</text>

  <!-- 阶段1：baseline -->
  <g filter="url(#shadow)">
    <rect x="60" y="130" width="180" height="260" rx="14" fill="#082f49" stroke="#38bdf8" stroke-width="2"/>
    <text x="150" y="168" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">Baseline</text>
    <text x="90" y="200" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 运行 measurement</text>
    <text x="90" y="220" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 记录初始指标</text>
    <text x="90" y="240" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 验证 harness 可靠</text>
    <rect x="90" y="320" width="120" height="36" rx="8" fill="#0b2138" stroke="#38bdf8" stroke-width="1"/>
    <text x="150" y="344" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">baseline 确认</text>
  </g>
  <path d="M242 260 H278" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段2：实验 -->
  <g filter="url(#shadow)">
    <rect x="280" y="130" width="180" height="260" rx="14" fill="#082f49" stroke="#a78bfa" stroke-width="2"/>
    <text x="370" y="168" text-anchor="middle" fill="#c4b5fd" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">实验</text>
    <text x="310" y="200" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 生成假设</text>
    <text x="310" y="220" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 修改代码</text>
    <text x="310" y="240" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 运行 measurement</text>
    <rect x="310" y="320" width="120" height="36" rx="8" fill="#0b2138" stroke="#a78bfa" stroke-width="1"/>
    <text x="370" y="344" text-anchor="middle" fill="#c4b5fd" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">结果立即写盘</text>
  </g>
  <path d="M462 260 H498" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段3：打分 -->
  <g filter="url(#shadow)">
    <rect x="500" y="130" width="180" height="260" rx="14" fill="#082f49" stroke="#fbbf24" stroke-width="2"/>
    <text x="590" y="168" text-anchor="middle" fill="#fde68a" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">打分</text>
    <text x="530" y="200" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• hard gate 检查</text>
    <text x="530" y="220" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• LLM-as-judge 评分</text>
    <text x="530" y="240" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 与 baseline 对比</text>
    <rect x="530" y="320" width="120" height="36" rx="8" fill="#0b2138" stroke="#fbbf24" stroke-width="1"/>
    <text x="590" y="344" text-anchor="middle" fill="#fde68a" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">胜出/失败判断</text>
  </g>
  <path d="M682 260 H718" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段4：保留 -->
  <g filter="url(#shadow)">
    <rect x="720" y="130" width="180" height="260" rx="14" fill="#04221a" stroke="#34d399" stroke-width="2"/>
    <text x="810" y="168" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">保留</text>
    <text x="750" y="200" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 胜出方案集成</text>
    <text x="750" y="220" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 失败方案回滚</text>
    <text x="750" y="240" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 更新 strategy digest</text>
    <rect x="750" y="320" width="120" height="36" rx="8" fill="#04221a" stroke="#34d399" stroke-width="1.5"/>
    <text x="810" y="344" text-anchor="middle" fill="#6ee7b7" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">指标提升</text>
  </g>
  <path d="M902 260 H938" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- 阶段5：收敛 -->
  <g filter="url(#shadow)">
    <rect x="940" y="130" width="200" height="260" rx="14" fill="#082f49" stroke="#22d3ee" stroke-width="2"/>
    <text x="1040" y="168" text-anchor="middle" fill="#67e8f9" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">收敛</text>
    <text x="970" y="200" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 达到 max_iterations</text>
    <text x="970" y="220" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• 达到 max_hours</text>
    <text x="970" y="240" fill="#94a3b8" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">• plateau 停止条件</text>
    <rect x="970" y="320" width="140" height="36" rx="8" fill="#0b2138" stroke="#22d3ee" stroke-width="1"/>
    <text x="1040" y="344" text-anchor="middle" fill="#67e8f9" font-size="12" font-family="Arial, 'PingFang SC', sans-serif">最终报告</text>
  </g>

  <text x="600" y="460" text-anchor="middle" fill="#f87171" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">关键规则：每次实验结果必须立即写盘，不能等到批次结束</text>
  <text x="600" y="484" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">如果中途崩溃，已完成的实验结果不会丢失，可以从断点继续</text>
</svg>
