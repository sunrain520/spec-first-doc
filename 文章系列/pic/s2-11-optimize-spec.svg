<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="580" viewBox="0 0 1200 580" role="img" aria-labelledby="title desc">
  <title id="title">optimization spec 的关键字段</title>
  <desc id="desc">metric / measurement / scope / stopping / execution / budget 六个关键字段</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111f"/><stop offset="1" stop-color="#132f4c"/></linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="580" rx="30" fill="url(#bg)"/>
  <text x="600" y="52" text-anchor="middle" fill="#e0f2fe" font-size="28" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">optimization spec 的关键字段</text>
  <text x="600" y="82" text-anchor="middle" fill="#93c5fd" font-size="15" font-family="Arial, 'PingFang SC', sans-serif">缺少任何一个字段，optimize 会拒绝运行</text>

  <!-- 表头 -->
  <rect x="60" y="100" width="1080" height="44" rx="8" fill="#082f49"/>
  <text x="200" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">字段</text>
  <text x="560" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">作用</text>
  <text x="960" y="128" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="Arial, 'PingFang SC', sans-serif" font-weight="700">缺失时的后果</text>
  <line x1="360" y1="100" x2="360" y2="480" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="760" y1="100" x2="760" y2="480" stroke="#1e3a5f" stroke-width="1"/>

  <!-- 行1 -->
  <rect x="60" y="144" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="176" text-anchor="middle" fill="#6ee7b7" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">metric.primary</text>
  <text x="560" y="176" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">主指标、方向、hard/judge 类型</text>
  <text x="960" y="176" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">不知道优化什么</text>

  <!-- 行2 -->
  <text x="200" y="228" text-anchor="middle" fill="#7dd3fc" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">measurement.command</text>
  <text x="560" y="228" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">可重复运行的测量命令</text>
  <text x="960" y="228" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">无法验证实验结果</text>

  <!-- 行3 -->
  <rect x="60" y="248" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="280" text-anchor="middle" fill="#a78bfa" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">scope.mutable</text>
  <text x="560" y="280" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">哪些文件可以修改</text>
  <text x="960" y="280" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">可能修改不该改的文件</text>

  <!-- 行4 -->
  <text x="200" y="332" text-anchor="middle" fill="#fbbf24" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">stopping.max_iterations</text>
  <text x="560" y="332" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">最多跑多少次实验</text>
  <text x="960" y="332" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">实验无限循环</text>

  <!-- 行5 -->
  <rect x="60" y="352" width="1080" height="52" rx="0" fill="#04221a" opacity="0.4"/>
  <text x="200" y="384" text-anchor="middle" fill="#38bdf8" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">stopping.max_hours</text>
  <text x="560" y="384" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">最多跑多少小时</text>
  <text x="960" y="384" text-anchor="middle" fill="#f87171" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">时间成本不可控</text>

  <!-- 行6 -->
  <text x="200" y="436" text-anchor="middle" fill="#34d399" font-size="14" font-family="'SF Mono', Menlo, Consolas, monospace">execution.mode</text>
  <text x="560" y="436" text-anchor="middle" fill="#94a3b8" font-size="14" font-family="Arial, 'PingFang SC', sans-serif">serial 或 parallel</text>
  <text x="960" y="436" text-anchor="middle" fill="#fbbf24" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">默认 serial（安全）</text>

  <line x1="60" y1="456" x2="1140" y2="456" stroke="#1e3a5f" stroke-width="1"/>
  <text x="600" y="496" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">第一次运行建议：max_iterations: 4，max_hours: 1，execution.mode: serial</text>
  <text x="600" y="520" text-anchor="middle" fill="#475569" font-size="13" font-family="Arial, 'PingFang SC', sans-serif">先验证 baseline 和 measurement harness 可靠，再扩大预算</text>
</svg>
